name: Blue-green install WAHA Core NOWEB on Oracle

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'waha-oracle/install-waha.sh'
      - '.github/workflows/install-waha-oracle.yml'
      - 'waha-oracle/RELEASE'

permissions:
  contents: write

concurrency:
  group: nitu-waha-blue-green-install
  cancel-in-progress: false

jobs:
  install:
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 75
    steps:
      - uses: actions/checkout@v7

      - name: Configure OCI CLI
        shell: bash
        env:
          OCI_PRIVATE_KEY_PEM: ${{ secrets.OCI_PRIVATE_KEY }}
          OCI_FINGERPRINT_VALUE: ${{ secrets.OCI_FINGERPRINT }}
        run: |
          set -Eeuo pipefail
          mkdir -p "$HOME/.oci"
          python - <<'PY'
          import os
          from pathlib import Path
          value = os.environ.get('OCI_PRIVATE_KEY_PEM', '').strip()
          if len(value) >= 2 and value[0] == value[-1] and value[0] in {'"', "'"}:
              value = value[1:-1]
          if '\\n' in value and '\n' not in value:
              value = value.replace('\\r', '').replace('\\n', '\n')
          Path.home().joinpath('.oci/key.pem').write_text(value.replace('\r', '').strip() + '\n', encoding='utf-8')
          PY
          chmod 600 "$HOME/.oci/key.pem"
          fingerprint="$(printf '%s' "$OCI_FINGERPRINT_VALUE" | tr -d '[:space:]')"
          cat > "$HOME/.oci/config" <<EOF
          [DEFAULT]
          user=${{ secrets.OCI_USER_OCID }}
          fingerprint=$fingerprint
          tenancy=${{ secrets.OCI_TENANCY_OCID }}
          region=${{ vars.OCI_REGION }}
          key_file=$HOME/.oci/key.pem
          EOF
          chmod 600 "$HOME/.oci/config"
          pipx install --quiet oci-cli
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Prepare private bootstrap bundle
        id: prepare
        shell: bash
        env:
          TENANCY_OCID: ${{ secrets.OCI_TENANCY_OCID }}
          CONFIGURED_COMPARTMENT_OCID: ${{ vars.OCI_COMPARTMENT_OCID }}
          CONFIGURED_NAMESPACE: ${{ vars.OCI_NAMESPACE }}
          STATE_BUCKET: ${{ vars.OCI_TF_STATE_BUCKET }}
          REGION: ${{ vars.OCI_REGION }}
          WAHA_API_KEY: ${{ secrets.GATEWAY_API_KEY }}
          WAHA_DASHBOARD_PASSWORD: ${{ secrets.GATEWAY_ADMIN_TOKEN }}
          WAHA_WEBHOOK_SECRET: ${{ secrets.GATEWAY_WEBHOOK_SECRET }}
          WAHA_WORKER_KEY: ${{ secrets.GATEWAY_API_KEY }}
          WAHA_DOMAIN: ${{ vars.GATEWAY_DOMAIN || 'wa.nitutravels.in' }}
        run: |
          set -Eeuo pipefail
          compartment="$CONFIGURED_COMPARTMENT_OCID"
          if [[ ! "$compartment" =~ ^ocid1\.compartment\. ]]; then
            compartment="$(oci iam compartment list --compartment-id "$TENANCY_OCID" --compartment-id-in-subtree true --access-level ANY --all --output json | jq -r '[.data[] | select(.name=="NituWAGateway" and .["lifecycle-state"]=="ACTIVE") | .id][0] // empty')"
          fi
          [[ "$compartment" =~ ^ocid1\.compartment\. ]] || { echo '::error::Unable to resolve NituWAGateway compartment'; exit 1; }
          namespace="$CONFIGURED_NAMESPACE"
          if [ -z "$namespace" ] || [ "$namespace" = null ]; then namespace="$(oci os ns get --query data --raw-output)"; fi
          [ -n "$namespace" ] || { echo '::error::Unable to resolve Object Storage namespace'; exit 1; }
          [ -n "$STATE_BUCKET" ] || { echo '::error::OCI_TF_STATE_BUCKET is missing'; exit 1; }

          api_b64="$(printf '%s' "$WAHA_API_KEY" | base64 -w0)"
          dashboard_b64="$(printf '%s' "$WAHA_DASHBOARD_PASSWORD" | base64 -w0)"
          webhook_b64="$(printf '%s' "$WAHA_WEBHOOK_SECRET" | base64 -w0)"
          worker_b64="$(printf '%s' "$WAHA_WORKER_KEY" | base64 -w0)"

          installer_object="waha/installer-${GITHUB_SHA}.sh"
          oci os object put --namespace-name "$namespace" --bucket-name "$STATE_BUCKET" \
            --name "$installer_object" --file waha-oracle/install-waha.sh --force >/dev/null
          expires="$(date -u -d '+4 hours' '+%Y-%m-%dT%H:%M:%SZ')"
          installer_par="$(oci os preauth-request create --namespace-name "$namespace" --bucket-name "$STATE_BUCKET" \
            --name "waha-installer-${GITHUB_RUN_ID}" --access-type ObjectRead --object-name "$installer_object" \
            --time-expires "$expires" --query 'data."access-uri"' --raw-output)"
          installer_url="https://objectstorage.${REGION}.oraclecloud.com${installer_par}"

          cat > /tmp/bootstrap.sh <<EOF
          #!/usr/bin/env bash
          set -Eeuo pipefail
          umask 077
          curl -fsSL '$installer_url' -o /root/install-waha.sh
          chmod 700 /root/install-waha.sh
          WAHA_API_KEY_B64='$api_b64' \
          WAHA_DASHBOARD_PASSWORD_B64='$dashboard_b64' \
          WAHA_WEBHOOK_SECRET_B64='$webhook_b64' \
          WAHA_WORKER_KEY_B64='$worker_b64' \
          WAHA_DOMAIN='$WAHA_DOMAIN' \
          /root/install-waha.sh
          EOF
          chmod 600 /tmp/bootstrap.sh
          bootstrap_object="waha/bootstrap-${GITHUB_RUN_ID}.sh"
          oci os object put --namespace-name "$namespace" --bucket-name "$STATE_BUCKET" \
            --name "$bootstrap_object" --file /tmp/bootstrap.sh --force >/dev/null
          bootstrap_par="$(oci os preauth-request create --namespace-name "$namespace" --bucket-name "$STATE_BUCKET" \
            --name "waha-bootstrap-${GITHUB_RUN_ID}" --access-type ObjectRead --object-name "$bootstrap_object" \
            --time-expires "$expires" --query 'data."access-uri"' --raw-output)"
          bootstrap_url="https://objectstorage.${REGION}.oraclecloud.com${bootstrap_par}"

          echo "compartment=$compartment" >> "$GITHUB_OUTPUT"
          echo "bootstrap_url=$bootstrap_url" >> "$GITHUB_OUTPUT"

      - name: Launch isolated WAHA candidate
        id: launch
        shell: bash
        env:
          COMPARTMENT_OCID: ${{ steps.prepare.outputs.compartment }}
          BOOTSTRAP_URL: ${{ steps.prepare.outputs.bootstrap_url }}
          WAHA_API_KEY: ${{ secrets.GATEWAY_API_KEY }}
          DOMAIN: ${{ vars.GATEWAY_DOMAIN || 'wa.nitutravels.in' }}
        run: |
          set -Eeuo pipefail
          mkdir -p docs
          exec > >(tee docs/waha-oracle-install-result.txt) 2>&1
          echo 'WAHA_BLUE_GREEN_INSTALL_BEGIN'
          echo "STARTED_AT=$(date -u +%FT%TZ)"

          old_id="$(oci compute instance list --compartment-id "$COMPARTMENT_OCID" --display-name nitu-whatsapp-gateway --all \
            --query 'data[?"lifecycle-state"!=`TERMINATED`].id | [0]' --raw-output)"
          [[ "$old_id" =~ ^ocid1\.instance\. ]] || { echo 'INSTALL_RESULT=failed'; echo 'ERROR=Legacy gateway instance not found'; exit 1; }
          oci compute instance get --instance-id "$old_id" --output json > /tmp/old.json
          old_state="$(jq -r '.data["lifecycle-state"]' /tmp/old.json)"
          if [ "$old_state" = STOPPED ]; then
            oci compute instance action --instance-id "$old_id" --action START \
              --wait-for-state RUNNING --max-wait-seconds 900 >/dev/null
          elif [ "$old_state" != RUNNING ]; then
            echo 'INSTALL_RESULT=failed'
            echo "ERROR=Legacy gateway lifecycle is $old_state"
            exit 1
          fi
          ad="$(jq -r '.data["availability-domain"]' /tmp/old.json)"
          old_shape="$(jq -r '.data.shape' /tmp/old.json)"
          old_image="$(jq -r '.data["source-details"]["image-id"] // .data["image-id"] // empty' /tmp/old.json)"
          old_vnic="$(oci compute vnic-attachment list --compartment-id "$COMPARTMENT_OCID" --instance-id "$old_id" --all \
            --query 'data[?"lifecycle-state"==`ATTACHED`]."vnic-id" | [0]' --raw-output)"
          subnet="$(oci network vnic get --vnic-id "$old_vnic" --query 'data."subnet-id"' --raw-output)"
          old_public_ip="$(oci network vnic get --vnic-id "$old_vnic" --query 'data."public-ip"' --raw-output)"
          old_primary_private_id="$(oci network private-ip list --vnic-id "$old_vnic" --all --query 'data[?"is-primary"==`true`].id | [0]' --raw-output)"
          [[ "$subnet" =~ ^ocid1\.subnet\. ]] || { echo 'INSTALL_RESULT=failed'; echo 'ERROR=Unable to resolve gateway subnet'; exit 1; }
          [[ "$old_public_ip" =~ ^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$ ]] || { echo 'INSTALL_RESULT=failed'; echo 'ERROR=Unable to resolve reserved public IP'; exit 1; }

          stale_ids="$(oci compute instance list --compartment-id "$COMPARTMENT_OCID" --display-name nitu-waha-gateway --all \
            --query 'data[?"lifecycle-state"!=`TERMINATED`].id' --raw-output)"
          for stale in $(jq -r '.[]?' <<<"$stale_ids" 2>/dev/null || true); do
            oci compute instance terminate --instance-id "$stale" --force --preserve-boot-volume false >/dev/null || true
          done

          cat > /tmp/cloud-init.yaml <<EOF
          #cloud-config
          package_update: true
          packages:
            - curl
          runcmd:
            - [bash, -lc, "curl -fsSL '$BOOTSTRAP_URL' -o /root/nitu-waha-bootstrap.sh && chmod 700 /root/nitu-waha-bootstrap.sh && /root/nitu-waha-bootstrap.sh > /var/log/nitu-waha-bootstrap.log 2>&1"]
          final_message: "Nitu Travels WAHA bootstrap completed"
          EOF
          user_data="$(base64 -w0 /tmp/cloud-init.yaml)"
          jq -n --arg user_data "$user_data" '{user_data:$user_data}' > /tmp/metadata.json
          cat > /tmp/agent.json <<'JSON'
          {"isAgentDisabled":false,"isManagementDisabled":false,"areAllPluginsDisabled":false,"pluginsConfig":[{"name":"Compute Instance Run Command","desiredState":"ENABLED"}]}
          JSON
          cat > /tmp/tags.json <<EOF
          {"Application":"Nitu WAHA Gateway","ManagedBy":"GitHub Actions","InstallRun":"${GITHUB_RUN_ID}"}
          EOF

          launch_candidate() {
            local shape="$1" image="$2" shape_config="${3:-}"
            args=(oci compute instance launch --availability-domain "$ad" --compartment-id "$COMPARTMENT_OCID" \
              --subnet-id "$subnet" --assign-public-ip true --display-name nitu-waha-gateway \
              --shape "$shape" --image-id "$image" --metadata file:///tmp/metadata.json \
              --agent-config file:///tmp/agent.json --freeform-tags file:///tmp/tags.json \
              --wait-for-state RUNNING --max-wait-seconds 1200 --query 'data.id' --raw-output)
            [ -n "$shape_config" ] && args+=(--shape-config "$shape_config")
            "${args[@]}"
          }

          candidate_id=''
          if [ -n "$old_image" ]; then
            candidate_id="$(launch_candidate "$old_shape" "$old_image" 2>/tmp/launch-primary.err || true)"
          fi
          if [[ ! "$candidate_id" =~ ^ocid1\.instance\. ]]; then
            echo 'PRIMARY_SHAPE_LAUNCH_FAILED=yes'
            arm_image="$(oci compute image list --compartment-id "$COMPARTMENT_OCID" --operating-system 'Canonical Ubuntu' \
              --operating-system-version '24.04' --shape VM.Standard.A1.Flex --sort-by TIMECREATED --sort-order DESC --all \
              --query 'data[0].id' --raw-output)"
            candidate_id="$(launch_candidate VM.Standard.A1.Flex "$arm_image" '{"ocpus":1,"memoryInGBs":6}' 2>/tmp/launch-arm.err || true)"
          fi
          if [[ ! "$candidate_id" =~ ^ocid1\.instance\. ]]; then
            echo 'INSTALL_RESULT=failed'
            echo 'ERROR=Could not launch an isolated free-tier WAHA candidate'
            tail -n 3 /tmp/launch-primary.err 2>/dev/null || true
            tail -n 3 /tmp/launch-arm.err 2>/dev/null || true
            exit 1
          fi
          echo "CANDIDATE_INSTANCE_ID=$candidate_id"

          candidate_vnic=''
          candidate_ip=''
          for attempt in $(seq 1 60); do
            candidate_vnic="$(oci compute vnic-attachment list --compartment-id "$COMPARTMENT_OCID" --instance-id "$candidate_id" --all \
              --query 'data[?"lifecycle-state"==`ATTACHED`]."vnic-id" | [0]' --raw-output 2>/dev/null || true)"
            if [[ "$candidate_vnic" =~ ^ocid1\.vnic\. ]]; then
              candidate_ip="$(oci network vnic get --vnic-id "$candidate_vnic" --query 'data."public-ip"' --raw-output 2>/dev/null || true)"
              [[ "$candidate_ip" =~ ^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$ ]] && break
            fi
            sleep 10
          done
          [[ "$candidate_ip" =~ ^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$ ]] || { echo 'INSTALL_RESULT=failed'; echo 'ERROR=Candidate has no temporary public IP'; exit 1; }
          echo "CANDIDATE_TEMP_IP=$candidate_ip"

          candidate_ready=0
          for attempt in $(seq 1 150); do
            health_code="$(curl -sS --connect-timeout 5 --max-time 15 -H "Host: $DOMAIN" -o /tmp/health.json -w '%{http_code}' "http://$candidate_ip/health" 2>/dev/null || true)"
            version_code="$(curl -sS --connect-timeout 5 --max-time 15 -H "Host: $DOMAIN" -H "X-Api-Key: $WAHA_API_KEY" \
              -o /tmp/version.json -w '%{http_code}' "http://$candidate_ip/api/server/version" 2>/dev/null || true)"
            session_code="$(curl -sS --connect-timeout 5 --max-time 15 -H "Host: $DOMAIN" -H "X-Api-Key: $WAHA_API_KEY" \
              -o /tmp/session.json -w '%{http_code}' "http://$candidate_ip/api/sessions/nitu-travels" 2>/dev/null || true)"
            engine="$(jq -r '.engine // "unknown"' /tmp/version.json 2>/dev/null || echo unknown)"
            session_status="$(jq -r '.status // "UNKNOWN"' /tmp/session.json 2>/dev/null || echo UNKNOWN)"
            echo "CANDIDATE_ATTEMPT=$attempt HEALTH=${health_code:-000} VERSION=${version_code:-000} SESSION=${session_code:-000} ENGINE=$engine STATUS=$session_status"
            if [ "$health_code" = 200 ] && [ "$version_code" = 200 ] && [ "$session_code" = 200 ] && [ "$engine" = NOWEB ]; then
              case "$session_status" in WORKING|SCAN_QR|STARTING|STOPPED) candidate_ready=1; break ;; esac
            fi
            sleep 10
          done
          if [ "$candidate_ready" -ne 1 ]; then
            echo 'INSTALL_RESULT=failed'
            echo 'ERROR=Candidate WAHA stack did not become healthy'
            oci compute instance terminate --instance-id "$candidate_id" --force --preserve-boot-volume false >/dev/null || true
            exit 1
          fi

          reserved_json="$(oci network public-ip get --scope REGION --ip-address "$old_public_ip" --output json)"
          reserved_id="$(jq -r '.data.id' <<<"$reserved_json")"
          candidate_primary_private_id="$(oci network private-ip list --vnic-id "$candidate_vnic" --all \
            --query 'data[?"is-primary"==`true`].id | [0]' --raw-output)"
          temp_public_json="$(oci network public-ip get --scope REGION --ip-address "$candidate_ip" --output json)"
          temp_public_id="$(jq -r '.data.id' <<<"$temp_public_json")"
          [[ "$reserved_id" =~ ^ocid1\.publicip\. ]] || { echo 'INSTALL_RESULT=failed'; echo 'ERROR=Reserved public IP object not found'; exit 1; }
          [[ "$candidate_primary_private_id" =~ ^ocid1\.privateip\. ]] || { echo 'INSTALL_RESULT=failed'; echo 'ERROR=Candidate primary private IP not found'; exit 1; }

          echo 'CUTOVER_BEGIN=yes'
          oci network public-ip delete --public-ip-id "$temp_public_id" --force >/dev/null
          sleep 10
          oci network public-ip update --public-ip-id "$reserved_id" --private-ip-id "$candidate_primary_private_id" \
            --force >/dev/null

          cutover_ok=0
          for attempt in $(seq 1 90); do
            args=(--silent --show-error --connect-timeout 8 --max-time 20 --resolve "$DOMAIN:443:$old_public_ip")
            health_code="$(curl "${args[@]}" -o /tmp/live-health.json -w '%{http_code}' "https://$DOMAIN/health" 2>/dev/null || true)"
            version_code="$(curl "${args[@]}" -H "X-Api-Key: $WAHA_API_KEY" -o /tmp/live-version.json -w '%{http_code}' \
              "https://$DOMAIN/api/server/version" 2>/dev/null || true)"
            engine="$(jq -r '.engine // "unknown"' /tmp/live-version.json 2>/dev/null || echo unknown)"
            echo "CUTOVER_ATTEMPT=$attempt HEALTH=${health_code:-000} VERSION=${version_code:-000} ENGINE=$engine"
            if [ "$health_code" = 200 ] && [ "$version_code" = 200 ] && [ "$engine" = NOWEB ]; then cutover_ok=1; break; fi
            sleep 10
          done
          if [ "$cutover_ok" -ne 1 ]; then
            echo 'CUTOVER_ROLLBACK=yes'
            oci network public-ip update --public-ip-id "$reserved_id" --private-ip-id "$old_primary_private_id" \
              --force >/dev/null || true
            echo 'INSTALL_RESULT=failed'
            echo 'ERROR=Reserved-IP cutover verification failed and was rolled back'
            exit 1
          fi

          oci compute instance action --instance-id "$old_id" --action SOFTSTOP >/dev/null || true
          echo 'LEGACY_GATEWAY_SOFTSTOP_REQUESTED=yes'
          echo "WAHA_INSTANCE_ID=$candidate_id"
          echo "RESERVED_PUBLIC_IP=$old_public_ip"
          echo "WAHA_DOMAIN=$DOMAIN"
          jq -n --argjson version "$(cat /tmp/live-version.json)" --arg sessionStatus "$session_status" \
            '{version:$version,session:"nitu-travels",sessionStatus:$sessionStatus,cutover:"verified",legacyGateway:"softstop-requested"}' | tee -a docs/waha-oracle-install-result.txt
          echo 'INSTALL_RESULT=success' | tee -a docs/waha-oracle-install-result.txt
          echo "FINISHED_AT=$(date -u +%FT%TZ)" | tee -a docs/waha-oracle-install-result.txt
          echo 'WAHA_BLUE_GREEN_INSTALL_END' | tee -a docs/waha-oracle-install-result.txt

      - name: Persist sanitized installation result
        if: always()
        shell: bash
        run: |
          set -Eeuo pipefail
          test -f docs/waha-oracle-install-result.txt || echo 'WAHA installation produced no result file.' > docs/waha-oracle-install-result.txt
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add docs/waha-oracle-install-result.txt
          git diff --cached --quiet || git commit -m 'Record WAHA Oracle installation result'
          git pull --rebase origin main
          git push origin HEAD:main
