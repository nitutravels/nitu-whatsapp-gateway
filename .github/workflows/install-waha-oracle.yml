name: Install WAHA Core NOWEB by Oracle boot-volume replacement

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'waha-oracle/install-waha.sh'
      - '.github/workflows/install-waha-oracle.yml'
      - 'waha-oracle/RELEASE'

permissions:
  contents: write

concurrency:
  group: nitu-waha-inplace-install
  cancel-in-progress: true

jobs:
  install:
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 75
    steps:
      - uses: actions/checkout@v7

      - name: Configure OCI CLI
        shell: bash
        env:
          OCI_PRIVATE_KEY_PEM: ${{ secrets.OCI_PRIVATE_KEY }}
          OCI_FINGERPRINT_VALUE: ${{ secrets.OCI_FINGERPRINT }}
        run: |
          set -Eeuo pipefail
          mkdir -p "$HOME/.oci"
          python - <<'PY'
          import os
          from pathlib import Path
          value = os.environ.get('OCI_PRIVATE_KEY_PEM', '').strip()
          if len(value) >= 2 and value[0] == value[-1] and value[0] in {'"', "'"}:
              value = value[1:-1]
          if '\\n' in value and '\n' not in value:
              value = value.replace('\\r', '').replace('\\n', '\n')
          Path.home().joinpath('.oci/key.pem').write_text(value.replace('\r', '').strip() + '\n', encoding='utf-8')
          PY
          chmod 600 "$HOME/.oci/key.pem"
          fingerprint="$(printf '%s' "$OCI_FINGERPRINT_VALUE" | tr -d '[:space:]')"
          cat > "$HOME/.oci/config" <<EOF
          [DEFAULT]
          user=${{ secrets.OCI_USER_OCID }}
          fingerprint=$fingerprint
          tenancy=${{ secrets.OCI_TENANCY_OCID }}
          region=${{ vars.OCI_REGION }}
          key_file=$HOME/.oci/key.pem
          EOF
          chmod 600 "$HOME/.oci/config"
          pipx install --quiet oci-cli
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Prepare encrypted private bootstrap
        id: prepare
        shell: bash
        env:
          TENANCY_OCID: ${{ secrets.OCI_TENANCY_OCID }}
          CONFIGURED_COMPARTMENT_OCID: ${{ vars.OCI_COMPARTMENT_OCID }}
          CONFIGURED_NAMESPACE: ${{ vars.OCI_NAMESPACE }}
          STATE_BUCKET: ${{ vars.OCI_TF_STATE_BUCKET }}
          REGION: ${{ vars.OCI_REGION }}
          WAHA_API_KEY: ${{ secrets.GATEWAY_API_KEY }}
          WAHA_DASHBOARD_PASSWORD: ${{ secrets.GATEWAY_ADMIN_TOKEN }}
          WAHA_WEBHOOK_SECRET: ${{ secrets.GATEWAY_WEBHOOK_SECRET }}
          WAHA_WORKER_KEY: ${{ secrets.GATEWAY_API_KEY }}
          WAHA_DOMAIN: ${{ vars.GATEWAY_DOMAIN || 'wa.nitutravels.in' }}
        run: |
          set -Eeuo pipefail
          compartment="$CONFIGURED_COMPARTMENT_OCID"
          if [[ ! "$compartment" =~ ^ocid1\.compartment\. ]]; then
            compartment="$(oci iam compartment list --compartment-id "$TENANCY_OCID" --compartment-id-in-subtree true --access-level ANY --all --output json | jq -r '[.data[] | select(.name=="NituWAGateway" and .["lifecycle-state"]=="ACTIVE") | .id][0] // empty')"
          fi
          [[ "$compartment" =~ ^ocid1\.compartment\. ]] || { echo '::error::Unable to resolve NituWAGateway compartment'; exit 1; }
          namespace="$CONFIGURED_NAMESPACE"
          if [ -z "$namespace" ] || [ "$namespace" = null ]; then namespace="$(oci os ns get --query data --raw-output)"; fi
          [ -n "$namespace" ] || { echo '::error::Unable to resolve Object Storage namespace'; exit 1; }
          [ -n "$STATE_BUCKET" ] || { echo '::error::OCI_TF_STATE_BUCKET is missing'; exit 1; }

          api_b64="$(printf '%s' "$WAHA_API_KEY" | base64 -w0)"
          dashboard_b64="$(printf '%s' "$WAHA_DASHBOARD_PASSWORD" | base64 -w0)"
          webhook_b64="$(printf '%s' "$WAHA_WEBHOOK_SECRET" | base64 -w0)"
          worker_b64="$(printf '%s' "$WAHA_WORKER_KEY" | base64 -w0)"

          installer_object="waha/installer-${GITHUB_SHA}.sh"
          oci os object put --namespace-name "$namespace" --bucket-name "$STATE_BUCKET" --name "$installer_object" --file waha-oracle/install-waha.sh --force >/dev/null
          expires="$(date -u -d '+4 hours' '+%Y-%m-%dT%H:%M:%SZ')"
          installer_par="$(oci os preauth-request create --namespace-name "$namespace" --bucket-name "$STATE_BUCKET" --name "waha-installer-${GITHUB_RUN_ID}" --access-type ObjectRead --object-name "$installer_object" --time-expires "$expires" --query 'data."access-uri"' --raw-output)"
          installer_url="https://objectstorage.${REGION}.oraclecloud.com${installer_par}"

          cat > /tmp/bootstrap.sh <<EOF
          #!/usr/bin/env bash
          set -Eeuo pipefail
          umask 077
          curl -fsSL '$installer_url' -o /root/install-waha.sh
          chmod 700 /root/install-waha.sh
          WAHA_API_KEY_B64='$api_b64' \
          WAHA_DASHBOARD_PASSWORD_B64='$dashboard_b64' \
          WAHA_WEBHOOK_SECRET_B64='$webhook_b64' \
          WAHA_WORKER_KEY_B64='$worker_b64' \
          WAHA_DOMAIN='$WAHA_DOMAIN' \
          /root/install-waha.sh
          EOF
          chmod 600 /tmp/bootstrap.sh
          bootstrap_object="waha/bootstrap-${GITHUB_RUN_ID}.sh"
          oci os object put --namespace-name "$namespace" --bucket-name "$STATE_BUCKET" --name "$bootstrap_object" --file /tmp/bootstrap.sh --force >/dev/null
          bootstrap_par="$(oci os preauth-request create --namespace-name "$namespace" --bucket-name "$STATE_BUCKET" --name "waha-bootstrap-${GITHUB_RUN_ID}" --access-type ObjectRead --object-name "$bootstrap_object" --time-expires "$expires" --query 'data."access-uri"' --raw-output)"
          echo "compartment=$compartment" >> "$GITHUB_OUTPUT"
          echo "bootstrap_url=https://objectstorage.${REGION}.oraclecloud.com${bootstrap_par}" >> "$GITHUB_OUTPUT"

      - name: Replace boot volume, install WAHA, and verify
        shell: bash
        env:
          COMPARTMENT_OCID: ${{ steps.prepare.outputs.compartment }}
          BOOTSTRAP_URL: ${{ steps.prepare.outputs.bootstrap_url }}
          WAHA_API_KEY: ${{ secrets.GATEWAY_API_KEY }}
          DOMAIN: ${{ vars.GATEWAY_DOMAIN || 'wa.nitutravels.in' }}
        run: |
          set -Eeuo pipefail
          mkdir -p docs
          exec > >(tee docs/waha-oracle-install-result.txt) 2>&1
          echo 'WAHA_INPLACE_INSTALL_BEGIN'
          echo "STARTED_AT=$(date -u +%FT%TZ)"

          instance_id=''
          old_boot_volume=''
          replacement_started=0
          public_ip=''

          rollback() {
            rc=$?
            trap - ERR
            set +e
            echo "INSTALL_FAILURE_CODE=$rc"
            if [ "$replacement_started" -eq 1 ] && [[ "$old_boot_volume" =~ ^ocid1\.bootvolume\. ]]; then
              echo 'ROLLBACK_BEGIN=yes'
              lifecycle="$(oci compute instance get --instance-id "$instance_id" --query 'data."lifecycle-state"' --raw-output 2>/dev/null || true)"
              if [ "$lifecycle" != STOPPED ]; then
                oci compute instance action --instance-id "$instance_id" --action SOFTSTOP --wait-for-state STOPPED --max-wait-seconds 900 >/dev/null 2>&1 || \
                  oci compute instance action --instance-id "$instance_id" --action STOP --wait-for-state STOPPED --max-wait-seconds 900 >/dev/null 2>&1 || true
              fi
              if oci compute instance update-instance-update-instance-source-via-boot-volume-details \
                --instance-id "$instance_id" \
                --source-details-boot-volume-id "$old_boot_volume" \
                --source-details-is-preserve-boot-volume-enabled true \
                --update-operation-constraint ALLOW_DOWNTIME \
                --force --wait-for-state STOPPED --max-wait-seconds 1800 >/tmp/rollback-update.json 2>/tmp/rollback-update.err; then
                oci compute instance action --instance-id "$instance_id" --action START --wait-for-state RUNNING --max-wait-seconds 1200 >/dev/null 2>&1 || true
                echo 'ROLLBACK_RESULT=old_boot_volume_restored'
              else
                echo 'ROLLBACK_RESULT=failed'
                tail -n 5 /tmp/rollback-update.err 2>/dev/null || true
              fi
            else
              echo 'ROLLBACK_RESULT=not_required'
            fi
            echo 'INSTALL_RESULT=failed'
            echo "FINISHED_AT=$(date -u +%FT%TZ)"
            echo 'WAHA_INPLACE_INSTALL_END'
            exit "$rc"
          }
          trap rollback ERR

          instance_id="$(oci compute instance list --compartment-id "$COMPARTMENT_OCID" --display-name nitu-whatsapp-gateway --all --query 'data[?"lifecycle-state"!=`TERMINATED`].id | [0]' --raw-output)"
          [[ "$instance_id" =~ ^ocid1\.instance\. ]] || { echo 'ERROR=Legacy gateway instance not found'; false; }
          oci compute instance get --instance-id "$instance_id" --output json > /tmp/instance.json
          ad="$(jq -r '.data["availability-domain"]' /tmp/instance.json)"
          shape="$(jq -r '.data.shape' /tmp/instance.json)"
          lifecycle="$(jq -r '.data["lifecycle-state"]' /tmp/instance.json)"
          vnic_id="$(oci compute vnic-attachment list --compartment-id "$COMPARTMENT_OCID" --instance-id "$instance_id" --all --query 'data[?"lifecycle-state"==`ATTACHED`]."vnic-id" | [0]' --raw-output)"
          public_ip="$(oci network vnic get --vnic-id "$vnic_id" --query 'data."public-ip"' --raw-output)"
          [[ "$public_ip" =~ ^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$ ]] || { echo 'ERROR=Reserved gateway public IP was not found'; false; }

          old_boot_volume="$(oci compute boot-volume-attachment list --availability-domain "$ad" --compartment-id "$COMPARTMENT_OCID" --instance-id "$instance_id" --all --query 'data[?"lifecycle-state"==`ATTACHED`]."boot-volume-id" | [0]' --raw-output)"
          [[ "$old_boot_volume" =~ ^ocid1\.bootvolume\. ]] || { echo 'ERROR=Current boot volume was not found'; false; }
          echo "INSTANCE_ID=$instance_id"
          echo "INSTANCE_SHAPE=$shape"
          echo "RESERVED_PUBLIC_IP=$public_ip"
          echo "PRESERVED_BOOT_VOLUME=$old_boot_volume"

          replacement_image="$(oci compute image list --compartment-id "$COMPARTMENT_OCID" --operating-system 'Canonical Ubuntu' --operating-system-version '24.04' --shape "$shape" --sort-by TIMECREATED --sort-order DESC --all --query 'data[0].id' --raw-output)"
          [[ "$replacement_image" =~ ^ocid1\.image\. ]] || { echo 'ERROR=Compatible Ubuntu 24.04 replacement image was not found'; false; }
          echo "REPLACEMENT_IMAGE=$replacement_image"

          stale_ids="$(oci compute instance list --compartment-id "$COMPARTMENT_OCID" --display-name nitu-waha-gateway --all --query 'data[?"lifecycle-state"!=`TERMINATED`].id' --raw-output)"
          for stale in $(jq -r '.[]?' <<<"$stale_ids" 2>/dev/null || true); do
            oci compute instance terminate --instance-id "$stale" --force --preserve-boot-volume false >/dev/null 2>&1 || true
          done

          if [ "$lifecycle" != STOPPED ]; then
            echo 'STOPPING_INSTANCE=yes'
            oci compute instance action --instance-id "$instance_id" --action SOFTSTOP --wait-for-state STOPPED --max-wait-seconds 900 >/dev/null
          fi

          cat > /tmp/agent.json <<'JSON'
          {"isAgentDisabled":false,"isManagementDisabled":false,"areAllPluginsDisabled":false,"pluginsConfig":[{"name":"Compute Instance Run Command","desiredState":"ENABLED"}]}
          JSON
          replacement_started=1
          echo 'BOOT_VOLUME_REPLACEMENT_BEGIN=yes'
          oci compute instance update-instance-update-instance-source-via-image-details \
            --instance-id "$instance_id" \
            --source-details-image-id "$replacement_image" \
            --source-details-is-preserve-boot-volume-enabled true \
            --agent-config file:///tmp/agent.json \
            --update-operation-constraint ALLOW_DOWNTIME \
            --force --wait-for-state STOPPED --max-wait-seconds 1800 >/tmp/replacement.json
          echo 'BOOT_VOLUME_REPLACEMENT_COMPLETE=yes'
          oci compute instance action --instance-id "$instance_id" --action START --wait-for-state RUNNING --max-wait-seconds 1200 >/dev/null
          echo 'FRESH_INSTANCE_RUNNING=yes'

          command_text="curl -fsSL '$BOOTSTRAP_URL' -o /tmp/nitu-waha-bootstrap.sh && chmod 700 /tmp/nitu-waha-bootstrap.sh && sudo /tmp/nitu-waha-bootstrap.sh"
          create_command() {
            jq -n --arg text "$command_text" '{source:{sourceType:"TEXT",text:$text},output:{outputType:"TEXT"}}' > /tmp/content.json
            jq -n --arg id "$instance_id" '{instanceId:$id}' > /tmp/target.json
            oci instance-agent command create --compartment-id "$COMPARTMENT_OCID" --content file:///tmp/content.json --target file:///tmp/target.json --timeout-in-seconds 3000 --display-name 'Install Nitu Travels WAHA NOWEB' --query 'data.id' --raw-output
          }

          command_ok=0
          for create_attempt in $(seq 1 8); do
            sleep 45
            command_id="$(create_command 2>/tmp/create-command.err || true)"
            if [[ ! "$command_id" =~ ^ocid1\.instanceagentcommand\. ]]; then
              echo "COMMAND_CREATE_ATTEMPT=$create_attempt RESULT=unavailable"
              continue
            fi
            echo "COMMAND_ID=$command_id"
            for poll in $(seq 1 160); do
              json="$(oci instance-agent command-execution get --command-id "$command_id" --instance-id "$instance_id" --output json 2>/dev/null || true)"
              state="$(jq -r '.data."lifecycle-state" // "UNKNOWN"' <<<"$json")"
              echo "COMMAND_POLL=$poll STATE=$state"
              case "$state" in
                SUCCEEDED) printf '%s' "$json" > /tmp/command-final.json; command_ok=1; break 2 ;;
                FAILED|CANCELED|TIMED_OUT) printf '%s' "$json" > /tmp/command-final.json; break ;;
              esac
              sleep 15
            done
          done
          [ "$command_ok" -eq 1 ] || { echo 'ERROR=Fresh Oracle agent did not complete the WAHA installer'; jq -c '.data.content // {}' /tmp/command-final.json 2>/dev/null || true; false; }
          echo 'WAHA_INSTALL_COMMAND_SUCCEEDED=yes'

          verified=0
          final_status='UNKNOWN'
          for attempt in $(seq 1 120); do
            args=(--silent --show-error --connect-timeout 8 --max-time 20 --resolve "$DOMAIN:443:$public_ip")
            health_code="$(curl "${args[@]}" -o /tmp/health.json -w '%{http_code}' "https://$DOMAIN/health" 2>/dev/null || true)"
            version_code="$(curl "${args[@]}" -H "X-Api-Key: $WAHA_API_KEY" -o /tmp/version.json -w '%{http_code}' "https://$DOMAIN/api/server/version" 2>/dev/null || true)"
            session_code="$(curl "${args[@]}" -H "X-Api-Key: $WAHA_API_KEY" -o /tmp/session.json -w '%{http_code}' "https://$DOMAIN/api/sessions/nitu-travels" 2>/dev/null || true)"
            engine="$(jq -r '.engine // "unknown"' /tmp/version.json 2>/dev/null || echo unknown)"
            final_status="$(jq -r '.status // "UNKNOWN"' /tmp/session.json 2>/dev/null || echo UNKNOWN)"
            echo "VERIFY_ATTEMPT=$attempt HEALTH=${health_code:-000} VERSION=${version_code:-000} SESSION=${session_code:-000} ENGINE=$engine STATUS=$final_status"
            if [ "$health_code" = 200 ] && [ "$version_code" = 200 ] && [ "$session_code" = 200 ] && [ "$engine" = NOWEB ]; then
              case "$final_status" in WORKING|SCAN_QR_CODE) verified=1; break ;; esac
            fi
            sleep 10
          done
          [ "$verified" -eq 1 ] || { echo 'ERROR=WAHA live verification failed'; false; }

          replacement_started=0
          trap - ERR
          jq -n --argjson version "$(cat /tmp/version.json)" --arg sessionStatus "$final_status" --arg bootVolume "$old_boot_volume" '{version:$version,session:"nitu-travels",sessionStatus:$sessionStatus,installation:"verified-in-place",preservedRollbackBootVolume:$bootVolume}'
          echo 'INSTALL_RESULT=success'
          echo "FINISHED_AT=$(date -u +%FT%TZ)"
          echo 'WAHA_INPLACE_INSTALL_END'

      - name: Persist sanitized installation result
        if: always()
        shell: bash
        run: |
          set -Eeuo pipefail
          test -f docs/waha-oracle-install-result.txt || echo 'WAHA installation produced no result file.' > docs/waha-oracle-install-result.txt
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add docs/waha-oracle-install-result.txt
          git diff --cached --quiet || git commit -m 'Record WAHA Oracle installation result'
          git pull --rebase origin main
          git push origin HEAD:main
