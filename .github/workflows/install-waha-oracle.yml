name: Install WAHA Core NOWEB on Oracle

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'waha-oracle/install-waha.sh'
      - '.github/workflows/install-waha-oracle.yml'
      - 'waha-oracle/RELEASE'

permissions:
  contents: write

concurrency:
  group: nitu-waha-oracle-install
  cancel-in-progress: false

jobs:
  install:
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 55
    steps:
      - uses: actions/checkout@v7

      - name: Configure OCI credentials
        shell: bash
        env:
          OCI_PRIVATE_KEY_PEM: ${{ secrets.OCI_PRIVATE_KEY }}
          OCI_FINGERPRINT_VALUE: ${{ secrets.OCI_FINGERPRINT }}
        run: |
          set -Eeuo pipefail
          mkdir -p "$HOME/.oci"
          python - <<'PY'
          import os
          from pathlib import Path
          value = os.environ.get('OCI_PRIVATE_KEY_PEM', '').strip()
          if len(value) >= 2 and value[0] == value[-1] and value[0] in {'"', "'"}:
              value = value[1:-1]
          if '\\n' in value and '\n' not in value:
              value = value.replace('\\r', '').replace('\\n', '\n')
          Path.home().joinpath('.oci/key.pem').write_text(value.replace('\r', '').strip() + '\n', encoding='utf-8')
          PY
          chmod 600 "$HOME/.oci/key.pem"
          fingerprint="$(printf '%s' "$OCI_FINGERPRINT_VALUE" | tr -d '[:space:]')"
          cat > "$HOME/.oci/config" <<EOF
          [DEFAULT]
          user=${{ secrets.OCI_USER_OCID }}
          fingerprint=$fingerprint
          tenancy=${{ secrets.OCI_TENANCY_OCID }}
          region=${{ vars.OCI_REGION }}
          key_file=$HOME/.oci/key.pem
          EOF
          chmod 600 "$HOME/.oci/config"
          pipx install --quiet oci-cli
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Resolve Oracle resources and upload installer
        id: oci
        shell: bash
        env:
          TENANCY_OCID: ${{ secrets.OCI_TENANCY_OCID }}
          CONFIGURED_COMPARTMENT_OCID: ${{ vars.OCI_COMPARTMENT_OCID }}
          CONFIGURED_NAMESPACE: ${{ vars.OCI_NAMESPACE }}
          STATE_BUCKET: ${{ vars.OCI_TF_STATE_BUCKET }}
          REGION: ${{ vars.OCI_REGION }}
        run: |
          set -Eeuo pipefail
          compartment="$CONFIGURED_COMPARTMENT_OCID"
          if [[ ! "$compartment" =~ ^ocid1\.compartment\. ]]; then
            compartment="$(oci iam compartment list --compartment-id "$TENANCY_OCID" --compartment-id-in-subtree true --access-level ANY --all --output json | jq -r '[.data[] | select(.name=="NituWAGateway" and .["lifecycle-state"]=="ACTIVE") | .id][0] // empty')"
          fi
          [[ "$compartment" =~ ^ocid1\.compartment\. ]] || { echo '::error::Unable to resolve NituWAGateway compartment'; exit 1; }

          namespace="$CONFIGURED_NAMESPACE"
          if [ -z "$namespace" ] || [ "$namespace" = null ]; then namespace="$(oci os ns get --query data --raw-output)"; fi
          [ -n "$namespace" ] || { echo '::error::Unable to resolve Object Storage namespace'; exit 1; }
          [ -n "$STATE_BUCKET" ] || { echo '::error::OCI_TF_STATE_BUCKET is missing'; exit 1; }

          object_name="waha/install-${GITHUB_SHA}.sh"
          oci os object put --namespace-name "$namespace" --bucket-name "$STATE_BUCKET" \
            --name "$object_name" --file waha-oracle/install-waha.sh --force >/dev/null
          expires="$(date -u -d '+3 hours' '+%Y-%m-%dT%H:%M:%SZ')"
          par_json="$(oci os preauth-request create --namespace-name "$namespace" --bucket-name "$STATE_BUCKET" \
            --name "waha-install-${GITHUB_RUN_ID}" --access-type ObjectRead --object-name "$object_name" \
            --time-expires "$expires" --output json)"
          access_uri="$(jq -r '.data["access-uri"]' <<<"$par_json")"
          par_url="https://objectstorage.${REGION}.oraclecloud.com${access_uri}"

          instance_id="$(oci compute instance list --compartment-id "$compartment" --display-name nitu-whatsapp-gateway --all \
            --query 'data[?"lifecycle-state"!=`TERMINATED`].id | [0]' --raw-output)"
          [[ "$instance_id" =~ ^ocid1\.instance\. ]] || { echo '::error::Gateway instance was not found'; exit 1; }
          lifecycle="$(oci compute instance get --instance-id "$instance_id" --query 'data."lifecycle-state"' --raw-output)"
          if [ "$lifecycle" = STOPPED ]; then
            oci compute instance action --instance-id "$instance_id" --action START --wait-for-state RUNNING --max-wait-seconds 900 >/dev/null
          elif [ "$lifecycle" != RUNNING ]; then
            echo "::error::Gateway instance lifecycle is $lifecycle"
            exit 1
          fi

          vnic_id="$(oci compute vnic-attachment list --compartment-id "$compartment" --instance-id "$instance_id" --all \
            --query 'data[?"lifecycle-state"==`ATTACHED`]."vnic-id" | [0]' --raw-output)"
          public_ip="$(oci network vnic get --vnic-id "$vnic_id" --query 'data."public-ip"' --raw-output)"
          [[ "$public_ip" =~ ^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$ ]] || { echo '::error::Gateway has no usable public IPv4 address'; exit 1; }

          cat > /tmp/agent-config.json <<'JSON'
          {"is-agent-disabled":false,"is-management-disabled":false,"are-all-plugins-disabled":false,"plugins-config":[{"name":"Compute Instance Run Command","desiredState":"ENABLED"}]}
          JSON
          oci compute instance update --instance-id "$instance_id" --agent-config file:///tmp/agent-config.json \
            --update-operation-constraint AVOID_DOWNTIME --force >/dev/null || true

          echo "compartment=$compartment" >> "$GITHUB_OUTPUT"
          echo "instance_id=$instance_id" >> "$GITHUB_OUTPUT"
          echo "public_ip=$public_ip" >> "$GITHUB_OUTPUT"
          echo "par_url=$par_url" >> "$GITHUB_OUTPUT"

      - name: Install WAHA through Oracle Instance Agent
        id: install
        shell: bash
        env:
          COMPARTMENT_OCID: ${{ steps.oci.outputs.compartment }}
          INSTANCE_ID: ${{ steps.oci.outputs.instance_id }}
          PAR_URL: ${{ steps.oci.outputs.par_url }}
          WAHA_API_KEY: ${{ secrets.GATEWAY_API_KEY }}
          WAHA_DASHBOARD_PASSWORD: ${{ secrets.GATEWAY_ADMIN_TOKEN }}
          WAHA_WEBHOOK_SECRET: ${{ secrets.GATEWAY_WEBHOOK_SECRET }}
          WAHA_WORKER_KEY: ${{ secrets.GATEWAY_API_KEY }}
          WAHA_DOMAIN: ${{ vars.GATEWAY_DOMAIN || 'wa.nitutravels.in' }}
        run: |
          set -Eeuo pipefail
          mkdir -p docs
          exec > >(tee docs/waha-oracle-install-result.txt) 2>&1
          echo 'WAHA_ORACLE_INSTALL_BEGIN'
          echo "STARTED_AT=$(date -u +%FT%TZ)"

          api_b64="$(printf '%s' "$WAHA_API_KEY" | base64 -w0)"
          dashboard_b64="$(printf '%s' "$WAHA_DASHBOARD_PASSWORD" | base64 -w0)"
          webhook_b64="$(printf '%s' "$WAHA_WEBHOOK_SECRET" | base64 -w0)"
          worker_b64="$(printf '%s' "$WAHA_WORKER_KEY" | base64 -w0)"
          command_text="curl -fsSL '$PAR_URL' -o /tmp/nitu-install-waha.sh && chmod 700 /tmp/nitu-install-waha.sh && WAHA_API_KEY_B64='$api_b64' WAHA_DASHBOARD_PASSWORD_B64='$dashboard_b64' WAHA_WEBHOOK_SECRET_B64='$webhook_b64' WAHA_WORKER_KEY_B64='$worker_b64' WAHA_DOMAIN='$WAHA_DOMAIN' /tmp/nitu-install-waha.sh"
          if [ "${#command_text}" -gt 3900 ]; then
            echo 'INSTALL_RESULT=failed'
            echo 'ERROR=Oracle inline launcher exceeds safe size'
            exit 1
          fi

          create_command() {
            jq -n --arg text "$command_text" '{source:{sourceType:"TEXT",text:$text},output:{outputType:"TEXT"}}' > /tmp/content.json
            jq -n --arg id "$INSTANCE_ID" '{instanceId:$id}' > /tmp/target.json
            oci instance-agent command create --compartment-id "$COMPARTMENT_OCID" \
              --content file:///tmp/content.json --target file:///tmp/target.json \
              --timeout-in-seconds 2400 --display-name 'Install Nitu Travels WAHA NOWEB' \
              --query 'data.id' --raw-output
          }

          wait_command() {
            local command_id="$1" max_checks="$2" state='' json=''
            for attempt in $(seq 1 "$max_checks"); do
              json="$(oci instance-agent command-execution get --command-id "$command_id" --instance-id "$INSTANCE_ID" --output json 2>/dev/null || true)"
              state="$(jq -r '.data."lifecycle-state" // empty' <<<"$json")"
              echo "COMMAND_ATTEMPT=$attempt STATE=${state:-UNKNOWN}"
              case "$state" in
                SUCCEEDED) printf '%s' "$json" > /tmp/command-final.json; return 0 ;;
                FAILED|CANCELED|TIMED_OUT) printf '%s' "$json" > /tmp/command-final.json; return 2 ;;
              esac
              sleep 15
            done
            printf '%s' "$json" > /tmp/command-final.json
            [ "$state" = ACCEPTED ] && return 3
            return 4
          }

          command_id="$(create_command)"
          if wait_command "$command_id" 24; then
            install_ok=1
          else
            rc=$?
            if [ "$rc" -eq 3 ]; then
              echo 'INSTANCE_AGENT_STUCK_ACCEPTED=yes'
              echo 'CONTROLLED_SOFTRESET_REQUESTED=yes'
              oci compute instance action --instance-id "$INSTANCE_ID" --action SOFTRESET >/dev/null
              oci compute instance get --instance-id "$INSTANCE_ID" --wait-for-state RUNNING --max-wait-seconds 900 >/dev/null
              sleep 90
              command_id="$(create_command)"
              wait_command "$command_id" 120
              install_ok=1
            else
              echo 'INSTALL_RESULT=failed'
              echo "ERROR=Oracle installation command failed with code $rc"
              jq -c '.data.content // {}' /tmp/command-final.json 2>/dev/null || true
              exit 1
            fi
          fi

          echo 'INSTANCE_COMMAND_SUCCEEDED=yes'
          jq -c '.data.content // {}' /tmp/command-final.json 2>/dev/null | tail -c 3000 || true
          echo
          echo 'INSTALL_COMMAND_RESULT=success'

      - name: Verify live WAHA installation
        id: verify
        shell: bash
        env:
          PUBLIC_IP: ${{ steps.oci.outputs.public_ip }}
          DOMAIN: ${{ vars.GATEWAY_DOMAIN || 'wa.nitutravels.in' }}
          WAHA_API_KEY: ${{ secrets.GATEWAY_API_KEY }}
        run: |
          set -Eeuo pipefail
          success=0
          final_status='UNKNOWN'
          final_version='{}'
          for attempt in $(seq 1 90); do
            args=(--silent --show-error --connect-timeout 8 --max-time 20 --resolve "$DOMAIN:443:$PUBLIC_IP")
            health_code="$(curl "${args[@]}" -o /tmp/waha-health.json -w '%{http_code}' "https://$DOMAIN/health" 2>/dev/null || true)"
            version_code="$(curl "${args[@]}" -H "X-Api-Key: $WAHA_API_KEY" -o /tmp/waha-version.json -w '%{http_code}' "https://$DOMAIN/api/server/version" 2>/dev/null || true)"
            session_code="$(curl "${args[@]}" -H "X-Api-Key: $WAHA_API_KEY" -o /tmp/waha-session.json -w '%{http_code}' "https://$DOMAIN/api/sessions/nitu-travels" 2>/dev/null || true)"
            engine="$(jq -r '.engine // "unknown"' /tmp/waha-version.json 2>/dev/null || echo unknown)"
            status="$(jq -r '.status // "UNKNOWN"' /tmp/waha-session.json 2>/dev/null || echo UNKNOWN)"
            echo "VERIFY_ATTEMPT=$attempt HEALTH_HTTP=${health_code:-000} VERSION_HTTP=${version_code:-000} SESSION_HTTP=${session_code:-000} ENGINE=$engine SESSION_STATUS=$status"
            [ -s /tmp/waha-version.json ] && final_version="$(cat /tmp/waha-version.json)"
            final_status="$status"
            if [ "$health_code" = 200 ] && [ "$version_code" = 200 ] && [ "$session_code" = 200 ] && [ "$engine" = NOWEB ]; then
              case "$status" in
                WORKING|SCAN_QR|STARTING|STOPPED) success=1; break ;;
              esac
            fi
            sleep 10
          done
          jq -n --argjson version "$final_version" --arg sessionStatus "$final_status" \
            '{version:$version,session:"nitu-travels",sessionStatus:$sessionStatus}' > /tmp/waha-sanitized.json
          cat /tmp/waha-sanitized.json | tee -a docs/waha-oracle-install-result.txt
          if [ "$success" -ne 1 ]; then
            echo 'INSTALL_RESULT=failed' | tee -a docs/waha-oracle-install-result.txt
            exit 1
          fi
          echo 'INSTALL_RESULT=success' | tee -a docs/waha-oracle-install-result.txt
          echo "FINISHED_AT=$(date -u +%FT%TZ)" | tee -a docs/waha-oracle-install-result.txt
          echo 'WAHA_ORACLE_INSTALL_END' | tee -a docs/waha-oracle-install-result.txt

      - name: Persist sanitized installation result
        if: always()
        shell: bash
        run: |
          set -Eeuo pipefail
          test -f docs/waha-oracle-install-result.txt || echo 'WAHA installation produced no result file.' > docs/waha-oracle-install-result.txt
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add docs/waha-oracle-install-result.txt
          git diff --cached --quiet || git commit -m 'Record WAHA Oracle installation result'
          git pull --rebase origin main
          git push origin HEAD:main
