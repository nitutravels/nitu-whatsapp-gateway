name: Terraform OCI backend diagnostic

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/terraform-init-diagnostic.yml'

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.15.8
      - name: Run minimal backend initialization
        shell: bash
        env:
          OCI_PRIVATE_KEY_PEM: ${{ secrets.OCI_PRIVATE_KEY }}
          OCI_FINGERPRINT_VALUE: ${{ secrets.OCI_FINGERPRINT }}
          STATE_BUCKET: ${{ vars.OCI_TF_STATE_BUCKET }}
          OCI_NAMESPACE_VALUE: ${{ vars.OCI_NAMESPACE }}
        run: |
          set +e
          mkdir -p "$HOME/.oci" /tmp/tf
          printf '%s\n' "$OCI_PRIVATE_KEY_PEM" > "$HOME/.oci/oci_api_key.pem"
          chmod 600 "$HOME/.oci/oci_api_key.pem"
          FINGERPRINT="$(printf '%s' "$OCI_FINGERPRINT_VALUE" | tr -d '[:space:]')"
          printf '[DEFAULT]\nuser=%s\nfingerprint=%s\ntenancy=%s\nregion=%s\nkey_file=%s/.oci/oci_api_key.pem\n' \
            '${{ secrets.OCI_USER_OCID }}' "$FINGERPRINT" '${{ secrets.OCI_TENANCY_OCID }}' '${{ vars.OCI_REGION }}' "$HOME" > "$HOME/.oci/config"
          chmod 600 "$HOME/.oci/config"
          printf 'terraform { backend "oci" {} }\n' > /tmp/tf/main.tf
          cd /tmp/tf
          terraform init -reconfigure -no-color \
            -backend-config="bucket=$STATE_BUCKET" \
            -backend-config="namespace=$OCI_NAMESPACE_VALUE" \
            -backend-config="region=${{ vars.OCI_REGION }}" \
            -backend-config="key=nitu-whatsapp-gateway/terraform.tfstate" \
            -backend-config="auth=APIKey" \
            -backend-config="config_file_profile=DEFAULT"
          RC=$?
          echo "terraform_init_exit=$RC"
          exit 1
