name: Fast WAHA Oracle install

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/waha-fast-install.yml'
      - 'Dockerfile'
      - 'docker/**'
      - 'scripts/deploy-waha.sh'
      - 'deploy/WAHA_FAST_INSTALL'

permissions:
  contents: write
  packages: write

concurrency:
  group: nitu-waha-fast-install
  cancel-in-progress: false

jobs:
  build-and-install:
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish immutable ARM64 WAHA image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: ghcr.io/${{ github.repository }}:waha-arm-${{ github.sha }}
          cache-from: type=gha,scope=waha-arm64
          cache-to: type=gha,mode=max,scope=waha-arm64
          provenance: false

      - name: Configure OCI credentials
        shell: bash
        env:
          OCI_PRIVATE_KEY_PEM: ${{ secrets.OCI_PRIVATE_KEY }}
          OCI_FINGERPRINT_VALUE: ${{ secrets.OCI_FINGERPRINT }}
        run: |
          set -Eeuo pipefail
          mkdir -p "$HOME/.oci"
          python - <<'PY'
          import os
          from pathlib import Path
          value = os.environ.get('OCI_PRIVATE_KEY_PEM', '').strip()
          if len(value) >= 2 and value[0] == value[-1] and value[0] in {'"', "'"}:
              value = value[1:-1]
          if '\\n' in value and '\n' not in value:
              value = value.replace('\\r', '').replace('\\n', '\n')
          Path.home().joinpath('.oci/key.pem').write_text(value.replace('\r', '').strip() + '\n', encoding='utf-8')
          PY
          chmod 600 "$HOME/.oci/key.pem"
          fingerprint="$(printf '%s' "$OCI_FINGERPRINT_VALUE" | tr -d '[:space:]')"
          cat > "$HOME/.oci/config" <<EOF
          [DEFAULT]
          user=${{ secrets.OCI_USER_OCID }}
          fingerprint=$fingerprint
          tenancy=${{ secrets.OCI_TENANCY_OCID }}
          region=${{ vars.OCI_REGION }}
          key_file=$HOME/.oci/key.pem
          EOF
          chmod 600 "$HOME/.oci/config"

      - name: Install OCI CLI
        shell: bash
        run: pipx install --quiet oci-cli

      - name: Deploy WAHA to running Oracle VM without reboot
        shell: bash
        env:
          COMPARTMENT_OCID: ${{ vars.OCI_COMPARTMENT_OCID }}
          DOMAIN: ${{ vars.GATEWAY_DOMAIN || 'wa.nitutravels.in' }}
          API_KEY: ${{ secrets.GATEWAY_API_KEY }}
          IMAGE: ghcr.io/${{ github.repository }}:waha-arm-${{ github.sha }}
          SESSION_NAME: nitu-travels
        run: |
          set -Eeuo pipefail
          mkdir -p docs
          chmod 0755 scripts/deploy-waha.sh
          scripts/deploy-waha.sh 2>&1 | tee docs/waha-fast-install-result.txt

      - name: Persist installation result
        if: always()
        shell: bash
        run: |
          set -Eeuo pipefail
          test -f docs/waha-fast-install-result.txt || echo 'Fast WAHA installation produced no result.' > docs/waha-fast-install-result.txt
          git config user.name 'github-actions[bot]'
          git config user.email '4189826+github-actions[bot]@users.noreply.github.com'
          git add docs/waha-fast-install-result.txt
          git diff --cached --quiet || git commit -m 'Record fast WAHA Oracle installation result'
          for attempt in 1 2 3 4 5; do
            git pull --rebase origin main && git push origin HEAD:main && exit 0
            sleep $((attempt * 5))
          done
          echo 'Installation ran, but result could not be committed to main.' >&2
          exit 1
