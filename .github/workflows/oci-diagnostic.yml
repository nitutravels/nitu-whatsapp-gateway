name: OCI deployment diagnostic

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/oci-diagnostic.yml'

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Configure OCI API credentials
        shell: bash
        env:
          OCI_PRIVATE_KEY_PEM: ${{ secrets.OCI_PRIVATE_KEY }}
        run: |
          set -Eeuo pipefail
          mkdir -p "$HOME/.oci"
          printf '%s' "$OCI_PRIVATE_KEY_PEM" > "$HOME/.oci/oci_api_key.pem"
          chmod 600 "$HOME/.oci/oci_api_key.pem"
          cat > "$HOME/.oci/config" <<EOF
          [DEFAULT]
          user=${{ secrets.OCI_USER_OCID }}
          fingerprint=${{ secrets.OCI_FINGERPRINT }}
          tenancy=${{ secrets.OCI_TENANCY_OCID }}
          region=${{ vars.OCI_REGION }}
          key_file=$HOME/.oci/oci_api_key.pem
          EOF
      - name: Install OCI CLI
        shell: bash
        run: pipx install --quiet oci-cli
      - name: Run sanitized OCI diagnostics
        shell: bash
        env:
          TENANCY_OCID: ${{ secrets.OCI_TENANCY_OCID }}
          CONFIGURED_COMPARTMENT_OCID: ${{ vars.OCI_COMPARTMENT_OCID }}
          CONFIGURED_NAMESPACE: ${{ vars.OCI_NAMESPACE }}
        run: |
          set +e
          redact() { sed -E 's/ocid1\.[A-Za-z0-9._-]+/[REDACTED_OCID]/g'; }

          [[ "$TENANCY_OCID" =~ ^ocid1\.tenancy\. ]] && echo 'tenancy_ocid_type=valid' || echo 'tenancy_ocid_type=invalid'
          [[ "$CONFIGURED_COMPARTMENT_OCID" =~ ^ocid1\.compartment\. ]] && echo 'configured_compartment_type=valid' || echo 'configured_compartment_type=invalid'
          [[ -n "$CONFIGURED_NAMESPACE" ]] && echo 'namespace_variable=present' || echo 'namespace_variable=missing'

          oci iam compartment list --compartment-id "$TENANCY_OCID" --compartment-id-in-subtree true --access-level ANY --limit 1 --output json >/tmp/comp.out 2>/tmp/comp.err
          COMP_RC=$?
          echo "compartment_list_exit=$COMP_RC"
          if [ "$COMP_RC" -ne 0 ]; then
            echo 'compartment_list_error_begin'
            head -n 30 /tmp/comp.err | redact
            echo 'compartment_list_error_end'
          fi

          oci search resource structured-search --query-text "query compartment resources where displayName = 'NituWAGateway'" --limit 1 --output json >/tmp/search.out 2>/tmp/search.err
          SEARCH_RC=$?
          echo "resource_search_exit=$SEARCH_RC"
          if [ "$SEARCH_RC" -ne 0 ]; then
            echo 'resource_search_error_begin'
            head -n 30 /tmp/search.err | redact
            echo 'resource_search_error_end'
          fi

          oci os ns get --output json >/tmp/ns.out 2>/tmp/ns.err
          NS_RC=$?
          echo "namespace_lookup_exit=$NS_RC"
          if [ "$NS_RC" -ne 0 ]; then
            echo 'namespace_lookup_error_begin'
            head -n 30 /tmp/ns.err | redact
            echo 'namespace_lookup_error_end'
          fi

          echo 'Diagnostic workflow intentionally fails after reporting results.'
          exit 1
