name: Probe Oracle agent during WAHA install

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['waha-oracle/AGENT-PROBE']

permissions:
  contents: write

jobs:
  probe:
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - name: Probe agent
        shell: bash
        env:
          OCI_PRIVATE_KEY_PEM: ${{ secrets.OCI_PRIVATE_KEY }}
          OCI_FINGERPRINT_VALUE: ${{ secrets.OCI_FINGERPRINT }}
          TENANCY_OCID: ${{ secrets.OCI_TENANCY_OCID }}
          CONFIGURED_COMPARTMENT_OCID: ${{ vars.OCI_COMPARTMENT_OCID }}
          REGION: ${{ vars.OCI_REGION }}
        run: |
          set -Eeuo pipefail
          mkdir -p "$HOME/.oci" docs
          python - <<'PY'
          import os
          from pathlib import Path
          v=os.environ.get('OCI_PRIVATE_KEY_PEM','').strip()
          if len(v)>=2 and v[0]==v[-1] and v[0] in {'"',"'"}: v=v[1:-1]
          if '\\n' in v and '\n' not in v: v=v.replace('\\r','').replace('\\n','\n')
          Path.home().joinpath('.oci/key.pem').write_text(v.replace('\r','').strip()+'\n')
          PY
          chmod 600 "$HOME/.oci/key.pem"
          cat > "$HOME/.oci/config" <<EOF
          [DEFAULT]
          user=${{ secrets.OCI_USER_OCID }}
          fingerprint=$(printf '%s' "$OCI_FINGERPRINT_VALUE" | tr -d '[:space:]')
          tenancy=$TENANCY_OCID
          region=$REGION
          key_file=$HOME/.oci/key.pem
          EOF
          chmod 600 "$HOME/.oci/config"
          pipx install --quiet oci-cli
          export PATH="$HOME/.local/bin:$PATH"
          compartment="$CONFIGURED_COMPARTMENT_OCID"
          if [[ ! "$compartment" =~ ^ocid1\.compartment\. ]]; then
            compartment="$(oci iam compartment list --compartment-id "$TENANCY_OCID" --compartment-id-in-subtree true --access-level ANY --all --output json | jq -r '[.data[]|select(.name=="NituWAGateway" and .["lifecycle-state"]=="ACTIVE")|.id][0]//empty')"
          fi
          instance_id="$(oci compute instance list --compartment-id "$compartment" --display-name nitu-whatsapp-gateway --all --query 'data[?"lifecycle-state"!=`TERMINATED`].id | [0]' --raw-output)"
          {
            echo 'ORACLE_AGENT_PROBE_BEGIN'
            echo "PROBED_AT=$(date -u +%FT%TZ)"
            echo "INSTANCE_ID=$instance_id"
            echo 'PLUGINS='
            oci instance-agent plugin list --compartment-id "$compartment" --instanceagent-id "$instance_id" --all --output json 2>/dev/null | jq -c '[.data[]|{name:.name,status:.status,"desired-state":.["desired-state"],"time-last-started":.["time-last-started"]}]' || echo '[]'
            echo 'RECENT_EXECUTIONS='
            oci instance-agent command-execution list --compartment-id "$compartment" --instance-id "$instance_id" --all --sort-by TIMECREATED --sort-order DESC --output json 2>/dev/null | jq -c '[.data[:8][]|{"command-id":.["command-id"],state:.["lifecycle-state"],"time-created":.["time-created"],"time-updated":.["time-updated"]}]' || echo '[]'
            echo 'ORACLE_AGENT_PROBE_END'
          } | tee docs/oracle-agent-probe.txt
      - name: Persist agent probe
        if: always()
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add docs/oracle-agent-probe.txt
          git diff --cached --quiet || git commit -m 'Record Oracle agent probe'
          git pull --rebase origin main
          git push origin HEAD:main
