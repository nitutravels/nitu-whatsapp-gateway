name: OCI authentication check

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/oci-auth-check.yml'

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Configure and validate signing key
        shell: bash
        env:
          OCI_PRIVATE_KEY_PEM: ${{ secrets.OCI_PRIVATE_KEY }}
          OCI_CONFIG_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
          OCI_USER: ${{ secrets.OCI_USER_OCID }}
          OCI_TENANCY: ${{ secrets.OCI_TENANCY_OCID }}
        run: |
          set -Eeuo pipefail
          mkdir -p "$HOME/.oci"
          python - <<'PY'
          import os
          from pathlib import Path
          value = os.environ.get('OCI_PRIVATE_KEY_PEM', '').strip()
          if len(value) >= 2 and value[0] == value[-1] and value[0] in {'"', "'"}:
              value = value[1:-1]
          if '\\n' in value and '\n' not in value:
              value = value.replace('\\r', '').replace('\\n', '\n')
          Path.home().joinpath('.oci/oci_api_key.pem').write_text(value.replace('\r', '').strip() + '\n', encoding='utf-8')
          PY
          chmod 600 "$HOME/.oci/oci_api_key.pem"

          DERIVED="$(openssl rsa -pubout -outform DER -in "$HOME/.oci/oci_api_key.pem" 2>/dev/null | openssl md5 -c | awk '{print tolower($2)}')"
          CONFIGURED="$(printf '%s' "$OCI_CONFIG_FINGERPRINT" | tr '[:upper:]' '[:lower:]' | tr -d '[:space:]')"
          [[ "$DERIVED" = "$CONFIGURED" ]] && echo 'private_key_matches_fingerprint=yes' || echo 'private_key_matches_fingerprint=no'
          [[ "$OCI_USER" =~ ^ocid1\.user\. ]] && echo 'user_ocid_type=valid' || echo 'user_ocid_type=invalid'
          [[ "$OCI_TENANCY" =~ ^ocid1\.tenancy\. ]] && echo 'tenancy_ocid_type=valid' || echo 'tenancy_ocid_type=invalid'

          cat > "$HOME/.oci/config" <<EOF
          [DEFAULT]
          user=$OCI_USER
          fingerprint=$OCI_CONFIG_FINGERPRINT
          tenancy=$OCI_TENANCY
          region=${{ vars.OCI_REGION }}
          key_file=$HOME/.oci/oci_api_key.pem
          EOF
          chmod 600 "$HOME/.oci/config"

      - name: Install OCI CLI
        run: pipx install --quiet oci-cli

      - name: Test signed requests
        shell: bash
        env:
          COMPARTMENT: ${{ vars.OCI_COMPARTMENT_OCID }}
          NAMESPACE: ${{ vars.OCI_NAMESPACE }}
          STATE_BUCKET: ${{ vars.OCI_TF_STATE_BUCKET }}
          OCI_CLI_SUPPRESS_FILE_PERMISSIONS_WARNING: 'True'
          SUPPRESS_LABEL_WARNING: 'True'
        run: |
          set +e
          report() {
            local label="$1" file="$2" rc="$3"
            echo "${label}_exit=${rc}"
            if [ "$rc" -ne 0 ]; then
              grep -E '"code"|"message"|"status"' "$file" | head -n 8 || true
            fi
          }

          oci iam compartment get --compartment-id "$COMPARTMENT" >/dev/null 2>/tmp/comp.err
          RC=$?
          report compartment_get /tmp/comp.err "$RC"

          oci os bucket get --namespace-name "$NAMESPACE" --bucket-name "$STATE_BUCKET" >/dev/null 2>/tmp/bucket.err
          RC=$?
          report bucket_get /tmp/bucket.err "$RC"

          exit 1
