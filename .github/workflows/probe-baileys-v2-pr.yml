name: Observe live Baileys v2 deployment

on:
  pull_request:
    paths:
      - '.github/workflows/probe-baileys-v2-pr.yml'

permissions:
  contents: read

jobs:
  observe:
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 22
    steps:
      - uses: actions/checkout@v7
      - name: Configure OCI credentials
        shell: bash
        env:
          OCI_PRIVATE_KEY_PEM: ${{ secrets.OCI_PRIVATE_KEY }}
          OCI_FINGERPRINT_VALUE: ${{ secrets.OCI_FINGERPRINT }}
        run: |
          set -Eeuo pipefail
          mkdir -p "$HOME/.oci"
          python - <<'PY'
          import os
          from pathlib import Path
          value = os.environ.get('OCI_PRIVATE_KEY_PEM', '').strip()
          if len(value) >= 2 and value[0] == value[-1] and value[0] in {'"', "'"}:
              value = value[1:-1]
          if '\\n' in value and '\n' not in value:
              value = value.replace('\\r', '').replace('\\n', '\n')
          Path.home().joinpath('.oci/key.pem').write_text(value.replace('\r', '').strip() + '\n', encoding='utf-8')
          PY
          chmod 600 "$HOME/.oci/key.pem"
          fingerprint="$(printf '%s' "$OCI_FINGERPRINT_VALUE" | tr -d '[:space:]')"
          cat > "$HOME/.oci/config" <<EOF
          [DEFAULT]
          user=${{ secrets.OCI_USER_OCID }}
          fingerprint=$fingerprint
          tenancy=${{ secrets.OCI_TENANCY_OCID }}
          region=${{ vars.OCI_REGION }}
          key_file=$HOME/.oci/key.pem
          EOF
          chmod 600 "$HOME/.oci/config"
          pipx install --quiet oci-cli

      - name: Wait for live Baileys engine
        shell: bash
        env:
          COMPARTMENT_OCID: ${{ vars.OCI_COMPARTMENT_OCID }}
          DOMAIN: ${{ vars.GATEWAY_DOMAIN || 'wa.nitutravels.in' }}
          ADMIN_TOKEN: ${{ secrets.GATEWAY_ADMIN_TOKEN }}
        run: |
          set -Eeuo pipefail
          instance_id="$(oci compute instance list --compartment-id "$COMPARTMENT_OCID" --display-name nitu-whatsapp-gateway --all --query 'data[?"lifecycle-state"!=`TERMINATED`].id | [0]' --raw-output)"
          vnic_id="$(oci compute vnic-attachment list --compartment-id "$COMPARTMENT_OCID" --instance-id "$instance_id" --all --query 'data[?"lifecycle-state"==`ATTACHED`]."vnic-id" | [0]' --raw-output)"
          public_ip="$(oci network vnic get --vnic-id "$vnic_id" --query 'data."public-ip"' --raw-output)"
          for attempt in $(seq 1 120); do
            health_code="$(curl -sS --connect-timeout 8 --max-time 20 --resolve "$DOMAIN:443:$public_ip" -o /tmp/health.json -w '%{http_code}' "https://$DOMAIN/healthz" || true)"
            status_code="$(curl -sS --connect-timeout 8 --max-time 20 --resolve "$DOMAIN:443:$public_ip" -H "Authorization: Bearer $ADMIN_TOKEN" -o /tmp/status.json -w '%{http_code}' "https://$DOMAIN/admin/api/status" || true)"
            engine="$(jq -r '.engine // "unknown"' /tmp/status.json 2>/dev/null || echo unknown)"
            phase="$(jq -r '.phase // "unknown"' /tmp/status.json 2>/dev/null || echo unknown)"
            ready="$(jq -r '.ready // false' /tmp/status.json 2>/dev/null || echo false)"
            has_qr="$(jq -r '((.qrDataUrl // "") | length) > 20' /tmp/status.json 2>/dev/null || echo false)"
            has_code="$(jq -r '((.pairingCode // "") | length) >= 8' /tmp/status.json 2>/dev/null || echo false)"
            echo "ATTEMPT=$attempt HEALTH_HTTP=$health_code STATUS_HTTP=$status_code ENGINE=$engine PHASE=$phase READY=$ready HAS_QR=$has_qr HAS_CODE=$has_code"
            if [ "$health_code" = 200 ] && [ "$status_code" = 200 ] && [ "$engine" = baileys-websocket ] && { [ "$ready" = true ] || { [ "$phase" = pairing ] && { [ "$has_qr" = true ] || [ "$has_code" = true ]; }; }; }; then
              jq '{engine,engineVersion,status,phase,ready,connected,registered,account,hasQr:((.qrDataUrl // "")|length>20),hasPairingCode:((.pairingCode // "")|length>=8),queue,worker,lastErrorPresent:((.lastError // "")|length>0)}' /tmp/status.json
              exit 0
            fi
            sleep 10
          done
          echo 'Live Baileys v2 acceptance condition was not reached.' >&2
          jq '{engine,engineVersion,status,phase,ready,connected,registered,account,queue,worker,lastErrorPresent:((.lastError // "")|length>0)}' /tmp/status.json 2>/dev/null || true
          exit 1
