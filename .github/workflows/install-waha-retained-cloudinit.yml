name: Install WAHA using retained Oracle cloud-init

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/install-waha-retained-cloudinit.yml'
      - 'Dockerfile'
      - 'docker/waha-entrypoint.sh'
      - 'docker/nitu-waha-supervisor.mjs'
      - 'waha-oracle/RETAINED-CLOUD-INIT'

permissions:
  contents: write
  packages: write

concurrency:
  group: nitu-waha-retained-cloud-init
  cancel-in-progress: false

jobs:
  install:
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 75

    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build immutable WAHA image
        id: image
        shell: bash
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
      - uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.image.outputs.name }}
            ghcr.io/${{ github.repository }}:waha-production
          provenance: mode=max
          sbom: true

      - name: Configure OCI CLI
        shell: bash
        env:
          OCI_PRIVATE_KEY_PEM: ${{ secrets.OCI_PRIVATE_KEY }}
          OCI_FINGERPRINT_VALUE: ${{ secrets.OCI_FINGERPRINT }}
        run: |
          set -Eeuo pipefail
          mkdir -p "$HOME/.oci"
          python - <<'PY'
          import os
          from pathlib import Path
          value=os.environ.get('OCI_PRIVATE_KEY_PEM','').strip()
          if len(value)>=2 and value[0]==value[-1] and value[0] in {'"',"'"}: value=value[1:-1]
          if '\\n' in value and '\n' not in value: value=value.replace('\\r','').replace('\\n','\n')
          Path.home().joinpath('.oci/key.pem').write_text(value.replace('\r','').strip()+'\n')
          PY
          chmod 600 "$HOME/.oci/key.pem"
          cat > "$HOME/.oci/config" <<EOF
          [DEFAULT]
          user=${{ secrets.OCI_USER_OCID }}
          fingerprint=$(printf '%s' "$OCI_FINGERPRINT_VALUE" | tr -d '[:space:]')
          tenancy=${{ secrets.OCI_TENANCY_OCID }}
          region=${{ vars.OCI_REGION }}
          key_file=$HOME/.oci/key.pem
          EOF
          chmod 600 "$HOME/.oci/config"
          pipx install --quiet oci-cli
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Recreate fresh OS using retained cloud-init and verify WAHA
        shell: bash
        env:
          TENANCY_OCID: ${{ secrets.OCI_TENANCY_OCID }}
          CONFIGURED_COMPARTMENT_OCID: ${{ vars.OCI_COMPARTMENT_OCID }}
          DOMAIN: ${{ vars.GATEWAY_DOMAIN || 'wa.nitutravels.in' }}
          WAHA_API_KEY: ${{ secrets.GATEWAY_API_KEY }}
          IMAGE: ${{ steps.image.outputs.name }}
        run: |
          set -Eeuo pipefail
          mkdir -p docs
          exec > >(tee docs/waha-retained-cloudinit-result.txt) 2>&1
          echo 'WAHA_RETAINED_CLOUD_INIT_BEGIN'
          echo "STARTED_AT=$(date -u +%FT%TZ)"

          compartment="$CONFIGURED_COMPARTMENT_OCID"
          if [[ ! "$compartment" =~ ^ocid1\.compartment\. ]]; then
            compartment="$(oci iam compartment list --compartment-id "$TENANCY_OCID" --compartment-id-in-subtree true --access-level ANY --all --output json | jq -r '[.data[]|select(.name=="NituWAGateway" and .["lifecycle-state"]=="ACTIVE")|.id][0]//empty')"
          fi
          [[ "$compartment" =~ ^ocid1\.compartment\. ]] || { echo 'INSTALL_RESULT=failed'; echo 'ERROR=Unable to resolve NituWAGateway compartment'; exit 1; }

          instance_id="$(oci compute instance list --compartment-id "$compartment" --display-name nitu-whatsapp-gateway --all --query 'data[?"lifecycle-state"!=`TERMINATED`].id | [0]' --raw-output)"
          [[ "$instance_id" =~ ^ocid1\.instance\. ]] || { echo 'INSTALL_RESULT=failed'; echo 'ERROR=Oracle gateway instance not found'; exit 1; }
          oci compute instance get --instance-id "$instance_id" --output json > /tmp/instance.json
          state="$(jq -r '.data["lifecycle-state"]' /tmp/instance.json)"
          ad="$(jq -r '.data["availability-domain"]' /tmp/instance.json)"
          source_image="$(jq -r '.data["image-id"] // empty' /tmp/instance.json)"
          [[ "$source_image" =~ ^ocid1\.image\. ]] || { echo 'INSTALL_RESULT=failed'; echo 'ERROR=Current Ubuntu source image not found'; exit 1; }
          vnic="$(oci compute vnic-attachment list --compartment-id "$compartment" --instance-id "$instance_id" --all --query 'data[?"lifecycle-state"==`ATTACHED`]."vnic-id" | [0]' --raw-output)"
          public_ip="$(oci network vnic get --vnic-id "$vnic" --query 'data."public-ip"' --raw-output)"
          current_boot="$(oci compute boot-volume-attachment list --availability-domain "$ad" --compartment-id "$compartment" --instance-id "$instance_id" --all --query 'data[?"lifecycle-state"==`ATTACHED`]."boot-volume-id" | [0]' --raw-output)"
          rollback_boot='ocid1.bootvolume.oc1.ap-mumbai-1.abrg6ljrkoazxrkea4slxzw55oqmtfdsncly3c7odpf633wd2tzhdvw67fwq'
          echo "INSTANCE_ID=$instance_id"
          echo "PUBLIC_IP=$public_ip"
          echo "CURRENT_BOOT_VOLUME=$current_boot"
          echo "PRESERVED_ROLLBACK_BOOT_VOLUME=$rollback_boot"
          echo "WAHA_IMAGE=$IMAGE"

          # Preserve the immutable original user_data exactly. Only update the
          # mutable application environment consumed by the retained first-boot
          # metadata-sync design.
          gateway_env_b64="$(jq -r '.data.metadata.gateway_env_b64 // empty' /tmp/instance.json)"
          user_data="$(jq -r '.data.metadata.user_data // empty' /tmp/instance.json)"
          [ -n "$gateway_env_b64" ] || { echo 'INSTALL_RESULT=failed'; echo 'ERROR=gateway_env_b64 metadata is missing'; exit 1; }
          [ -n "$user_data" ] || { echo 'INSTALL_RESULT=failed'; echo 'ERROR=retained user_data metadata is missing'; exit 1; }
          printf '%s' "$gateway_env_b64" | base64 --decode > /tmp/gateway.env
          grep -q '^API_KEY=' /tmp/gateway.env || { echo 'INSTALL_RESULT=failed'; echo 'ERROR=API_KEY missing from retained environment'; exit 1; }
          grep -q '^ADMIN_TOKEN=' /tmp/gateway.env || { echo 'INSTALL_RESULT=failed'; echo 'ERROR=ADMIN_TOKEN missing from retained environment'; exit 1; }
          if grep -q '^GATEWAY_IMAGE=' /tmp/gateway.env; then sed -i "s|^GATEWAY_IMAGE=.*$|GATEWAY_IMAGE=$IMAGE|" /tmp/gateway.env; else printf 'GATEWAY_IMAGE=%s\n' "$IMAGE" >> /tmp/gateway.env; fi
          if grep -q '^WEBHOOK_URL=' /tmp/gateway.env; then sed -i 's|^WEBHOOK_URL=.*$|WEBHOOK_URL=https://manage.nitutravels.in/whatsapp-waha-webhook.php|' /tmp/gateway.env; else echo 'WEBHOOK_URL=https://manage.nitutravels.in/whatsapp-waha-webhook.php' >> /tmp/gateway.env; fi
          if grep -q '^PUBLIC_BASE_URL=' /tmp/gateway.env; then sed -i "s|^PUBLIC_BASE_URL=.*$|PUBLIC_BASE_URL=https://$DOMAIN|" /tmp/gateway.env; else echo "PUBLIC_BASE_URL=https://$DOMAIN" >> /tmp/gateway.env; fi
          grep -q '^WEBSITE_WORKER_URL=' /tmp/gateway.env || echo 'WEBSITE_WORKER_URL=https://manage.nitutravels.in/whatsapp-dispatch-worker.php' >> /tmp/gateway.env
          grep -q '^WAHA_SESSION=' /tmp/gateway.env || echo 'WAHA_SESSION=nitu-travels' >> /tmp/gateway.env
          updated_env_b64="$(base64 -w0 /tmp/gateway.env)"

          rollback_needed=0
          rollback() {
            rc=$?
            trap - ERR
            set +e
            echo "INSTALL_FAILURE_CODE=$rc"
            if [ "$rollback_needed" -eq 1 ]; then
              echo 'ROLLBACK_BEGIN=yes'
              for attempt in $(seq 1 45); do
                lifecycle="$(oci compute instance get --instance-id "$instance_id" --query 'data."lifecycle-state"' --raw-output 2>/dev/null || true)"
                [ "$lifecycle" = STOPPED ] && break
                if [ "$lifecycle" = RUNNING ]; then oci compute instance action --instance-id "$instance_id" --action STOP >/dev/null 2>&1 || true; fi
                sleep 20
              done
              if oci compute instance update-instance-update-instance-source-via-boot-volume-details --instance-id "$instance_id" --source-details-boot-volume-id "$rollback_boot" --source-details-is-preserve-boot-volume-enabled false --update-operation-constraint ALLOW_DOWNTIME --force --wait-for-state STOPPED --max-wait-seconds 1800 >/tmp/rollback.json 2>/tmp/rollback.err; then
                sleep 60
                for attempt in $(seq 1 40); do
                  oci compute instance action --instance-id "$instance_id" --action START >/dev/null 2>&1 && break
                  sleep 20
                done
                echo 'ROLLBACK_RESULT=legacy_boot_volume_restored'
              else
                echo 'ROLLBACK_RESULT=failed'
                tail -n 5 /tmp/rollback.err 2>/dev/null || true
              fi
            else
              echo 'ROLLBACK_RESULT=not_required'
            fi
            echo 'INSTALL_RESULT=failed'
            echo "FINISHED_AT=$(date -u +%FT%TZ)"
            echo 'WAHA_RETAINED_CLOUD_INIT_END'
            exit "$rc"
          }
          trap rollback ERR

          if [ "$state" != STOPPED ]; then
            oci compute instance action --instance-id "$instance_id" --action STOP --wait-for-state STOPPED --max-wait-seconds 900 >/dev/null
          fi
          oci compute instance get --instance-id "$instance_id" --output json > /tmp/stopped.json
          jq --arg env "$updated_env_b64" '.data.metadata | .gateway_env_b64=$env' /tmp/stopped.json > /tmp/metadata.json
          oci compute instance update --instance-id "$instance_id" --metadata file:///tmp/metadata.json --update-operation-constraint AVOID_DOWNTIME --force >/dev/null
          echo 'WAHA_METADATA_PINNED=yes'

          rollback_needed=1
          oci compute instance update-instance-update-instance-source-via-image-details --instance-id "$instance_id" --source-details-image-id "$source_image" --source-details-is-preserve-boot-volume-enabled false --update-operation-constraint ALLOW_DOWNTIME --force --wait-for-state STOPPED --max-wait-seconds 1800 >/tmp/reimage.json
          echo 'FRESH_WAHA_BOOT_VOLUME_READY=yes'
          sleep 75

          started=0
          for attempt in $(seq 1 45); do
            lifecycle="$(oci compute instance get --instance-id "$instance_id" --query 'data."lifecycle-state"' --raw-output)"
            echo "START_ATTEMPT=$attempt STATE=$lifecycle"
            if [ "$lifecycle" = RUNNING ]; then started=1; break; fi
            if [ "$lifecycle" = STOPPED ]; then oci compute instance action --instance-id "$instance_id" --action START >/tmp/start.json 2>/tmp/start.err || true; fi
            sleep 20
          done
          [ "$started" -eq 1 ] || { echo 'ERROR=WAHA Oracle OS did not reach RUNNING'; false; }
          echo 'WAHA_OS_RUNNING=yes'

          verified=0
          final_status=UNKNOWN
          for attempt in $(seq 1 180); do
            args=(--silent --show-error --connect-timeout 8 --max-time 20 --resolve "$DOMAIN:443:$public_ip")
            health_code="$(curl "${args[@]}" -o /tmp/health.json -w '%{http_code}' "https://$DOMAIN/health" 2>/dev/null || true)"
            version_code="$(curl "${args[@]}" -H "X-Api-Key: $WAHA_API_KEY" -o /tmp/version.json -w '%{http_code}' "https://$DOMAIN/api/server/version" 2>/dev/null || true)"
            session_code="$(curl "${args[@]}" -H "X-Api-Key: $WAHA_API_KEY" -o /tmp/session.json -w '%{http_code}' "https://$DOMAIN/api/sessions/nitu-travels" 2>/dev/null || true)"
            engine="$(jq -r '.engine // "unknown"' /tmp/version.json 2>/dev/null || echo unknown)"
            final_status="$(jq -r '.status // "UNKNOWN"' /tmp/session.json 2>/dev/null || echo UNKNOWN)"
            echo "VERIFY_ATTEMPT=$attempt HEALTH=${health_code:-000} VERSION=${version_code:-000} SESSION=${session_code:-000} ENGINE=$engine STATUS=$final_status"
            if [ "$health_code" = 200 ] && [ "$version_code" = 200 ] && [ "$session_code" = 200 ] && [ "$engine" = NOWEB ]; then
              case "$final_status" in WORKING|SCAN_QR_CODE) verified=1; break ;; esac
            fi
            sleep 10
          done
          [ "$verified" -eq 1 ] || { echo 'ERROR=WAHA did not reach verified QR-ready or WORKING state'; false; }

          rollback_needed=0
          trap - ERR
          echo 'INSTALL_RESULT=success'
          echo "SESSION_STATUS=$final_status"
          echo "FINISHED_AT=$(date -u +%FT%TZ)"
          echo 'WAHA_RETAINED_CLOUD_INIT_END'

      - name: Persist sanitized installation result
        if: always()
        shell: bash
        run: |
          set -Eeuo pipefail
          test -f docs/waha-retained-cloudinit-result.txt || echo 'WAHA retained-cloud-init installation produced no result file.' > docs/waha-retained-cloudinit-result.txt
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add docs/waha-retained-cloudinit-result.txt
          git diff --cached --quiet || git commit -m 'Record WAHA retained-cloud-init installation result'
          git pull --rebase origin main
          git push origin HEAD:main
