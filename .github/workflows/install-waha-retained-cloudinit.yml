name: Retained-cloud-init reimage — completed

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/install-waha-retained-cloudinit.yml'

permissions:
  contents: read

concurrency:
  group: nitu-waha-retained-cloud-init
  cancel-in-progress: true

jobs:
  completed:
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo 'The fresh Oracle OS and retained cloud-init are already installed.'
          echo 'Further WAHA updates use metadata image rollout without another reimage.'
