name: Replace unhealthy Oracle WAHA VM deterministically

on:
  pull_request:
    branches: [main]

permissions:
  contents: write
  packages: write

concurrency:
  group: replace-unhealthy-oracle-waha-vm
  cancel-in-progress: false

jobs:
  replace:
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 55
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create architecture-correct x86 WAHA Dockerfile
        shell: bash
        run: |
          cat > Dockerfile.replacement <<'EOF'
          FROM devlikeapro/waha:noweb-2026.7.1
          LABEL org.opencontainers.image.source="https://github.com/nitutravels/nitu-whatsapp-gateway"
          COPY --chmod=0755 docker/waha-entrypoint.sh /usr/local/bin/nitu-waha-entrypoint
          COPY docker/nitu-waha-supervisor.mjs /usr/local/lib/nitu-waha-supervisor.mjs
          EXPOSE 3000
          HEALTHCHECK --interval=30s --timeout=8s --start-period=90s --retries=5 CMD node -e "fetch('http://127.0.0.1:3000/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"
          ENTRYPOINT ["/usr/local/bin/nitu-waha-entrypoint"]
          EOF

      - name: Build pinned x86 WAHA replacement image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.replacement
          platforms: linux/amd64
          push: true
          tags: ghcr.io/nitutravels/nitu-whatsapp-gateway:replacement-${{ github.run_id }}
          provenance: mode=max
          sbom: true
          cache-from: type=gha,scope=waha-replacement-amd64
          cache-to: type=gha,mode=max,scope=waha-replacement-amd64

      - name: Prove the image is anonymously pullable and healthy
        shell: bash
        env:
          IMAGE: ghcr.io/nitutravels/nitu-whatsapp-gateway:replacement-${{ github.run_id }}
        run: |
          set -Eeuo pipefail
          docker logout ghcr.io >/dev/null 2>&1 || true
          docker pull "$IMAGE"
          test "$(docker image inspect "$IMAGE" --format '{{.Architecture}}')" = amd64
          rm -rf /tmp/waha-smoke && mkdir -p /tmp/waha-smoke
          docker run -d --rm --name nitu-waha-replacement-smoke \
            -p 127.0.0.1:3300:3000 \
            -e API_KEY=0000000000000000000000000000000000000000 \
            -e ADMIN_TOKEN=1111111111111111111111111111111111111111 \
            -e WEBHOOK_SECRET=2222222222222222222222222222222222222222 \
            -e WEBHOOK_URL= \
            -e WEBSITE_WORKER_URL= \
            -e PUBLIC_BASE_URL=http://127.0.0.1:3300 \
            -v /tmp/waha-smoke:/data \
            "$IMAGE"
          trap 'docker logs nitu-waha-replacement-smoke 2>&1 | tail -n 200 || true; docker stop nitu-waha-replacement-smoke >/dev/null 2>&1 || true' EXIT
          for attempt in $(seq 1 30); do
            code="$(curl -sS --connect-timeout 3 --max-time 8 -o /tmp/smoke-health -w '%{http_code}' http://127.0.0.1:3300/health 2>/dev/null || true)"
            echo "SMOKE_ATTEMPT=$attempt HTTP=$code"
            [ "$code" = 200 ] && break
            [ "$attempt" = 30 ] && exit 1
            sleep 4
          done
          docker stop nitu-waha-replacement-smoke >/dev/null
          trap - EXIT

      - name: Configure official Oracle OCI MCP
        shell: bash
        env:
          KEY: ${{ secrets.OCI_PRIVATE_KEY }}
          FP: ${{ secrets.OCI_FINGERPRINT }}
          USER_OCID: ${{ secrets.OCI_USER_OCID }}
          TENANCY: ${{ secrets.OCI_TENANCY_OCID }}
          REGION: ${{ vars.OCI_REGION }}
        run: |
          set -Eeuo pipefail
          mkdir -p ~/.oci
          python -c 'import os,pathlib;v=os.environ["KEY"].strip().strip("\"\047").replace("\\r","").replace("\\n","\n");pathlib.Path.home().joinpath(".oci/key.pem").write_text(v.strip()+"\n")'
          chmod 600 ~/.oci/key.pem
          printf '[DEFAULT]\nuser=%s\nfingerprint=%s\ntenancy=%s\nregion=%s\nkey_file=%s/.oci/key.pem\n' "$USER_OCID" "$(echo "$FP" | tr -d '[:space:]')" "$TENANCY" "$REGION" "$HOME" > ~/.oci/config
          chmod 600 ~/.oci/config
          pipx install --quiet uv

      - name: Restore the reviewed replacement controller
        shell: bash
        run: |
          set -Eeuo pipefail
          git fetch --no-tags --depth=1 origin 4e5142f9bf406b1823895d02c58e803c47d6afc2
          git show FETCH_HEAD:.github/workflows/waha-live-probe.yml \
            | sed -n "/cat > \/tmp\/replace.b64 <<'B64'/,/^          B64$/p" \
            | sed '1d;$d;s/^          //' > /tmp/replace.b64
          test -s /tmp/replace.b64
          base64 -d /tmp/replace.b64 | gzip -dc > /tmp/replace_oracle_waha.py
          python -m py_compile /tmp/replace_oracle_waha.py

      - name: Launch, validate and cut over the clean Oracle replacement
        id: replace
        shell: bash
        env:
          COMPARTMENT_OCID: ${{ vars.OCI_COMPARTMENT_OCID }}
          TARGET_IMAGE: ghcr.io/nitutravels/nitu-whatsapp-gateway:replacement-${{ github.run_id }}
          DOMAIN: ${{ vars.GATEWAY_DOMAIN || 'wa.nitutravels.in' }}
          REPLACEMENT_NAME: nitu-whatsapp-gateway-waha-${{ github.run_id }}
          RESULT_PATH: docs/waha-replacement-result.json
          OCI_CONFIG_PROFILE: DEFAULT
          FASTMCP_LOG_LEVEL: ERROR
        run: |
          set -o pipefail
          uv run --with 'mcp>=1.0' python /tmp/replace_oracle_waha.py 2>&1 | tee /tmp/replacement.log

      - name: Persist sanitized replacement result
        if: always()
        shell: bash
        run: |
          set -Eeuo pipefail
          mkdir -p docs
          if [ ! -f docs/waha-replacement-result.json ]; then
            echo '{"result":"workflow_failed_before_controller_result"}' > docs/waha-replacement-result.json
          fi
          tail -n 250 /tmp/replacement.log 2>/dev/null | sed -E 's/(API_KEY|ADMIN_TOKEN|WEBHOOK_SECRET|POSTGRES_PASSWORD)=([^[:space:]]+)/\1=***REDACTED***/Ig' > docs/waha-replacement-log-tail.txt || true
          git config user.name 'github-actions[bot]'
          git config user.email '4189826+github-actions[bot]@users.noreply.github.com'
          git add docs/waha-replacement-result.json docs/waha-replacement-log-tail.txt
          git diff --cached --quiet || git commit -m 'Record deterministic Oracle WAHA replacement result'
          git pull --rebase origin "${{ github.event.pull_request.head.ref }}" || true
          git push origin HEAD:"${{ github.event.pull_request.head.ref }}"
