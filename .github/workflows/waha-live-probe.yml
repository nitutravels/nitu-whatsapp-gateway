name: Extract Bastion failure tail

on:
  pull_request:
    branches: [main]

permissions:
  actions: read
  contents: write

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.ref }}
      - name: Download only the completed job log
        env:
          GH_TOKEN: ${{ github.token }}
          JOB_ID: '88215224800'
        run: |
          set -Eeuo pipefail
          mkdir -p docs
          curl -fsSL -H "Authorization: Bearer $GH_TOKEN" -H 'Accept: application/vnd.github+json' \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/jobs/${JOB_ID}/logs" -o /tmp/job.log
          tail -n 160 /tmp/job.log \
            | sed -E 's/(API_KEY|ADMIN_TOKEN|WEBHOOK_SECRET|password|token)=([^[:space:]]+)/\1=***REDACTED***/Ig' \
            > docs/bastion-failure-tail.txt
      - name: Persist diagnostic tail
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '4189826+github-actions[bot]@users.noreply.github.com'
          git add docs/bastion-failure-tail.txt
          git diff --cached --quiet || git commit -m 'Record Bastion failure tail'
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
