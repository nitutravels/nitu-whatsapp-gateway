name: Extract replacement build failure

on:
  pull_request:
    branches: [main]

permissions:
  actions: read
  contents: write

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.ref }}
      - name: Extract final build error
        env:
          GH_TOKEN: ${{ github.token }}
          JOB_ID: '88217572555'
        run: |
          set -Eeuo pipefail
          mkdir -p docs
          curl -fsSL -H "Authorization: Bearer $GH_TOKEN" -H 'Accept: application/vnd.github+json' \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/jobs/${JOB_ID}/logs" -o /tmp/job.log
          tail -n 220 /tmp/job.log > docs/replacement-build-failure-tail.txt
      - name: Persist error
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '4189826+github-actions[bot]@users.noreply.github.com'
          git add docs/replacement-build-failure-tail.txt
          git diff --cached --quiet || git commit -m 'Record replacement image build failure'
          git pull --rebase origin "${{ github.event.pull_request.head.ref }}" || true
          git push origin HEAD:"${{ github.event.pull_request.head.ref }}"
