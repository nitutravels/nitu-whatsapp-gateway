name: Verify final WAHA session after Oracle replacement

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: final-waha-session-verification
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Check and normalize WAHA session state
        shell: bash
        env:
          DOMAIN: ${{ vars.GATEWAY_DOMAIN || 'wa.nitutravels.in' }}
          API_KEY: ${{ secrets.GATEWAY_API_KEY }}
        run: |
          set -Eeuo pipefail
          mkdir -p docs
          final_health=000
          final_session=000
          final_status=unknown
          for attempt in $(seq 1 12); do
            final_health="$(curl -sS --connect-timeout 8 --max-time 25 -o /tmp/health -w '%{http_code}' "https://$DOMAIN/health" || true)"
            final_session="$(curl -sS --connect-timeout 8 --max-time 25 -H "X-Api-Key: $API_KEY" -o /tmp/session -w '%{http_code}' "https://$DOMAIN/api/sessions/nitu-travels" || true)"
            final_status="$(jq -r '.status // "unknown"' /tmp/session 2>/dev/null || echo unknown)"
            echo "CHECK=$attempt HEALTH=$final_health SESSION=$final_session STATUS=$final_status"
            if [ "$final_health" = 200 ] && [ "$final_session" = 404 ]; then
              curl -sS -H "X-Api-Key: $API_KEY" -H 'Content-Type: application/json' -X POST --data '{"name":"nitu-travels"}' "https://$DOMAIN/api/sessions" >/dev/null || true
            elif [ "$final_session" = 200 ]; then
              case "$final_status" in
                WORKING|SCAN_QR_CODE|PASSKEY_REQUIRED|PASSKEY_CONFIRMATION_REQUIRED)
                  break
                  ;;
                STOPPED)
                  curl -sS -H "X-Api-Key: $API_KEY" -H 'Content-Type: application/json' -X POST --data '{}' "https://$DOMAIN/api/sessions/nitu-travels/start" >/dev/null || true
                  ;;
                FAILED)
                  curl -sS -H "X-Api-Key: $API_KEY" -H 'Content-Type: application/json' -X POST --data '{}' "https://$DOMAIN/api/sessions/nitu-travels/restart" >/dev/null || true
                  ;;
              esac
            fi
            [ "$attempt" = 12 ] || sleep 10
          done
          python - "$final_health" "$final_session" "$final_status" <<'PY'
          import json,sys
          body={}
          try: body=json.load(open('/tmp/session'))
          except Exception: pass
          result={
            'health_http':sys.argv[1],
            'session_http':sys.argv[2],
            'session_status':sys.argv[3],
            'name':body.get('name'),
            'engine':((body.get('engine') or {}).get('engine') if isinstance(body.get('engine'),dict) else body.get('engine')),
            'me':body.get('me'),
          }
          json.dump(result,open('docs/waha-final-session-verification.json','w'),indent=2,sort_keys=True)
          PY
          test "$final_health" = 200
          test "$final_session" = 200
          case "$final_status" in WORKING|SCAN_QR_CODE|PASSKEY_REQUIRED|PASSKEY_CONFIRMATION_REQUIRED) exit 0;; *) exit 1;; esac

      - name: Persist final session verification
        if: always()
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '4189826+github-actions[bot]@users.noreply.github.com'
          git add docs/waha-final-session-verification.json
          git diff --cached --quiet || git commit -m 'Record final WAHA session verification'
          git pull --rebase origin "${{ github.event.pull_request.head.ref }}" || true
          git push origin HEAD:"${{ github.event.pull_request.head.ref }}"
