name: Install and verify WAHA production

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

concurrency:
  group: manual-waha-oracle-install
  cancel-in-progress: true

jobs:
  install:
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 50
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and publish WAHA ARM64 image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/arm64
          tags: ghcr.io/nitutravels/nitu-whatsapp-gateway:manual-waha-install-20260719
          cache-from: type=gha,scope=manual-waha-install
          cache-to: type=gha,mode=max,scope=manual-waha-install
      - name: Configure OCI
        env:
          KEY: ${{ secrets.OCI_PRIVATE_KEY }}
          FP: ${{ secrets.OCI_FINGERPRINT }}
          USER_OCID: ${{ secrets.OCI_USER_OCID }}
          TENANCY: ${{ secrets.OCI_TENANCY_OCID }}
          REGION: ${{ vars.OCI_REGION }}
        run: |
          mkdir -p ~/.oci
          python -c 'import os,pathlib;v=os.environ["KEY"].strip().strip("\"'\''").replace("\\r","").replace("\\n","\n");pathlib.Path.home().joinpath(".oci/key.pem").write_text(v.strip()+"\n")'
          chmod 600 ~/.oci/key.pem
          printf '[DEFAULT]\nuser=%s\nfingerprint=%s\ntenancy=%s\nregion=%s\nkey_file=%s/.oci/key.pem\n' "$USER_OCID" "$(echo "$FP"|tr -d '[:space:]')" "$TENANCY" "$REGION" "$HOME" > ~/.oci/config
          chmod 600 ~/.oci/config
          pipx install --quiet oci-cli >/dev/null 2>&1
      - name: Deploy WAHA without reboot
        env:
          COMPARTMENT_OCID: ${{ vars.OCI_COMPARTMENT_OCID }}
          DOMAIN: ${{ vars.GATEWAY_DOMAIN || 'wa.nitutravels.in' }}
          API_KEY: ${{ secrets.GATEWAY_API_KEY }}
          IMAGE: ghcr.io/nitutravels/nitu-whatsapp-gateway:manual-waha-install-20260719
          SESSION_NAME: nitu-travels
        run: |
          chmod 0755 scripts/deploy-waha.sh
          scripts/deploy-waha.sh
