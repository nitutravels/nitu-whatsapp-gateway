name: Publish WAHA x86 production update

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: nitu-waha-x86-production-release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build immutable x86 image and update the production channel
        id: image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.sha }}
            ghcr.io/${{ github.repository }}:replacement-29696465805
          provenance: mode=max
          sbom: true
          cache-from: type=gha,scope=waha-production-amd64
          cache-to: type=gha,mode=max,scope=waha-production-amd64

      - name: Confirm public pull and x86 architecture
        shell: bash
        run: |
          set -Eeuo pipefail
          image="ghcr.io/${GITHUB_REPOSITORY,,}:${GITHUB_SHA}"
          docker logout ghcr.io >/dev/null 2>&1 || true
          docker pull "$image"
          test "$(docker image inspect "$image" --format '{{.Architecture}}')" = amd64

      - name: Verify Oracle production target through official OCI MCP
        shell: bash
        env:
          KEY: ${{ secrets.OCI_PRIVATE_KEY }}
          FP: ${{ secrets.OCI_FINGERPRINT }}
          USER_OCID: ${{ secrets.OCI_USER_OCID }}
          TENANCY: ${{ secrets.OCI_TENANCY_OCID }}
          REGION: ${{ vars.OCI_REGION }}
          COMPARTMENT: ${{ vars.OCI_COMPARTMENT_OCID }}
          OCI_CONFIG_PROFILE: DEFAULT
          FASTMCP_LOG_LEVEL: ERROR
        run: |
          set -Eeuo pipefail
          mkdir -p ~/.oci
          python -c 'import os,pathlib;v=os.environ["KEY"].strip().strip("\"\047").replace("\\r","").replace("\\n","\n");pathlib.Path.home().joinpath(".oci/key.pem").write_text(v.strip()+"\n")'
          chmod 600 ~/.oci/key.pem
          printf '[DEFAULT]\nuser=%s\nfingerprint=%s\ntenancy=%s\nregion=%s\nkey_file=%s/.oci/key.pem\n' "$USER_OCID" "$(echo "$FP" | tr -d '[:space:]')" "$TENANCY" "$REGION" "$HOME" > ~/.oci/config
          chmod 600 ~/.oci/config
          pipx install --quiet uv
          uv run --with 'mcp>=1.0' python - <<'PY'
          import asyncio,json,os
          from mcp import ClientSession,StdioServerParameters
          from mcp.client.stdio import stdio_client
          def decode(result):
              text=''.join(getattr(x,'text','') for x in result.content).strip();a=text.find('{');b=text.rfind('}')
              if a>=0 and b>a:text=text[a:b+1]
              return json.loads(text)
          async def main():
              server=StdioServerParameters(command='uvx',args=['oracle.oci-cloud-mcp-server@latest'],env={**os.environ,'OCI_CONFIG_PROFILE':'DEFAULT','FASTMCP_LOG_LEVEL':'ERROR'})
              async with stdio_client(server) as (read,write):
                async with ClientSession(read,write) as session:
                  await session.initialize()
                  result=await session.call_tool('invoke_oci_api',{
                    'client_fqn':'oci.core.ComputeClient','operation':'list_instances',
                    'params':{'compartment_id':os.environ['COMPARTMENT']},
                    'fields':['display_name','lifecycle_state','shape'],'max_results':20,'result_mode':'full'})
                  if getattr(result,'isError',False):raise RuntimeError('Oracle MCP query failed')
                  payload=decode(result);data=payload.get('data',[])
                  if isinstance(data,dict):data=data.get('items',data.get('results',[]))
                  target=next(x for x in data if x.get('display_name')=='nitu-whatsapp-gateway' and x.get('lifecycle_state')!='TERMINATED')
                  if target.get('shape')!='VM.Standard.E2.1.Micro':raise RuntimeError('Unexpected production shape')
                  if target.get('lifecycle_state')!='RUNNING':raise RuntimeError('Production gateway is not RUNNING')
                  print('OCI_TARGET_VERIFIED=VM.Standard.E2.1.Micro/RUNNING')
          asyncio.run(main())
          PY

      - name: Release summary
        run: |
          echo 'Published x86 WAHA production image.'
          echo 'The Oracle host checks this production tag through its root-owned update timer.'
          echo 'Verify the live session from the Nitu Travels WhatsApp administration page after the timer cycle.'
