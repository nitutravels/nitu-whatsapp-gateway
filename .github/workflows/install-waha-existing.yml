name: Install WAHA on existing Oracle VM

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/install-waha-existing.yml'
      - 'waha-inplace/**'

permissions:
  contents: write
  packages: write

concurrency:
  group: nitu-waha-existing-vm-install
  cancel-in-progress: false

jobs:
  install:
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 70

    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build immutable WAHA wrapper
        id: image
        shell: bash
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
      - uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.image.outputs.name }}
            ghcr.io/${{ github.repository }}:waha-production
          provenance: mode=max
          sbom: true

      - name: Configure OCI credentials
        shell: bash
        env:
          OCI_PRIVATE_KEY_PEM: ${{ secrets.OCI_PRIVATE_KEY }}
          OCI_FINGERPRINT_VALUE: ${{ secrets.OCI_FINGERPRINT }}
        run: |
          set -Eeuo pipefail
          mkdir -p "$HOME/.oci"
          python - <<'PY'
          import os
          from pathlib import Path
          value = os.environ.get('OCI_PRIVATE_KEY_PEM', '').strip()
          if len(value) >= 2 and value[0] == value[-1] and value[0] in {'"', "'"}:
              value = value[1:-1]
          if '\\n' in value and '\n' not in value:
              value = value.replace('\\r', '').replace('\\n', '\n')
          Path.home().joinpath('.oci/key.pem').write_text(value.replace('\r', '').strip() + '\n', encoding='utf-8')
          PY
          chmod 600 "$HOME/.oci/key.pem"
          fingerprint="$(printf '%s' "$OCI_FINGERPRINT_VALUE" | tr -d '[:space:]')"
          cat > "$HOME/.oci/config" <<EOF
          [DEFAULT]
          user=${{ secrets.OCI_USER_OCID }}
          fingerprint=$fingerprint
          tenancy=${{ secrets.OCI_TENANCY_OCID }}
          region=${{ vars.OCI_REGION }}
          key_file=$HOME/.oci/key.pem
          EOF
          chmod 600 "$HOME/.oci/config"
          pipx install --quiet oci-cli
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Pin WAHA image on existing Oracle VM
        shell: bash
        env:
          COMPARTMENT_OCID: ${{ vars.OCI_COMPARTMENT_OCID }}
          DOMAIN: ${{ vars.GATEWAY_DOMAIN || 'wa.nitutravels.in' }}
          API_KEY: ${{ secrets.GATEWAY_API_KEY }}
          IMAGE: ${{ steps.image.outputs.name }}
          SESSION_NAME: nitu-travels
        run: |
          set -Eeuo pipefail
          mkdir -p docs
          chmod 0755 scripts/deploy-waha.sh
          scripts/deploy-waha.sh 2>&1 | tee docs/waha-existing-vm-result.txt

      - name: Persist sanitized installation result
        if: always()
        shell: bash
        run: |
          set -Eeuo pipefail
          test -f docs/waha-existing-vm-result.txt || \
            echo 'WAHA existing-VM installation did not produce a result file.' > docs/waha-existing-vm-result.txt
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add docs/waha-existing-vm-result.txt
          git diff --cached --quiet || git commit -m 'Record WAHA existing-VM installation result'
          for attempt in 1 2 3 4 5; do
            git pull --rebase origin main && git push origin HEAD:main && exit 0
            sleep $((attempt * 5))
          done
          echo 'Could not persist result to main; complete logs remain in this workflow.' >&2
          exit 1
