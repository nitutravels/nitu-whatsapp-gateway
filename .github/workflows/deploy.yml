name: Build and deploy to Oracle Cloud

on:
  push:
    branches: [main]
    paths-ignore: ['docs/**', '**.md']
  workflow_dispatch:
    inputs:
      provision_infrastructure:
        description: "Create or update Oracle infrastructure"
        required: true
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: nitu-whatsapp-production
  cancel-in-progress: true

jobs:
  build:
    permissions:
      contents: read
      packages: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Prepare image name
        id: image
        shell: bash
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"
      - uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:latest
            ${{ steps.image.outputs.name }}:${{ github.sha }}
          provenance: mode=max
          sbom: true

  terraform:
    if: >-
      (github.event_name == 'workflow_dispatch' && inputs.provision_infrastructure) ||
      (github.event_name == 'push' && contains(github.event.head_commit.message, '[deploy]'))
    needs: build
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: infra/terraform
    env:
      TF_IN_AUTOMATION: "true"
      TF_INPUT: "false"
      TF_VAR_tenancy_ocid: ${{ secrets.OCI_TENANCY_OCID }}
      TF_VAR_region: ${{ vars.OCI_REGION }}
      TF_VAR_instance_shape: "VM.Standard.E2.1.Micro"
      TF_VAR_instance_ocpus: "1"
      TF_VAR_instance_memory_gbs: "1"
      TF_VAR_gateway_api_key: ${{ secrets.GATEWAY_API_KEY }}
      TF_VAR_gateway_admin_token: ${{ secrets.GATEWAY_ADMIN_TOKEN }}
      TF_VAR_gateway_webhook_secret: ${{ secrets.GATEWAY_WEBHOOK_SECRET }}
      TF_VAR_gateway_domain: ${{ vars.GATEWAY_DOMAIN }}
      TF_VAR_webhook_url: ${{ vars.WEBHOOK_URL }}
      TF_VAR_default_country_code: ${{ vars.DEFAULT_COUNTRY_CODE || '91' }}
      TF_VAR_media_allowed_hosts: ${{ vars.MEDIA_ALLOWED_HOSTS || 'nitutravels.in,www.nitutravels.in' }}
      TF_VAR_availability_domain_index: ${{ vars.AVAILABILITY_DOMAIN_INDEX || '0' }}
    steps:
      - uses: actions/checkout@v7
      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.15.8
      - name: Configure OCI API credentials
        shell: bash
        env:
          OCI_PRIVATE_KEY_PEM: ${{ secrets.OCI_PRIVATE_KEY }}
          OCI_FINGERPRINT_VALUE: ${{ secrets.OCI_FINGERPRINT }}
        run: |
          set -Eeuo pipefail
          mkdir -p "$HOME/.oci"
          python - <<'PY'
          import os
          from pathlib import Path
          value = os.environ.get('OCI_PRIVATE_KEY_PEM', '').strip()
          if len(value) >= 2 and value[0] == value[-1] and value[0] in {'"', "'"}:
              value = value[1:-1]
          if '\\n' in value and '\n' not in value:
              value = value.replace('\\r', '').replace('\\n', '\n')
          Path.home().joinpath('.oci/oci_api_key.pem').write_text(value.replace('\r', '').strip() + '\n', encoding='utf-8')
          PY
          chmod 600 "$HOME/.oci/oci_api_key.pem"
          FINGERPRINT="$(printf '%s' "$OCI_FINGERPRINT_VALUE" | tr -d '[:space:]')"
          cat > "$HOME/.oci/config" <<EOF
          [DEFAULT]
          user=${{ secrets.OCI_USER_OCID }}
          fingerprint=$FINGERPRINT
          tenancy=${{ secrets.OCI_TENANCY_OCID }}
          region=${{ vars.OCI_REGION }}
          key_file=$HOME/.oci/oci_api_key.pem
          EOF
          chmod 600 "$HOME/.oci/config"
      - name: Install OCI CLI
        shell: bash
        run: |
          pipx install oci-cli
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Resolve Oracle tenancy resources
        shell: bash
        env:
          TENANCY_OCID: ${{ secrets.OCI_TENANCY_OCID }}
          CONFIGURED_COMPARTMENT_OCID: ${{ vars.OCI_COMPARTMENT_OCID }}
          CONFIGURED_NAMESPACE: ${{ vars.OCI_NAMESPACE }}
        run: |
          set -Eeuo pipefail

          if [[ ! "$TENANCY_OCID" =~ ^ocid1\.tenancy\. ]]; then
            echo "::error::OCI_TENANCY_OCID is not a tenancy OCID. It must start with ocid1.tenancy."
            exit 1
          fi

          COMPARTMENT_OCID=""
          if [[ "$CONFIGURED_COMPARTMENT_OCID" =~ ^ocid1\.compartment\. ]]; then
            COMPARTMENT_OCID="$CONFIGURED_COMPARTMENT_OCID"
            echo "Using configured OCI compartment."
          else
            echo "OCI_COMPARTMENT_OCID is absent or invalid; locating NituWAGateway through IAM."
            if COMPARTMENTS_JSON="$(
              oci iam compartment list \
                --compartment-id "$TENANCY_OCID" \
                --compartment-id-in-subtree true \
                --access-level ANY \
                --all \
                --output json 2>/tmp/oci-compartment-list.err
            )"; then
              COMPARTMENT_OCID="$(
                jq -r '[.data[] | select(.name == "NituWAGateway" and .["lifecycle-state"] == "ACTIVE") | .id][0] // empty' \
                  <<<"$COMPARTMENTS_JSON"
              )"
            else
              echo "IAM compartment listing was unavailable; trying OCI Search."
            fi
          fi

          if [[ ! "$COMPARTMENT_OCID" =~ ^ocid1\.compartment\. ]]; then
            if SEARCH_JSON="$(
              oci search resource structured-search \
                --query-text "query compartment resources matching 'NituWAGateway'" \
                --output json 2>/tmp/oci-resource-search.err
            )"; then
              COMPARTMENT_OCID="$(
                jq -r '[.data.items[] | select((.["display-name"] // .displayName // "") == "NituWAGateway") | (.identifier // .id)][0] // empty' \
                  <<<"$SEARCH_JSON"
              )"
            fi
          fi

          if [[ ! "$COMPARTMENT_OCID" =~ ^ocid1\.compartment\. ]]; then
            echo "::error::Unable to resolve the NituWAGateway compartment. Replace production variable OCI_COMPARTMENT_OCID with the OCID shown on Oracle Console → Identity & Security → Compartments → NituWAGateway. It must start with ocid1.compartment."
            if [[ -s /tmp/oci-compartment-list.err ]]; then
              echo "OCI IAM diagnostic: $(tail -n 1 /tmp/oci-compartment-list.err)" >&2
            fi
            if [[ -s /tmp/oci-resource-search.err ]]; then
              echo "OCI Search diagnostic: $(tail -n 1 /tmp/oci-resource-search.err)" >&2
            fi
            exit 1
          fi

          NAMESPACE="$CONFIGURED_NAMESPACE"
          if [[ -z "$NAMESPACE" || "$NAMESPACE" == "null" ]]; then
            echo "OCI_NAMESPACE is missing; resolving it through Object Storage."
            if ! NAMESPACE="$(oci os ns get --query data --raw-output 2>/tmp/oci-namespace.err)"; then
              NAMESPACE=""
            fi
          fi
          if [[ -z "$NAMESPACE" || "$NAMESPACE" == "null" ]]; then
            echo "::error::Unable to resolve Object Storage namespace. Set production variable OCI_NAMESPACE to the namespace shown under Oracle tenancy details."
            if [[ -s /tmp/oci-namespace.err ]]; then
              echo "OCI namespace diagnostic: $(tail -n 1 /tmp/oci-namespace.err)" >&2
            fi
            exit 1
          fi

          echo "TF_VAR_compartment_ocid=$COMPARTMENT_OCID" >> "$GITHUB_ENV"
          echo "OCI_RESOLVED_COMPARTMENT_OCID=$COMPARTMENT_OCID" >> "$GITHUB_ENV"
          echo "OCI_RESOLVED_NAMESPACE=$NAMESPACE" >> "$GITHUB_ENV"
          echo "Resolved Oracle compartment and Object Storage namespace."
      - name: Create or secure Terraform state bucket
        shell: bash
        env:
          STATE_BUCKET: ${{ vars.OCI_TF_STATE_BUCKET }}
        run: |
          set -Eeuo pipefail
          if [[ -z "$STATE_BUCKET" ]]; then
            echo "OCI_TF_STATE_BUCKET is missing." >&2
            exit 1
          fi
          if ! oci os bucket get \
            --namespace-name "$OCI_RESOLVED_NAMESPACE" \
            --bucket-name "$STATE_BUCKET" >/dev/null 2>&1; then
            oci os bucket create \
              --namespace-name "$OCI_RESOLVED_NAMESPACE" \
              --compartment-id "$OCI_RESOLVED_COMPARTMENT_OCID" \
              --name "$STATE_BUCKET" \
              --public-access-type NoPublicAccess \
              --storage-tier Standard \
              --versioning Enabled >/dev/null
          else
            oci os bucket update \
              --namespace-name "$OCI_RESOLVED_NAMESPACE" \
              --bucket-name "$STATE_BUCKET" \
              --public-access-type NoPublicAccess \
              --versioning Enabled >/dev/null
          fi
      - name: Set container image variable
        shell: bash
        run: echo "TF_VAR_gateway_image=ghcr.io/${GITHUB_REPOSITORY,,}:latest" >> "$GITHUB_ENV"
      - name: Terraform init
        env:
          STATE_BUCKET: ${{ vars.OCI_TF_STATE_BUCKET }}
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=$STATE_BUCKET" \
            -backend-config="namespace=$OCI_RESOLVED_NAMESPACE" \
            -backend-config="region=${{ vars.OCI_REGION }}" \
            -backend-config="key=nitu-whatsapp-gateway/terraform.tfstate" \
            -backend-config="auth=APIKey" \
            -backend-config="config_file_profile=DEFAULT"
      - run: terraform fmt -check -recursive
      - run: terraform validate
      - run: terraform plan -out=tfplan
      - run: terraform apply -auto-approve tfplan
      - name: Write deployment details
        shell: bash
        run: |
          jq -n \
            --arg public_ip "$(terraform output -raw public_ip)" \
            --arg dashboard_url "$(terraform output -raw dashboard_url)" \
            --arg health_url "$(terraform output -raw health_url)" \
            --arg instance_id "$(terraform output -raw instance_id)" \
            --arg shape "$TF_VAR_instance_shape" \
            '{public_ip:$public_ip,dashboard_url:$dashboard_url,health_url:$health_url,instance_id:$instance_id,shape:$shape}' \
            > deployment-details.json
      - uses: actions/upload-artifact@v4
        with:
          name: deployment-details
          path: infra/terraform/deployment-details.json
          if-no-files-found: error
          retention-days: 7
      - name: Publish deployment details
        shell: bash
        run: |
          echo "## Oracle deployment" >> "$GITHUB_STEP_SUMMARY"
          echo "- Shape: $TF_VAR_instance_shape" >> "$GITHUB_STEP_SUMMARY"
          echo "- Dashboard: $(terraform output -raw dashboard_url)" >> "$GITHUB_STEP_SUMMARY"
          echo "- Public IP: $(terraform output -raw public_ip)" >> "$GITHUB_STEP_SUMMARY"
          echo "- Health check: $(terraform output -raw health_url)" >> "$GITHUB_STEP_SUMMARY"