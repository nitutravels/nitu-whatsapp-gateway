name: Probe in-place WAHA migration

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['waha-oracle/INPLACE-PROBE']

permissions:
  contents: write

concurrency:
  group: nitu-waha-inplace-probe
  cancel-in-progress: true

jobs:
  probe:
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - name: Probe Oracle instance and public endpoints
        shell: bash
        env:
          OCI_PRIVATE_KEY_PEM: ${{ secrets.OCI_PRIVATE_KEY }}
          OCI_FINGERPRINT_VALUE: ${{ secrets.OCI_FINGERPRINT }}
          TENANCY_OCID: ${{ secrets.OCI_TENANCY_OCID }}
          CONFIGURED_COMPARTMENT_OCID: ${{ vars.OCI_COMPARTMENT_OCID }}
          REGION: ${{ vars.OCI_REGION }}
          DOMAIN: ${{ vars.GATEWAY_DOMAIN || 'wa.nitutravels.in' }}
          WAHA_API_KEY: ${{ secrets.GATEWAY_API_KEY }}
        run: |
          set -Eeuo pipefail
          mkdir -p "$HOME/.oci" docs
          python - <<'PY'
          import os
          from pathlib import Path
          value=os.environ.get('OCI_PRIVATE_KEY_PEM','').strip()
          if len(value)>=2 and value[0]==value[-1] and value[0] in {'"',"'"}: value=value[1:-1]
          if '\\n' in value and '\n' not in value: value=value.replace('\\r','').replace('\\n','\n')
          Path.home().joinpath('.oci/key.pem').write_text(value.replace('\r','').strip()+'\n')
          PY
          chmod 600 "$HOME/.oci/key.pem"
          cat > "$HOME/.oci/config" <<EOF
          [DEFAULT]
          user=${{ secrets.OCI_USER_OCID }}
          fingerprint=$(printf '%s' "$OCI_FINGERPRINT_VALUE" | tr -d '[:space:]')
          tenancy=$TENANCY_OCID
          region=$REGION
          key_file=$HOME/.oci/key.pem
          EOF
          chmod 600 "$HOME/.oci/config"
          pipx install --quiet oci-cli
          export PATH="$HOME/.local/bin:$PATH"
          compartment="$CONFIGURED_COMPARTMENT_OCID"
          if [[ ! "$compartment" =~ ^ocid1\.compartment\. ]]; then
            compartment="$(oci iam compartment list --compartment-id "$TENANCY_OCID" --compartment-id-in-subtree true --access-level ANY --all --output json | jq -r '[.data[]|select(.name=="NituWAGateway" and .["lifecycle-state"]=="ACTIVE")|.id][0]//empty')"
          fi
          {
            echo 'WAHA_INPLACE_PROBE_BEGIN'
            echo "PROBED_AT=$(date -u +%FT%TZ)"
            instance_id="$(oci compute instance list --compartment-id "$compartment" --display-name nitu-whatsapp-gateway --all --query 'data[?"lifecycle-state"!=`TERMINATED`].id | [0]' --raw-output)"
            echo "INSTANCE_ID=${instance_id:-none}"
            if [[ "$instance_id" =~ ^ocid1\.instance\. ]]; then
              oci compute instance get --instance-id "$instance_id" --output json >/tmp/i.json
              state="$(jq -r '.data["lifecycle-state"]' /tmp/i.json)"
              ad="$(jq -r '.data["availability-domain"]' /tmp/i.json)"
              image="$(jq -r '.data["image-id"] // empty' /tmp/i.json)"
              echo "INSTANCE_STATE=$state"
              echo "INSTANCE_IMAGE=${image:-unknown}"
              boot="$(oci compute boot-volume-attachment list --availability-domain "$ad" --compartment-id "$compartment" --instance-id "$instance_id" --all --query 'data[?"lifecycle-state"==`ATTACHED`]."boot-volume-id" | [0]' --raw-output 2>/dev/null || true)"
              echo "ATTACHED_BOOT_VOLUME=${boot:-none}"
              vnic="$(oci compute vnic-attachment list --compartment-id "$compartment" --instance-id "$instance_id" --all --query 'data[?"lifecycle-state"==`ATTACHED`]."vnic-id" | [0]' --raw-output 2>/dev/null || true)"
              ip="$(oci network vnic get --vnic-id "$vnic" --query 'data."public-ip"' --raw-output 2>/dev/null || true)"
              echo "PUBLIC_IP=${ip:-none}"
              if [[ "$ip" =~ ^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
                args=(--silent --show-error --connect-timeout 7 --max-time 18 --resolve "$DOMAIN:443:$ip")
                waha_health="$(curl "${args[@]}" -o /tmp/wh.json -w '%{http_code}' "https://$DOMAIN/health" 2>/dev/null || true)"
                legacy_health="$(curl "${args[@]}" -o /tmp/lh.json -w '%{http_code}' "https://$DOMAIN/healthz" 2>/dev/null || true)"
                version="$(curl "${args[@]}" -H "X-Api-Key: $WAHA_API_KEY" -o /tmp/v.json -w '%{http_code}' "https://$DOMAIN/api/server/version" 2>/dev/null || true)"
                session="$(curl "${args[@]}" -H "X-Api-Key: $WAHA_API_KEY" -o /tmp/s.json -w '%{http_code}' "https://$DOMAIN/api/sessions/nitu-travels" 2>/dev/null || true)"
                echo "WAHA_HEALTH_HTTP=${waha_health:-000}"
                echo "LEGACY_HEALTH_HTTP=${legacy_health:-000}"
                echo "WAHA_VERSION_HTTP=${version:-000}"
                echo "WAHA_SESSION_HTTP=${session:-000}"
                echo "WAHA_ENGINE=$(jq -r '.engine//"unknown"' /tmp/v.json 2>/dev/null || echo unknown)"
                echo "WAHA_SESSION_STATUS=$(jq -r '.status//"UNKNOWN"' /tmp/s.json 2>/dev/null || echo UNKNOWN)"
              fi
            fi
            echo 'WAHA_INPLACE_PROBE_END'
          } | tee docs/waha-inplace-probe.txt
      - name: Persist probe result
        if: always()
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add docs/waha-inplace-probe.txt
          git diff --cached --quiet || git commit -m 'Record WAHA in-place probe'
          git pull --rebase origin main
          git push origin HEAD:main
