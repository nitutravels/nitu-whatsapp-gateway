name: Temporary final WhatsApp recovery verification

on:
  push:
    paths:
      - '.github/workflows/tmp-final-whatsapp-check.yml'

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check public and protected gateway state
        env:
          ADMIN_TOKEN: ${{ secrets.GATEWAY_ADMIN_TOKEN }}
        run: |
          set -euo pipefail
          BASE='https://wa.nitutravels.in'
          OUT='tmp-final-whatsapp-check.txt'
          : > "$OUT"
          for attempt in 1 2 3 4 5 6; do
            HEALTH_HTTP=$(curl -sS -o /tmp/health.json -w '%{http_code}' --max-time 30 "$BASE/healthz" || true)
            READY_HTTP=$(curl -sS -o /tmp/ready.json -w '%{http_code}' --max-time 30 "$BASE/readyz" || true)
            STATUS_HTTP=$(curl -sS -o /tmp/status.json -w '%{http_code}' --max-time 30 -H "Authorization: Bearer $ADMIN_TOKEN" "$BASE/admin/api/status" || true)
            QUEUE_HTTP=$(curl -sS -o /tmp/queue.json -w '%{http_code}' --max-time 30 -H "Authorization: Bearer $ADMIN_TOKEN" "$BASE/admin/api/queue" || true)
            {
              echo "ATTEMPT=$attempt"
              echo "CHECKED_AT=$(date -u +%FT%TZ)"
              echo "HEALTH_HTTP=$HEALTH_HTTP"
              echo "READY_HTTP=$READY_HTTP"
              echo "STATUS_HTTP=$STATUS_HTTP"
              echo "QUEUE_HTTP=$QUEUE_HTTP"
              echo "HEALTH=$(cat /tmp/health.json 2>/dev/null || true)"
              echo "READY=$(cat /tmp/ready.json 2>/dev/null || true)"
              echo "STATUS=$(cat /tmp/status.json 2>/dev/null || true)"
              echo "QUEUE=$(cat /tmp/queue.json 2>/dev/null || true)"
            } > "$OUT"
            if grep -q '"ready"[[:space:]]*:[[:space:]]*true' /tmp/status.json 2>/dev/null \
              && grep -q '"lastError"[[:space:]]*:[[:space:]]*null' /tmp/status.json 2>/dev/null \
              && grep -q '2026-07-18T12:10:49' /tmp/queue.json 2>/dev/null \
              && ! grep -E '2026-07-18T12:10:49[^}]*"status"[[:space:]]*:[[:space:]]*"(queued|retry|sending)"' /tmp/queue.json 2>/dev/null; then
              break
            fi
            sleep 30
          done
      - name: Commit temporary result
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add tmp-final-whatsapp-check.txt
          git commit -m 'Record final WhatsApp recovery verification' || exit 0
          git push
