name: Capture WAHA Oracle status once
on:
  pull_request:
    branches: [main]
permissions:
  contents: write
jobs:
  capture:
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.ref }}
      - name: Capture
        env:
          KEY: ${{ secrets.OCI_PRIVATE_KEY }}
          FP: ${{ secrets.OCI_FINGERPRINT }}
          USER_OCID: ${{ secrets.OCI_USER_OCID }}
          TENANCY: ${{ secrets.OCI_TENANCY_OCID }}
          REGION: ${{ vars.OCI_REGION }}
          COMP: ${{ vars.OCI_COMPARTMENT_OCID }}
          API: ${{ secrets.GATEWAY_API_KEY }}
          DOMAIN: ${{ vars.GATEWAY_DOMAIN || 'wa.nitutravels.in' }}
          OCI_CONFIG_PROFILE: DEFAULT
          FASTMCP_LOG_LEVEL: ERROR
        run: |
          set -Eeuo pipefail;mkdir -p ~/.oci docs
          python -c 'import os,pathlib;v=os.environ["KEY"].strip().strip("\"\047").replace("\\r","").replace("\\n","\n");pathlib.Path.home().joinpath(".oci/key.pem").write_text(v.strip()+"\n")';chmod 600 ~/.oci/key.pem
          printf '[DEFAULT]\nuser=%s\nfingerprint=%s\ntenancy=%s\nregion=%s\nkey_file=%s/.oci/key.pem\n' "$USER_OCID" "$(echo "$FP"|tr -d '[:space:]')" "$TENANCY" "$REGION" "$HOME" > ~/.oci/config;chmod 600 ~/.oci/config;pipx install --quiet uv
          uv run --with 'mcp>=1.0' python - <<'PY'
          import asyncio,base64,json,os,subprocess
          from mcp import ClientSession,StdioServerParameters
          from mcp.client.stdio import stdio_client
          def d(r):
            t=''.join(getattr(x,'text','') for x in r.content);a=t.find('{');b=t.rfind('}');return json.loads(t[a:b+1])
          async def i(s,c,o,p,f=None,m=None):
            a={'client_fqn':c,'operation':o,'params':p,'result_mode':'full'}
            if f:a['fields']=f
            if m:a['max_results']=m
            r=await s.call_tool('invoke_oci_api',a)
            if getattr(r,'isError',False):raise RuntimeError(''.join(getattr(x,'text','') for x in r.content))
            return d(r)
          def it(x):
            z=x.get('data',[]);return z.get('items',z.get('results',[])) if isinstance(z,dict) else z
          async def main():
            c=os.environ['COMP'];o={};sv=StdioServerParameters(command='uvx',args=['oracle.oci-cloud-mcp-server@latest'],env={**os.environ,'OCI_CONFIG_PROFILE':'DEFAULT','FASTMCP_LOG_LEVEL':'ERROR'})
            async with stdio_client(sv) as (r,w):
              async with ClientSession(r,w) as s:
                await s.initialize();l=await i(s,'oci.core.ComputeClient','list_instances',{'compartment_id':c},['id','display_name','lifecycle_state'],20);t=next(x for x in it(l) if x.get('display_name')=='nitu-whatsapp-gateway' and x.get('lifecycle_state')!='TERMINATED');iid=t['id'];g=await i(s,'oci.core.ComputeClient','get_instance',{'instance_id':iid},['lifecycle_state','metadata']);x=g.get('data') or {};o['lifecycle_state']=x.get('lifecycle_state');e=base64.b64decode((x.get('metadata') or {}).get('gateway_env_b64','')).decode();o['pinned_image']=next((q.split('=',1)[1] for q in e.splitlines() if q.startswith('GATEWAY_IMAGE=')),None);v=await i(s,'oci.core.ComputeClient','list_vnic_attachments',{'compartment_id':c,'instance_id':iid},['vnic_id','lifecycle_state'],10);va=next(q for q in it(v) if q.get('lifecycle_state')=='ATTACHED');vr=await i(s,'oci.core.VirtualNetworkClient','get_vnic',{'vnic_id':va['vnic_id']},['public_ip']);o['public_ip']=(vr.get('data') or {}).get('public_ip')
            ip=o['public_ip'];dom=os.environ['DOMAIN'];api=os.environ['API']
            def curl(path,key=False):
              cmd=['curl','-sS','--connect-timeout','8','--max-time','20','--resolve',f'{dom}:443:{ip}','-o','/tmp/body','-w','%{http_code}']
              if key:cmd+=['-H',f'X-Api-Key: {api}']
              cmd+=[f'https://{dom}{path}'];p=subprocess.run(cmd,text=True,capture_output=True);body=''
              try:body=open('/tmp/body').read()
              except:pass
              return p.stdout.strip() or '000',body
            o['health_http'],_=curl('/health');o['session_http'],b=curl('/api/sessions/nitu-travels',True)
            try:j=json.loads(b);o['session_status']=j.get('status');o['engine']=(j.get('engine') or {}).get('engine') if isinstance(j.get('engine'),dict) else j.get('engine')
            except:pass
            json.dump(o,open('docs/waha-quick-status.json','w'),indent=2,sort_keys=True)
          asyncio.run(main())
          PY
      - run: |
          git config user.name 'github-actions[bot]';git config user.email '4189826+github-actions[bot]@users.noreply.github.com';git add docs/waha-quick-status.json;git diff --cached --quiet||git commit -m 'Capture WAHA Oracle quick status';git push origin HEAD:${{ github.event.pull_request.head.ref }}
