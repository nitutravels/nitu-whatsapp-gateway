name: Secure NAMS production recovery v2

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/nams-recovery-secure-v2.yml'
  workflow_dispatch:

permissions:
  contents: write
  packages: read

concurrency:
  group: nams-secure-recovery-v2
  cancel-in-progress: false

env:
  SOURCE_REF: c74d8660d516e9330a9ad4f24742b10c43c487c4
  IMAGE_TAG: c74d8660d516e9330a9ad4f24742b10c43c487c4-cdp1
  INSTALLER_REF: 1bf9e499c3d501cd9740ce5ac7af3bfd48c39f2c

jobs:
  recover:
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 100
    steps:
      - uses: actions/checkout@v4

      - name: Configure OCI CLI
        env:
          OCI_PRIVATE_KEY_PEM: ${{ secrets.OCI_PRIVATE_KEY }}
          OCI_FINGERPRINT_VALUE: ${{ secrets.OCI_FINGERPRINT }}
          OCI_USER_VALUE: ${{ secrets.OCI_USER_OCID }}
          OCI_TENANCY_VALUE: ${{ secrets.OCI_TENANCY_OCID }}
          OCI_REGION_VALUE: ${{ vars.OCI_REGION || 'ap-mumbai-1' }}
        run: |
          set -Eeuo pipefail
          mkdir -p "$HOME/.oci"
          python3 - <<'PY'
          import os
          from pathlib import Path
          value=os.environ['OCI_PRIVATE_KEY_PEM'].strip()
          if len(value)>=2 and value[0]==value[-1] and value[0] in {'"',"'"}: value=value[1:-1]
          if '\\n' in value and '\n' not in value: value=value.replace('\\r','').replace('\\n','\n')
          Path.home().joinpath('.oci/key.pem').write_text(value.replace('\r','').strip()+'\n')
          PY
          chmod 600 "$HOME/.oci/key.pem"
          cat >"$HOME/.oci/config" <<EOF
          [DEFAULT]
          user=$OCI_USER_VALUE
          fingerprint=$(printf '%s' "$OCI_FINGERPRINT_VALUE" | tr -d '[:space:]')
          tenancy=$OCI_TENANCY_VALUE
          region=$OCI_REGION_VALUE
          key_file=$HOME/.oci/key.pem
          EOF
          chmod 600 "$HOME/.oci/config"
          pipx install --quiet oci-cli
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - uses: docker/setup-buildx-action@v4

      - name: Apply targeted inventory fix
        run: |
          set -Eeuo pipefail
          cp nams-deploy/deploy-capacity-aware.sh /tmp/nams-controller.sh
          python3 - <<'PY'
          from pathlib import Path
          p=Path('/tmp/nams-controller.sh')
          s=p.read_text()
          old='''ACTIVE_NAMS="$(oci compute instance list --region "$REGION" --compartment-id "$COMPARTMENT_OCID" --display-name "$TARGET_NAME" --all --output json | jq -r '[.data[]|select(.["lifecycle-state"]!="TERMINATED")]|length')"
          [ "$ACTIVE_NAMS" -eq 0 ] || { log 'An active NAMS compute instance already exists; refusing duplicate launch'; exit 31; }'''
          new='''INSTANCE_JSON="$(oci compute instance list --region "$REGION" --compartment-id "$COMPARTMENT_OCID" --display-name "$TARGET_NAME" --all --output json)"
          printf '%s' "$INSTANCE_JSON" >"$DIAG/nams-inventory.json"
          ACTIVE_NAMS="$(jq -er '(.data // []) | map(select(.["lifecycle-state"] != "TERMINATED")) | length' <<<"$INSTANCE_JSON")"
          [[ "$ACTIVE_NAMS" =~ ^[0-9]+$ ]] || { write_result failed 'NAMS inventory response was invalid'; exit 27; }
          [ "$ACTIVE_NAMS" -eq 0 ] || { write_result failed 'An active NAMS compute instance already exists; refusing duplicate launch'; exit 31; }'''
          if old not in s: raise SystemExit('Expected inventory block not found')
          p.write_text(s.replace(old,new,1))
          PY
          bash -n /tmp/nams-controller.sh

      - name: Run secure capacity-aware recovery
        id: deploy
        continue-on-error: true
        env:
          OCI_REGION: ${{ vars.OCI_REGION || 'ap-mumbai-1' }}
          OCI_TENANCY_OCID: ${{ secrets.OCI_TENANCY_OCID }}
          OCI_COMPARTMENT_OCID: ${{ vars.OCI_COMPARTMENT_OCID }}
          OCI_COMPARTMENT_NAME: NituWAGateway
          OCI_REFERENCE_INSTANCE: NituTravelsWAHA-20260719T184923Z
          OCI_TARGET_INSTANCE: NAMS-Lightpanda-Agent
          OCI_NSG_NAME: NAMS-Lightpanda-NSG
          OCI_RESERVED_IP: ${{ vars.NAMS_RESERVED_IP || '161.118.166.225' }}
          NAMS_DOMAIN: ${{ vars.NAMS_DOMAIN || 'seo.nitutravels.in' }}
          NAMS_SOURCE_REF: ${{ env.SOURCE_REF }}
          NAMS_IMAGE_TAG: ${{ env.IMAGE_TAG }}
          NAMS_INSTALLER_REF: ${{ env.INSTALLER_REF }}
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NAMS_RESULT_FILE: ${{ github.workspace }}/nams-deployment-result.json
        run: |
          set +e
          mkdir -p deployment-evidence
          bash /tmp/nams-controller.sh >deployment-evidence/controller.log 2>&1
          rc=$?
          if [ ! -s "$NAMS_RESULT_FILE" ]; then
            jq -n --argjson rc "$rc" '{status:"failed",phase:"controller",message:"Controller stopped without a result",exit_code:$rc}' >"$NAMS_RESULT_FILE"
          fi
          sed -E -i 's/ghs_[A-Za-z0-9_.-]+/[REDACTED_GITHUB_TOKEN]/g; s/[a-f0-9]{48}/[REDACTED_TOKEN]/g' deployment-evidence/controller.log
          exit "$rc"

      - name: Record sanitized result
        if: always()
        env:
          DOMAIN: ${{ vars.NAMS_DOMAIN || 'seo.nitutravels.in' }}
          OUTCOME: ${{ steps.deploy.outcome }}
        run: |
          set -Eeuo pipefail
          mkdir -p status deployment-evidence
          jq 'del(.token,.controller_tail) | .message |= gsub("ghs_[A-Za-z0-9_.-]+";"[REDACTED_GITHUB_TOKEN]")' nams-deployment-result.json >status/nams-deployment-via-waha.json
          dns_ip="$(getent ahostsv4 "$DOMAIN" 2>/dev/null | awk 'NR==1{print $1}' || true)"
          expected="$(jq -r '.public_ip // empty' status/nams-deployment-via-waha.json)"
          jq --arg run_id "$GITHUB_RUN_ID" --arg run_url "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID" --arg outcome "$OUTCOME" --arg dns_ip "$dns_ip" --arg expected "$expected" '. + {run_id:$run_id,run_url:$run_url,workflow_outcome:$outcome,dns_ip:$dns_ip,dns_matches_deployment:($dns_ip!="" and $expected!="" and $dns_ip==$expected),recorded_at:(now|todate)}' status/nams-deployment-via-waha.json >status/result.tmp
          mv status/result.tmp status/nams-deployment-via-waha.json
          cp status/nams-deployment-via-waha.json deployment-evidence/result.json
          cp nams-token-retrieval.txt deployment-evidence/ 2>/dev/null || true
          cp nams-deployment-diagnostics.tgz deployment-evidence/ 2>/dev/null || true
          cp status/nams-deployment-via-waha.json /tmp/result.json
          git reset --hard HEAD
          git pull --ff-only origin main
          mkdir -p status
          cp /tmp/result.json status/nams-deployment-via-waha.json
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add status/nams-deployment-via-waha.json
          git diff --cached --quiet || { git commit -m "Record secure NAMS recovery v2 run $GITHUB_RUN_ID [skip ci]"; git push; }

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: nams-secure-recovery-v2
          path: deployment-evidence/
          retention-days: 7

      - name: Enforce completion
        if: always()
        run: |
          test "$(jq -r '.status' status/nams-deployment-via-waha.json)" = success
