name: Recover WAHA through official OCI MCP Bastion
on:
  pull_request:
    branches: [main]
permissions:
  contents: write
concurrency:
  group: waha-official-mcp-bastion-recovery
  cancel-in-progress: true
jobs:
  recover:
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 1
      - name: Configure OCI and load immutable recovery script
        shell: bash
        env:
          KEY: ${{ secrets.OCI_PRIVATE_KEY }}
          FP: ${{ secrets.OCI_FINGERPRINT }}
          USER_OCID: ${{ secrets.OCI_USER_OCID }}
          TENANCY: ${{ secrets.OCI_TENANCY_OCID }}
          REGION: ${{ vars.OCI_REGION }}
        run: |
          set -Eeuo pipefail
          mkdir -p ~/.oci docs
          python -c 'import os,pathlib;v=os.environ["KEY"].strip().strip("\"\047").replace("\\r","").replace("\\n","\n");pathlib.Path.home().joinpath(".oci/key.pem").write_text(v.strip()+"\n")'
          chmod 600 ~/.oci/key.pem
          printf '[DEFAULT]\nuser=%s\nfingerprint=%s\ntenancy=%s\nregion=%s\nkey_file=%s/.oci/key.pem\n' "$USER_OCID" "$(echo "$FP"|tr -d '[:space:]')" "$TENANCY" "$REGION" "$HOME" > ~/.oci/config
          chmod 600 ~/.oci/config
          pipx install --quiet uv
          git fetch --depth=1 origin 2acde60d0a77b486a4e51273b0c87001516f714a
          git show 2acde60d0a77b486a4e51273b0c87001516f714a:scripts/official-mcp-bastion-deploy.py > /tmp/official-mcp-bastion-deploy.py
          chmod 0700 /tmp/official-mcp-bastion-deploy.py
      - name: Deploy WAHA through managed SSH
        shell: bash
        env:
          COMPARTMENT_OCID: ${{ vars.OCI_COMPARTMENT_OCID }}
          TARGET_IMAGE: ghcr.io/nitutravels/nitu-whatsapp-gateway:official-mcp-waha-20260719
          OCI_REGION: ${{ vars.OCI_REGION }}
          OCI_CONFIG_PROFILE: DEFAULT
          FASTMCP_LOG_LEVEL: ERROR
        run: |
          set -Eeuo pipefail
          uv run --with 'mcp>=1.0' python /tmp/official-mcp-bastion-deploy.py
      - name: Verify public WAHA and initialize session
        shell: bash
        env:
          DOMAIN: ${{ vars.GATEWAY_DOMAIN || 'wa.nitutravels.in' }}
          API_KEY: ${{ secrets.GATEWAY_API_KEY }}
        run: |
          set -Eeuo pipefail
          ip="$(python -c 'import json;print(json.load(open("/tmp/bastion-summary.json"))["public_ip"])')"
          c=(--silent --show-error --connect-timeout 8 --max-time 25 --resolve "$DOMAIN:443:$ip")
          for attempt in $(seq 1 90); do
            h="$(curl "${c[@]}" -o /tmp/h -w '%{http_code}' "https://$DOMAIN/health" || true)"
            s="$(curl "${c[@]}" -H "X-Api-Key: $API_KEY" -o /tmp/s -w '%{http_code}' "https://$DOMAIN/api/sessions/nitu-travels" || true)"
            status="$(jq -r '.status // "unknown"' /tmp/s 2>/dev/null || echo unknown)"
            echo "VERIFY_ATTEMPT=$attempt HEALTH=$h SESSION=$s STATUS=$status"
            if [ "$h" = 200 ] && [ "$s" = 404 ]; then curl "${c[@]}" -H "X-Api-Key: $API_KEY" -H 'Content-Type: application/json' -X POST --data '{"name":"nitu-travels"}' "https://$DOMAIN/api/sessions" >/dev/null || true; fi
            if [ "$s" = 200 ]; then
              case "$status" in
                WORKING|SCAN_QR_CODE|PASSKEY_REQUIRED|PASSKEY_CONFIRMATION_REQUIRED)
                  python - "$h" "$s" "$status" <<'PY'
                  import json,sys
                  x=json.load(open('/tmp/bastion-summary.json'));body=json.load(open('/tmp/s'));x.update({'health_http':sys.argv[1],'session_http':sys.argv[2],'session_status':sys.argv[3],'engine':((body.get('engine') or {}).get('engine') if isinstance(body.get('engine'),dict) else body.get('engine')),'me':body.get('me')});json.dump(x,open('docs/waha-bastion-installation.json','w'),indent=2,sort_keys=True)
                  PY
                  exit 0
                  ;;
                STOPPED) curl "${c[@]}" -H "X-Api-Key: $API_KEY" -H 'Content-Type: application/json' -X POST --data '{}' "https://$DOMAIN/api/sessions/nitu-travels/start" >/dev/null || true;;
                FAILED) curl "${c[@]}" -H "X-Api-Key: $API_KEY" -H 'Content-Type: application/json' -X POST --data '{}' "https://$DOMAIN/api/sessions/nitu-travels/restart" >/dev/null || true;;
              esac
            fi
            sleep 10
          done
          exit 1
      - name: Persist result
        if: always()
        run: |
          test -f docs/waha-bastion-installation.json || echo '{"installation":"failed_before_verification"}' > docs/waha-bastion-installation.json
          git config user.name 'github-actions[bot]';git config user.email '4189826+github-actions[bot]@users.noreply.github.com';git add docs/waha-bastion-installation.json;git diff --cached --quiet||git commit -m 'Record WAHA Bastion installation';git push origin HEAD:${{ github.event.pull_request.head.ref }}
