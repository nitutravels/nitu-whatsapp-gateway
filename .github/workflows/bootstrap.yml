name: Bootstrap repository files

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/bootstrap.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Restore complete package
        shell: bash
        run: |
          set -euo pipefail
          cat .bootstrap/package.b64.* | tr -d '[:space:]' | base64 --decode > /tmp/nitu-nested.zip
          unzip -t /tmp/nitu-nested.zip
          unzip -o -q /tmp/nitu-nested.zip -d .
          rm -rf .bootstrap
          rm -f .github/workflows/bootstrap.yml

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A

          if git diff --cached --quiet; then
            echo "Repository already complete."
            exit 0
          fi

          git commit -m "Install complete WhatsApp gateway package"
          git push origin HEAD:main
