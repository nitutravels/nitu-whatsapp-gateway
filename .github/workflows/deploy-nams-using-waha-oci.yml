name: Deploy NAMS using proven WAHA OCI credentials
run-name: Capacity-aware NAMS Oracle recovery ${{ github.run_number }}

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/deploy-nams-using-waha-oci.yml'
      - 'nams-deploy/**'
  workflow_dispatch:

permissions:
  contents: write
  packages: read
  actions: read

concurrency:
  group: nams-production-v5-observable
  cancel-in-progress: false

env:
  RECOVERY_GENERATION: capacity-aware-v5-observable
  NAMS_SOURCE_REF: c74d8660d516e9330a9ad4f24742b10c43c487c4
  NAMS_IMAGE_TAG: c74d8660d516e9330a9ad4f24742b10c43c487c4-cdp1
  NAMS_INSTALLER_REF: 1bf9e499c3d501cd9740ce5ac7af3bfd48c39f2c
  NAMS_APP_IMAGE: ghcr.io/nitutravels/nams-v6-app
  NAMS_CHROMIUM_IMAGE: ghcr.io/nitutravels/nams-v6-chromium

jobs:
  deploy:
    name: Recover, install and verify NAMS without touching WAHA
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 110

    steps:
      - name: Checkout WAHA operations repository
        uses: actions/checkout@v7

      - name: Validate capacity-aware recovery controller
        shell: bash
        run: |
          set -Eeuo pipefail
          bash -n nams-deploy/deploy-capacity-aware.sh
          grep -q 'BASE_CONTROLLER_REF="128feab466e42c9d61b279c2b707ae5053b4721d"' nams-deploy/deploy-capacity-aware.sh
          grep -q 'preserve-boot-volume true' nams-deploy/deploy-capacity-aware.sh
          grep -q 'FAULT-DOMAIN-3' nams-deploy/deploy-capacity-aware.sh
          grep -q 'exec bash "$WORK/controller.sh"' nams-deploy/deploy-capacity-aware.sh

      - name: Prove the WAHA repository has usable OCI production credentials
        shell: bash
        env:
          OCI_PRIVATE_KEY_PEM: ${{ secrets.OCI_PRIVATE_KEY }}
          OCI_FINGERPRINT_VALUE: ${{ secrets.OCI_FINGERPRINT }}
          OCI_USER_VALUE: ${{ secrets.OCI_USER_OCID }}
          OCI_TENANCY_VALUE: ${{ secrets.OCI_TENANCY_OCID }}
        run: |
          set -Eeuo pipefail
          missing=()
          [ -n "$OCI_PRIVATE_KEY_PEM" ] || missing+=(OCI_PRIVATE_KEY)
          [ -n "$OCI_FINGERPRINT_VALUE" ] || missing+=(OCI_FINGERPRINT)
          [ -n "$OCI_USER_VALUE" ] || missing+=(OCI_USER_OCID)
          [ -n "$OCI_TENANCY_VALUE" ] || missing+=(OCI_TENANCY_OCID)
          if [ ${#missing[@]} -gt 0 ]; then
            printf 'Missing production secrets in nitu-whatsapp-gateway: %s\n' "${missing[*]}" >&2
            exit 78
          fi
          grep -q 'BEGIN.*PRIVATE KEY' <<<"$OCI_PRIVATE_KEY_PEM"
          [[ "$OCI_USER_VALUE" == ocid1.user.* ]]
          [[ "$OCI_TENANCY_VALUE" == ocid1.tenancy.* ]]

      - name: Configure OCI CLI from WAHA production secrets
        shell: bash
        env:
          OCI_PRIVATE_KEY_PEM: ${{ secrets.OCI_PRIVATE_KEY }}
          OCI_FINGERPRINT_VALUE: ${{ secrets.OCI_FINGERPRINT }}
          OCI_USER_VALUE: ${{ secrets.OCI_USER_OCID }}
          OCI_TENANCY_VALUE: ${{ secrets.OCI_TENANCY_OCID }}
          OCI_REGION_VALUE: ${{ vars.OCI_REGION || 'ap-mumbai-1' }}
        run: |
          set -Eeuo pipefail
          mkdir -p "$HOME/.oci"
          python3 - <<'PY'
          import os
          from pathlib import Path
          value=os.environ['OCI_PRIVATE_KEY_PEM'].strip()
          if len(value)>=2 and value[0]==value[-1] and value[0] in {'"',"'"}:
              value=value[1:-1]
          if '\\n' in value and '\n' not in value:
              value=value.replace('\\r','').replace('\\n','\n')
          Path.home().joinpath('.oci/key.pem').write_text(value.replace('\r','').strip()+'\n')
          PY
          chmod 600 "$HOME/.oci/key.pem"
          cat >"$HOME/.oci/config" <<EOF
          [DEFAULT]
          user=$OCI_USER_VALUE
          fingerprint=$(printf '%s' "$OCI_FINGERPRINT_VALUE" | tr -d '[:space:]')
          tenancy=$OCI_TENANCY_VALUE
          region=$OCI_REGION_VALUE
          key_file=$HOME/.oci/key.pem
          EOF
          chmod 600 "$HOME/.oci/config"
          pipx install --quiet oci-cli
          echo "$HOME/.local/bin" >>"$GITHUB_PATH"

      - name: Validate OCI identity before any compute change
        shell: bash
        env:
          OCI_REGION: ${{ vars.OCI_REGION || 'ap-mumbai-1' }}
          OCI_TENANCY_OCID: ${{ secrets.OCI_TENANCY_OCID }}
        run: |
          set -Eeuo pipefail
          oci iam region-subscription list --region "$OCI_REGION" --tenancy-id "$OCI_TENANCY_OCID" --all >/dev/null

      - name: Set up Docker Buildx for immutable manifest verification
        uses: docker/setup-buildx-action@v3

      - name: Verify certified ARM64 images
        shell: bash
        run: |
          set -Eeuo pipefail
          mkdir -p deployment-evidence
          for image in "$NAMS_APP_IMAGE:$NAMS_IMAGE_TAG" "$NAMS_CHROMIUM_IMAGE:$NAMS_IMAGE_TAG"; do
            file="deployment-evidence/$(basename "$image" | tr ':' '-').manifest.txt"
            docker buildx imagetools inspect "$image" | tee "$file"
            grep -q 'linux/arm64' "$file"
          done

      - name: Run targeted capacity-aware Oracle recovery
        id: deploy
        continue-on-error: true
        shell: bash
        env:
          OCI_REGION: ${{ vars.OCI_REGION || 'ap-mumbai-1' }}
          OCI_TENANCY_OCID: ${{ secrets.OCI_TENANCY_OCID }}
          OCI_COMPARTMENT_OCID: ${{ vars.OCI_COMPARTMENT_OCID }}
          OCI_COMPARTMENT_NAME: NituWAGateway
          OCI_REFERENCE_INSTANCE: NituTravelsWAHA-20260719T184923Z
          OCI_TARGET_INSTANCE: NAMS-Lightpanda-Agent
          OCI_NSG_NAME: NAMS-Lightpanda-NSG
          OCI_RESERVED_IP: ${{ vars.NAMS_RESERVED_IP || '161.118.166.225' }}
          NAMS_DOMAIN: ${{ vars.NAMS_DOMAIN || 'seo.nitutravels.in' }}
          NAMS_SOURCE_REF: ${{ env.NAMS_SOURCE_REF }}
          NAMS_IMAGE_TAG: ${{ env.NAMS_IMAGE_TAG }}
          NAMS_INSTALLER_REF: ${{ env.NAMS_INSTALLER_REF }}
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NAMS_RESULT_FILE: ${{ github.workspace }}/nams-deployment-result.json
        run: |
          set -uo pipefail
          mkdir -p deployment-evidence
          chmod 700 nams-deploy/deploy-capacity-aware.sh
          set +e
          bash -x nams-deploy/deploy-capacity-aware.sh > >(tee deployment-evidence/controller.log) 2>&1
          rc=$?
          set -e
          if [ ! -s "$NAMS_RESULT_FILE" ]; then
            tail -n 300 deployment-evidence/controller.log >deployment-evidence/controller-tail.log || true
            jq -n --argjson rc "$rc" --arg tail "$(tail -c 6000 deployment-evidence/controller.log 2>/dev/null || true)" \
              '{status:"failed",phase:"controller",message:"Controller returned without producing its required result",exit_code:$rc,controller_tail:$tail}' >"$NAMS_RESULT_FILE"
            [ "$rc" -ne 0 ] || rc=90
          fi
          exit "$rc"

      - name: Collect sanitized result and DNS evidence
        if: always()
        shell: bash
        env:
          DEPLOY_OUTCOME: ${{ steps.deploy.outcome }}
          DOMAIN: ${{ vars.NAMS_DOMAIN || 'seo.nitutravels.in' }}
        run: |
          set -Eeuo pipefail
          mkdir -p status deployment-evidence
          if [ -s nams-deployment-result.json ]; then
            cp nams-deployment-result.json status/nams-deployment-via-waha.json
          else
            jq -n --arg outcome "$DEPLOY_OUTCOME" '{status:"failed",phase:"workflow",message:("Recovery controller produced no result; outcome="+$outcome)}' >status/nams-deployment-via-waha.json
          fi
          resolved="$(getent ahostsv4 "$DOMAIN" 2>/dev/null | awk 'NR==1{print $1}' || true)"
          public_ip="$(jq -r '.public_ip // empty' status/nams-deployment-via-waha.json)"
          jq --arg run_id "$GITHUB_RUN_ID" \
             --arg run_url "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID" \
             --arg workflow_outcome "$DEPLOY_OUTCOME" \
             --arg dns_ip "$resolved" \
             --arg expected_ip "$public_ip" \
             '. + {run_id:$run_id,run_url:$run_url,workflow_outcome:$workflow_outcome,dns_ip:$dns_ip,dns_matches_deployment:($dns_ip!="" and $expected_ip!="" and $dns_ip==$expected_ip),recorded_at:(now|todate)}' \
             status/nams-deployment-via-waha.json >status/nams-deployment-via-waha.tmp
          mv status/nams-deployment-via-waha.tmp status/nams-deployment-via-waha.json
          cp status/nams-deployment-via-waha.json deployment-evidence/result.json
          cp nams-token-retrieval.txt deployment-evidence/ 2>/dev/null || true
          cp nams-deployment-diagnostics.tgz deployment-evidence/ 2>/dev/null || true
          cat status/nams-deployment-via-waha.json

      - name: Record deployment result
        if: always()
        shell: bash
        run: |
          set -Eeuo pipefail
          cp status/nams-deployment-via-waha.json /tmp/nams-deployment-via-waha.json
          git reset --hard HEAD
          git pull --ff-only origin main
          mkdir -p status
          cp /tmp/nams-deployment-via-waha.json status/nams-deployment-via-waha.json
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add status/nams-deployment-via-waha.json
          if ! git diff --cached --quiet; then
            git commit -m "Record observable NAMS recovery for run $GITHUB_RUN_ID [skip ci]"
            git push
          fi

      - name: Upload deployment evidence and exact OCI diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nams-deployment-via-waha
          path: deployment-evidence/
          if-no-files-found: warn
          retention-days: 14

      - name: Enforce verified completion
        if: always()
        shell: bash
        env:
          DEPLOY_OUTCOME: ${{ steps.deploy.outcome }}
        run: |
          set -Eeuo pipefail
          status="$(jq -r '.status // "failed"' status/nams-deployment-via-waha.json)"
          if [ "$DEPLOY_OUTCOME" != success ] || [ "$status" != success ]; then
            echo 'NAMS recovery did not complete. Exact controller output and diagnostics were preserved.' >&2
            exit 1
          fi
          echo 'NAMS deployment completed and was fully verified.'