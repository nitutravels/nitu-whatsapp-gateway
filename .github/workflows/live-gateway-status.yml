name: Isolated live gateway status

# Trigger isolated diagnostic without touching production branch.
on:
  push:
    branches: [live-gateway-status]
    paths: ['.github/workflows/live-gateway-status.yml']

permissions:
  contents: write

jobs:
  probe:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v7
        with:
          ref: live-gateway-status

      - name: Configure OCI credentials
        shell: bash
        env:
          OCI_PRIVATE_KEY_PEM: ${{ secrets.OCI_PRIVATE_KEY }}
          OCI_FINGERPRINT_VALUE: ${{ secrets.OCI_FINGERPRINT }}
        run: |
          set -Eeuo pipefail
          mkdir -p "$HOME/.oci"
          python - <<'PY'
          import os
          from pathlib import Path
          value = os.environ.get('OCI_PRIVATE_KEY_PEM', '').strip()
          if len(value) >= 2 and value[0] == value[-1] and value[0] in {'"', "'"}:
              value = value[1:-1]
          if '\\n' in value and '\n' not in value:
              value = value.replace('\\r', '').replace('\\n', '\n')
          Path.home().joinpath('.oci/key.pem').write_text(value.replace('\r', '').strip() + '\n', encoding='utf-8')
          PY
          chmod 600 "$HOME/.oci/key.pem"
          fingerprint="$(printf '%s' "$OCI_FINGERPRINT_VALUE" | tr -d '[:space:]')"
          cat > "$HOME/.oci/config" <<EOF
          [DEFAULT]
          user=${{ secrets.OCI_USER_OCID }}
          fingerprint=$fingerprint
          tenancy=${{ secrets.OCI_TENANCY_OCID }}
          region=${{ vars.OCI_REGION }}
          key_file=$HOME/.oci/key.pem
          EOF
          chmod 600 "$HOME/.oci/config"

      - name: Probe live gateway and Oracle agent
        shell: bash
        env:
          COMPARTMENT_OCID: ${{ vars.OCI_COMPARTMENT_OCID }}
          ADMIN_TOKEN: ${{ secrets.GATEWAY_ADMIN_TOKEN }}
        run: |
          set +e
          exec > >(tee live-gateway-status.txt) 2>&1
          pipx install --quiet oci-cli
          echo 'LIVE_GATEWAY_STATUS_BEGIN'
          echo "CHECKED_AT=$(date -u +%FT%TZ)"
          instance_id="$(oci compute instance list --compartment-id "$COMPARTMENT_OCID" --display-name nitu-whatsapp-gateway --all --query 'data[?"lifecycle-state"==`RUNNING`].id | [0]' --raw-output 2>/dev/null)"
          if [[ "$instance_id" =~ ^ocid1\.instance\. ]]; then
            echo 'INSTANCE_RUNNING=yes'
            echo 'ORACLE_PLUGINS_BEGIN'
            oci instance-agent plugin list --compartment-id "$COMPARTMENT_OCID" --instanceagent-id "$instance_id" --all --query 'data[].{name:name,status:status,message:message}' --output json 2>/dev/null | jq -c '.[]?' || true
            echo 'ORACLE_PLUGINS_END'
            echo 'RECENT_COMMAND_EXECUTIONS_BEGIN'
            oci instance-agent command-execution list --compartment-id "$COMPARTMENT_OCID" --instance-id "$instance_id" --all --output json 2>/dev/null | jq -c '[.data[]? | {state:."lifecycle-state",created:."time-created",updated:."time-updated",exitCode:(."content"."exit-code" // null),message:(."content".message // null)}] | sort_by(.created) | reverse | .[:5][]' || true
            echo 'RECENT_COMMAND_EXECUTIONS_END'
          else
            echo 'INSTANCE_RUNNING=no'
          fi

          health_code="$(curl -sS --connect-timeout 10 --max-time 30 -o /tmp/health.json -w '%{http_code}' https://wa.nitutravels.in/healthz || echo 000)"
          ready_code="$(curl -sS --connect-timeout 10 --max-time 30 -o /tmp/ready.json -w '%{http_code}' https://wa.nitutravels.in/readyz || echo 000)"
          status_code="$(curl -sS --connect-timeout 10 --max-time 30 -H "Authorization: Bearer $ADMIN_TOKEN" -o /tmp/status.json -w '%{http_code}' https://wa.nitutravels.in/admin/api/status || echo 000)"
          messages_code="$(curl -sS --connect-timeout 10 --max-time 30 -H "Authorization: Bearer $ADMIN_TOKEN" -o /tmp/messages.json -w '%{http_code}' 'https://wa.nitutravels.in/admin/api/messages?limit=20' || echo 000)"
          echo "HEALTH_HTTP=$health_code"
          echo "READY_HTTP=$ready_code"
          echo "STATUS_HTTP=$status_code"
          echo "MESSAGES_HTTP=$messages_code"
          echo -n 'STATUS='; jq -c '{status,ready,account,lastError,queue}' /tmp/status.json 2>/dev/null || cat /tmp/status.json; echo
          echo -n 'MESSAGE_SUMMARY='; jq -c '[group_by(.status)[] | {status:.[0].status,count:length}]' /tmp/messages.json 2>/dev/null || cat /tmp/messages.json; echo
          echo 'LIVE_GATEWAY_STATUS_END'

      - name: Save diagnostic result
        if: always()
        shell: bash
        run: |
          set -Eeuo pipefail
          test -f live-gateway-status.txt || echo 'No result generated.' > live-gateway-status.txt
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add live-gateway-status.txt
          git diff --cached --quiet || git commit -m 'Record isolated live gateway status'
          git push origin HEAD:live-gateway-status
