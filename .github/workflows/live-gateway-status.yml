name: Cancel obsolete WhatsApp recovery command

# OCI command summaries expose instance-agent-command-id.
on:
  push:
    branches: [live-gateway-status]
    paths: ['.github/workflows/live-gateway-status.yml']

permissions:
  contents: write

jobs:
  cancel:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v7
        with:
          ref: live-gateway-status

      - name: Configure OCI credentials
        shell: bash
        env:
          OCI_PRIVATE_KEY_PEM: ${{ secrets.OCI_PRIVATE_KEY }}
          OCI_FINGERPRINT_VALUE: ${{ secrets.OCI_FINGERPRINT }}
        run: |
          set -Eeuo pipefail
          mkdir -p "$HOME/.oci"
          python - <<'PY'
          import os
          from pathlib import Path
          value = os.environ.get('OCI_PRIVATE_KEY_PEM', '').strip()
          if len(value) >= 2 and value[0] == value[-1] and value[0] in {'"', "'"}:
              value = value[1:-1]
          if '\\n' in value and '\n' not in value:
              value = value.replace('\\r', '').replace('\\n', '\n')
          Path.home().joinpath('.oci/key.pem').write_text(value.replace('\r', '').strip() + '\n', encoding='utf-8')
          PY
          chmod 600 "$HOME/.oci/key.pem"
          fingerprint="$(printf '%s' "$OCI_FINGERPRINT_VALUE" | tr -d '[:space:]')"
          cat > "$HOME/.oci/config" <<EOF
          [DEFAULT]
          user=${{ secrets.OCI_USER_OCID }}
          fingerprint=$fingerprint
          tenancy=${{ secrets.OCI_TENANCY_OCID }}
          region=${{ vars.OCI_REGION }}
          key_file=$HOME/.oci/key.pem
          EOF
          chmod 600 "$HOME/.oci/config"

      - name: Cancel only the temporary priority command
        shell: bash
        env:
          COMPARTMENT_OCID: ${{ vars.OCI_COMPARTMENT_OCID }}
        run: |
          set -Eeuo pipefail
          exec > >(tee live-gateway-command-cancel.txt) 2>&1
          pipx install --quiet oci-cli
          echo 'GATEWAY_COMMAND_CANCEL_BEGIN'
          commands_json="$(oci instance-agent command list --compartment-id "$COMPARTMENT_OCID" --all --output json)"
          mapfile -t command_ids < <(jq -r '.data[]? | select(."display-name" == "Nitu WhatsApp priority recovery") | select((."is-canceled" // false) != true) | ."instance-agent-command-id" // empty' <<<"$commands_json")
          echo "MATCHING_ACTIVE_COMMANDS=${#command_ids[@]}"
          canceled=0
          for command_id in "${command_ids[@]}"; do
            [ -n "$command_id" ] || continue
            oci instance-agent command cancel --command-id "$command_id" --force >/dev/null
            canceled=$((canceled + 1))
          done
          echo "CANCEL_REQUESTED_COUNT=$canceled"
          sleep 5
          verify_json="$(oci instance-agent command list --compartment-id "$COMPARTMENT_OCID" --all --output json)"
          remaining="$(jq '[.data[]? | select(."display-name" == "Nitu WhatsApp priority recovery") | select((."is-canceled" // false) != true)] | length' <<<"$verify_json")"
          echo "REMAINING_NOT_CANCELED=$remaining"
          jq -c '.data[]? | select(."display-name" == "Nitu WhatsApp priority recovery") | {commandId:."instance-agent-command-id",displayName:."display-name",isCanceled:."is-canceled",timeCreated:."time-created"}' <<<"$verify_json" || true
          [ "$remaining" -eq 0 ]
          echo 'GATEWAY_COMMAND_CANCEL_END'

      - name: Save cancellation result
        if: always()
        shell: bash
        run: |
          set -Eeuo pipefail
          test -f live-gateway-command-cancel.txt || echo 'No cancellation result generated.' > live-gateway-command-cancel.txt
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add live-gateway-command-cancel.txt
          git diff --cached --quiet || git commit -m 'Record obsolete gateway command cancellation'
          git push origin HEAD:live-gateway-status
