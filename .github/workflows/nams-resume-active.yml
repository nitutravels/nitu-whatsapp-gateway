name: Resume or replace NAMS production
run-name: Resume active NAMS candidate ${{ github.run_number }}

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/nams-resume-active.yml'
      - 'nams-deploy/resume-active-or-deploy.sh'
      - 'nams-deploy/deploy-capacity-aware.sh'
  workflow_dispatch:

permissions:
  contents: write
  packages: read

concurrency:
  group: nams-production-resume
  cancel-in-progress: false

env:
  NAMS_SOURCE_REF: c74d8660d516e9330a9ad4f24742b10c43c487c4
  NAMS_IMAGE_TAG: c74d8660d516e9330a9ad4f24742b10c43c487c4-cdp1
  NAMS_INSTALLER_REF: 1bf9e499c3d501cd9740ce5ac7af3bfd48c39f2c

jobs:
  recover:
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v7

      - name: Validate recovery scripts
        run: |
          set -Eeuo pipefail
          bash -n nams-deploy/resume-active-or-deploy.sh
          bash -n nams-deploy/deploy-capacity-aware.sh

      - name: Configure OCI CLI
        env:
          OCI_PRIVATE_KEY_PEM: ${{ secrets.OCI_PRIVATE_KEY }}
          OCI_FINGERPRINT_VALUE: ${{ secrets.OCI_FINGERPRINT }}
          OCI_USER_VALUE: ${{ secrets.OCI_USER_OCID }}
          OCI_TENANCY_VALUE: ${{ secrets.OCI_TENANCY_OCID }}
          OCI_REGION_VALUE: ${{ vars.OCI_REGION || 'ap-mumbai-1' }}
        run: |
          set -Eeuo pipefail
          test -n "$OCI_PRIVATE_KEY_PEM"
          test -n "$OCI_FINGERPRINT_VALUE"
          [[ "$OCI_USER_VALUE" == ocid1.user.* ]]
          [[ "$OCI_TENANCY_VALUE" == ocid1.tenancy.* ]]
          mkdir -p "$HOME/.oci"
          python3 - <<'PY'
          import os
          from pathlib import Path
          value=os.environ['OCI_PRIVATE_KEY_PEM'].strip()
          if len(value)>=2 and value[0]==value[-1] and value[0] in {'"',"'"}: value=value[1:-1]
          if '\\n' in value and '\n' not in value: value=value.replace('\\r','').replace('\\n','\n')
          Path.home().joinpath('.oci/key.pem').write_text(value.replace('\r','').strip()+'\n')
          PY
          chmod 600 "$HOME/.oci/key.pem"
          cat >"$HOME/.oci/config" <<EOF
          [DEFAULT]
          user=$OCI_USER_VALUE
          fingerprint=$(printf '%s' "$OCI_FINGERPRINT_VALUE" | tr -d '[:space:]')
          tenancy=$OCI_TENANCY_VALUE
          region=$OCI_REGION_VALUE
          key_file=$HOME/.oci/key.pem
          EOF
          chmod 600 "$HOME/.oci/config"
          pipx install --quiet oci-cli
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - uses: docker/setup-buildx-action@v3

      - name: Run secure NAMS recovery
        id: deploy
        continue-on-error: true
        env:
          OCI_REGION: ${{ vars.OCI_REGION || 'ap-mumbai-1' }}
          OCI_TENANCY_OCID: ${{ secrets.OCI_TENANCY_OCID }}
          OCI_COMPARTMENT_OCID: ${{ vars.OCI_COMPARTMENT_OCID }}
          OCI_REFERENCE_INSTANCE: NituTravelsWAHA-20260719T184923Z
          OCI_TARGET_INSTANCE: NAMS-Lightpanda-Agent
          OCI_NSG_NAME: NAMS-Lightpanda-NSG
          OCI_RESERVED_IP: ${{ vars.NAMS_RESERVED_IP || '161.118.166.225' }}
          NAMS_DOMAIN: ${{ vars.NAMS_DOMAIN || 'seo.nitutravels.in' }}
          NAMS_SOURCE_REF: ${{ env.NAMS_SOURCE_REF }}
          NAMS_IMAGE_TAG: ${{ env.NAMS_IMAGE_TAG }}
          NAMS_INSTALLER_REF: ${{ env.NAMS_INSTALLER_REF }}
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NAMS_RESULT_FILE: ${{ github.workspace }}/nams-deployment-result.json
        run: |
          set -uo pipefail
          mkdir -p deployment-evidence
          chmod 700 nams-deploy/*.sh
          set +e
          bash nams-deploy/resume-active-or-deploy.sh >deployment-evidence/controller.log 2>&1
          rc=$?
          set -e
          sed -E -i 's/ghs_[A-Za-z0-9_.-]+/[REDACTED_GITHUB_TOKEN]/g; s/(ADMIN_TOKEN=)[^ ]+/\1[REDACTED]/g; s/(TOKEN=)[0-9a-fA-F]{32,}/\1[REDACTED]/g' deployment-evidence/controller.log
          if [ ! -s "$NAMS_RESULT_FILE" ]; then
            jq -n --argjson rc "$rc" '{status:"failed",phase:"controller",message:"Recovery controller produced no result",exit_code:$rc}' >"$NAMS_RESULT_FILE"
            [ "$rc" -ne 0 ] || rc=90
          fi
          exit "$rc"

      - name: Record sanitized result
        if: always()
        env:
          OUTCOME: ${{ steps.deploy.outcome }}
          DOMAIN: ${{ vars.NAMS_DOMAIN || 'seo.nitutravels.in' }}
        run: |
          set -Eeuo pipefail
          mkdir -p status deployment-evidence
          cp nams-deployment-result.json status/nams-deployment-via-waha.json
          dns_ip="$(getent ahostsv4 "$DOMAIN" 2>/dev/null | awk 'NR==1{print $1}' || true)"
          expected="$(jq -r '.public_ip // empty' status/nams-deployment-via-waha.json)"
          jq --arg run_id "$GITHUB_RUN_ID" --arg run_url "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID" --arg outcome "$OUTCOME" --arg dns "$dns_ip" --arg expected "$expected" '. + {run_id:$run_id,run_url:$run_url,workflow_outcome:$outcome,dns_ip:$dns,dns_matches_deployment:($dns!="" and $expected!="" and $dns==$expected),recorded_at:(now|todate)}' status/nams-deployment-via-waha.json >status/result.tmp
          mv status/result.tmp status/nams-deployment-via-waha.json
          cp status/nams-deployment-via-waha.json deployment-evidence/result.json
          cp nams-token-retrieval.txt deployment-evidence/ 2>/dev/null || true
          cp nams-deployment-diagnostics.tgz deployment-evidence/ 2>/dev/null || true
          cp status/nams-deployment-via-waha.json /tmp/result.json
          git reset --hard HEAD
          git pull --ff-only origin main
          mkdir -p status
          cp /tmp/result.json status/nams-deployment-via-waha.json
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add status/nams-deployment-via-waha.json
          if ! git diff --cached --quiet; then
            git commit -m "Record secure NAMS resume run $GITHUB_RUN_ID [skip ci]"
            git push
          fi

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: nams-secure-resume
          path: deployment-evidence/
          retention-days: 14

      - name: Enforce verified completion
        if: always()
        run: |
          set -Eeuo pipefail
          test "$(jq -r '.status' status/nams-deployment-via-waha.json)" = success
