name: OCI policy diagnostic

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/oci-policy-diagnostic.yml'

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Configure OCI credentials
        shell: bash
        env:
          OCI_PRIVATE_KEY_PEM: ${{ secrets.OCI_PRIVATE_KEY }}
        run: |
          set -Eeuo pipefail
          mkdir -p "$HOME/.oci"
          printf '%s\n' "$OCI_PRIVATE_KEY_PEM" > "$HOME/.oci/oci_api_key.pem"
          chmod 600 "$HOME/.oci/oci_api_key.pem"
          cat > "$HOME/.oci/config" <<EOF
          [DEFAULT]
          user=${{ secrets.OCI_USER_OCID }}
          fingerprint=${{ secrets.OCI_FINGERPRINT }}
          tenancy=${{ secrets.OCI_TENANCY_OCID }}
          region=${{ vars.OCI_REGION }}
          key_file=$HOME/.oci/oci_api_key.pem
          EOF
          chmod 600 "$HOME/.oci/config"
      - name: Install OCI CLI
        run: pipx install --quiet oci-cli
      - name: Test effective permissions
        shell: bash
        env:
          COMPARTMENT: ${{ vars.OCI_COMPARTMENT_OCID }}
          NAMESPACE: ${{ vars.OCI_NAMESPACE }}
          BUCKET: ${{ vars.OCI_TF_STATE_BUCKET }}
          OCI_CLI_SUPPRESS_FILE_PERMISSIONS_WARNING: 'True'
          SUPPRESS_LABEL_WARNING: 'True'
        run: |
          set +e
          report() {
            local label="$1" file="$2" rc="$3"
            echo "${label}_exit=${rc}"
            if [ "$rc" -ne 0 ]; then
              grep -E '"code"|"message"|"status"|"operation_name"' "$file" | head -n 12 || true
            fi
          }

          oci iam compartment get --compartment-id "$COMPARTMENT" >/dev/null 2>/tmp/comp.err
          RC=$?
          report compartment_get /tmp/comp.err "$RC"

          oci os bucket get --namespace-name "$NAMESPACE" --bucket-name "$BUCKET" >/dev/null 2>/tmp/get.err
          RC=$?
          report bucket_get /tmp/get.err "$RC"

          oci os bucket create --namespace-name "$NAMESPACE" --compartment-id "$COMPARTMENT" --name "$BUCKET" --public-access-type NoPublicAccess --storage-tier Standard --versioning Enabled >/dev/null 2>/tmp/create.err
          RC=$?
          report bucket_create /tmp/create.err "$RC"

          exit 1
