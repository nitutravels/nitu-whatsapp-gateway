name: OCI policy diagnostic

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/oci-policy-diagnostic.yml'

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Configure OCI credentials
        shell: bash
        env:
          OCI_PRIVATE_KEY_PEM: ${{ secrets.OCI_PRIVATE_KEY }}
        run: |
          set -Eeuo pipefail
          mkdir -p "$HOME/.oci"
          printf '%s\n' "$OCI_PRIVATE_KEY_PEM" > "$HOME/.oci/oci_api_key.pem"
          chmod 600 "$HOME/.oci/oci_api_key.pem"
          cat > "$HOME/.oci/config" <<EOF
          [DEFAULT]
          user=${{ secrets.OCI_USER_OCID }}
          fingerprint=${{ secrets.OCI_FINGERPRINT }}
          tenancy=${{ secrets.OCI_TENANCY_OCID }}
          region=${{ vars.OCI_REGION }}
          key_file=$HOME/.oci/oci_api_key.pem
          EOF
          chmod 600 "$HOME/.oci/config"
      - name: Install OCI CLI
        run: pipx install --quiet oci-cli
      - name: Create repository-specific state bucket
        shell: bash
        env:
          COMPARTMENT: ${{ vars.OCI_COMPARTMENT_OCID }}
          NAMESPACE: ${{ vars.OCI_NAMESPACE }}
          OCI_CLI_SUPPRESS_FILE_PERMISSIONS_WARNING: 'True'
          SUPPRESS_LABEL_WARNING: 'True'
        run: |
          set +e
          BUCKET="nitu-wa-tfstate-${GITHUB_REPOSITORY_ID}-bom"
          echo "candidate_bucket=$BUCKET"

          oci os bucket get --namespace-name "$NAMESPACE" --bucket-name "$BUCKET" >/dev/null 2>/tmp/get.err
          GET_RC=$?
          echo "candidate_get_exit=$GET_RC"

          if [ "$GET_RC" -ne 0 ]; then
            oci os bucket create \
              --namespace-name "$NAMESPACE" \
              --compartment-id "$COMPARTMENT" \
              --name "$BUCKET" \
              --public-access-type NoPublicAccess \
              --storage-tier Standard \
              --versioning Enabled >/dev/null 2>/tmp/create.err
            CREATE_RC=$?
            echo "candidate_create_exit=$CREATE_RC"
            if [ "$CREATE_RC" -ne 0 ]; then
              grep -E '"code"|"message"|"status"|"operation_name"' /tmp/create.err | head -n 12 || true
              exit 1
            fi
          fi

          oci os bucket get --namespace-name "$NAMESPACE" --bucket-name "$BUCKET" >/dev/null 2>/tmp/verify.err
          VERIFY_RC=$?
          echo "candidate_verify_exit=$VERIFY_RC"
          if [ "$VERIFY_RC" -ne 0 ]; then
            grep -E '"code"|"message"|"status"|"operation_name"' /tmp/verify.err | head -n 12 || true
            exit 1
          fi

          echo 'repository_specific_bucket_ready=yes'
          echo 'Diagnostic intentionally exits nonzero after reporting verified state.'
          exit 1
