name: Control-plane WhatsApp recovery

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write
  packages: read

concurrency:
  group: nitu-whatsapp-control-plane-recovery
  cancel-in-progress: false

jobs:
  recover:
    if: github.event_name == 'workflow_dispatch' || contains(github.event.head_commit.message, '[deploy]')
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 55

    steps:
      - uses: actions/checkout@v7

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure OCI credentials
        shell: bash
        env:
          OCI_PRIVATE_KEY_PEM: ${{ secrets.OCI_PRIVATE_KEY }}
          OCI_FINGERPRINT_VALUE: ${{ secrets.OCI_FINGERPRINT }}
        run: |
          set -Eeuo pipefail
          mkdir -p "$HOME/.oci"
          python - <<'PY'
          import os
          from pathlib import Path
          value = os.environ.get('OCI_PRIVATE_KEY_PEM', '').strip()
          if len(value) >= 2 and value[0] == value[-1] and value[0] in {'"', "'"}:
              value = value[1:-1]
          if '\\n' in value and '\n' not in value:
              value = value.replace('\\r', '').replace('\\n', '\n')
          Path.home().joinpath('.oci/key.pem').write_text(value.replace('\r', '').strip() + '\n', encoding='utf-8')
          PY
          chmod 600 "$HOME/.oci/key.pem"
          fingerprint="$(printf '%s' "$OCI_FINGERPRINT_VALUE" | tr -d '[:space:]')"
          cat > "$HOME/.oci/config" <<EOF
          [DEFAULT]
          user=${{ secrets.OCI_USER_OCID }}
          fingerprint=$fingerprint
          tenancy=${{ secrets.OCI_TENANCY_OCID }}
          region=${{ vars.OCI_REGION }}
          key_file=$HOME/.oci/key.pem
          EOF
          chmod 600 "$HOME/.oci/config"

      - name: Install deployment utilities
        shell: bash
        run: |
          set -Eeuo pipefail
          pipx install --quiet oci-cli
          sudo apt-get update -qq
          sudo apt-get install -y -qq dnsutils

      - name: Deploy Baileys v2 through OCI control plane
        shell: bash
        env:
          COMPARTMENT_OCID: ${{ vars.OCI_COMPARTMENT_OCID }}
          DOMAIN: ${{ vars.GATEWAY_DOMAIN || 'wa.nitutravels.in' }}
          ADMIN_TOKEN: ${{ secrets.GATEWAY_ADMIN_TOKEN }}
          IMAGE: ghcr.io/${{ github.repository }}:${{ github.sha }}
        run: |
          set -Eeuo pipefail
          mkdir -p docs
          chmod 0755 scripts/deploy-baileys-v2.sh
          scripts/deploy-baileys-v2.sh 2>&1 | tee docs/baileys-v2-deployment-result.txt

      - name: Persist deployment result
        if: always()
        shell: bash
        run: |
          set -Eeuo pipefail
          test -f docs/baileys-v2-deployment-result.txt || \
            echo 'Deployment did not produce a result file.' > docs/baileys-v2-deployment-result.txt
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add docs/baileys-v2-deployment-result.txt
          git diff --cached --quiet || git commit -m 'Record Baileys v2 deployment result'
          git push origin HEAD:main
