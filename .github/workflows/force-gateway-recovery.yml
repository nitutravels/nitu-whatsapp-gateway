name: Priority WhatsApp gateway recovery

on:
  push:
    branches: [main]
    paths: ['.github/workflows/force-gateway-recovery.yml']

permissions:
  contents: write
  packages: read

jobs:
  recover:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v7

      - name: Configure OCI credentials
        shell: bash
        env:
          OCI_PRIVATE_KEY_PEM: ${{ secrets.OCI_PRIVATE_KEY }}
          OCI_FINGERPRINT_VALUE: ${{ secrets.OCI_FINGERPRINT }}
        run: |
          set -Eeuo pipefail
          mkdir -p "$HOME/.oci"
          python - <<'PY'
          import os
          from pathlib import Path
          value = os.environ.get('OCI_PRIVATE_KEY_PEM', '').strip()
          if len(value) >= 2 and value[0] == value[-1] and value[0] in {'"', "'"}:
              value = value[1:-1]
          if '\\n' in value and '\n' not in value:
              value = value.replace('\\r', '').replace('\\n', '\n')
          Path.home().joinpath('.oci/key.pem').write_text(value.replace('\r', '').strip() + '\n', encoding='utf-8')
          PY
          chmod 600 "$HOME/.oci/key.pem"
          fingerprint="$(printf '%s' "$OCI_FINGERPRINT_VALUE" | tr -d '[:space:]')"
          cat > "$HOME/.oci/config" <<EOF
          [DEFAULT]
          user=${{ secrets.OCI_USER_OCID }}
          fingerprint=$fingerprint
          tenancy=${{ secrets.OCI_TENANCY_OCID }}
          region=${{ vars.OCI_REGION }}
          key_file=$HOME/.oci/key.pem
          EOF
          chmod 600 "$HOME/.oci/config"

      - name: Install OCI CLI
        run: pipx install --quiet oci-cli

      - name: Execute bounded Oracle recovery
        shell: bash
        env:
          COMPARTMENT_OCID: ${{ vars.OCI_COMPARTMENT_OCID }}
          DOMAIN: wa.nitutravels.in
          ADMIN_TOKEN: ${{ secrets.GATEWAY_ADMIN_TOKEN }}
          IMAGE: ghcr.io/${{ github.repository }}:${{ github.sha }}
        run: |
          set -Eeuo pipefail
          exec > >(tee docs/priority-gateway-recovery-result.txt) 2>&1
          echo 'PRIORITY_GATEWAY_RECOVERY_BEGIN'
          echo "SOURCE_COMMIT=${GITHUB_SHA}"

          instance_id="$(oci compute instance list \
            --compartment-id "$COMPARTMENT_OCID" \
            --display-name nitu-whatsapp-gateway \
            --all \
            --query 'data[?"lifecycle-state"==`RUNNING`].id | [0]' \
            --raw-output)"
          if [[ ! "$instance_id" =~ ^ocid1\.instance\. ]]; then
            echo 'RECOVERY_RESULT=failed'
            echo 'ERROR=Running gateway instance was not found.'
            exit 1
          fi

          script_url="https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/${GITHUB_SHA}/scripts/recover-whatsapp.sh"
          command_text="curl -fsSL '$script_url' -o /tmp/nitu-wa-recover.sh && chmod 700 /tmp/nitu-wa-recover.sh && /tmp/nitu-wa-recover.sh '$IMAGE' '918901066699'"
          if [ "${#command_text}" -gt 4000 ]; then
            echo 'RECOVERY_RESULT=failed'
            echo 'ERROR=Generated Oracle command exceeds safe inline length.'
            exit 1
          fi

          jq -n --arg text "$command_text" \
            '{source:{sourceType:"TEXT",text:$text},output:{outputType:"TEXT"}}' > /tmp/content.json
          jq -n --arg id "$instance_id" '{instanceId:$id}' > /tmp/target.json

          command_id="$(oci instance-agent command create \
            --compartment-id "$COMPARTMENT_OCID" \
            --content file:///tmp/content.json \
            --target file:///tmp/target.json \
            --timeout-in-seconds 1800 \
            --display-name 'Nitu WhatsApp browser and pairing recovery' \
            --query 'data.id' --raw-output)"
          echo 'INSTANCE_COMMAND_CREATED=yes'

          execution_state=''
          execution_json=''
          for attempt in $(seq 1 120); do
            execution_json="$(oci instance-agent command-execution get --command-id "$command_id" --instance-id "$instance_id" --output json)"
            execution_state="$(jq -r '.data."lifecycle-state" // empty' <<<"$execution_json")"
            echo "COMMAND_ATTEMPT=$attempt STATE=$execution_state"
            case "$execution_state" in
              SUCCEEDED) break ;;
              FAILED|CANCELED|TIMED_OUT)
                echo -n 'COMMAND_OUTPUT='; jq -c '.data.content // {}' <<<"$execution_json"; echo
                echo 'RECOVERY_RESULT=failed'
                exit 1
                ;;
            esac
            sleep 15
          done
          [ "$execution_state" = SUCCEEDED ] || { echo 'RECOVERY_RESULT=failed'; echo "ERROR=Command ended in $execution_state"; exit 1; }
          echo -n 'COMMAND_OUTPUT='; jq -c '.data.content // {}' <<<"$execution_json"; echo

          verified=0
          for attempt in $(seq 1 36); do
            health_code="$(curl -sS --connect-timeout 10 --max-time 30 -o /tmp/health.json -w '%{http_code}' "https://$DOMAIN/healthz" || echo 000)"
            status_code="$(curl -sS --connect-timeout 10 --max-time 30 -H "Authorization: Bearer $ADMIN_TOKEN" -o /tmp/status.json -w '%{http_code}' "https://$DOMAIN/admin/api/status" || echo 000)"
            status="$(jq -r '.status // "unknown"' /tmp/status.json 2>/dev/null || echo unknown)"
            is_ready="$(jq -r '.ready // false' /tmp/status.json 2>/dev/null || echo false)"
            has_qr="$(jq -r '((.qrDataUrl // "") | length) > 20' /tmp/status.json 2>/dev/null || echo false)"
            has_code="$(jq -r '((.pairingCode // "") | length) >= 8' /tmp/status.json 2>/dev/null || echo false)"
            last_error="$(jq -r '.lastError // ""' /tmp/status.json 2>/dev/null || true)"
            echo "VERIFY_ATTEMPT=$attempt HEALTH_HTTP=$health_code STATUS_HTTP=$status_code STATUS=$status READY=$is_ready HAS_QR=$has_qr HAS_CODE=$has_code LAST_ERROR_PRESENT=$([ -n "$last_error" ] && echo yes || echo no)"
            if [ "$health_code" = 200 ] && [ "$status_code" = 200 ]; then
              if [ "$is_ready" = true ] || { [ "$status" = awaiting_pairing ] && { [ "$has_qr" = true ] || [ "$has_code" = true ]; }; }; then
                verified=1
                break
              fi
            fi
            sleep 10
          done

          echo -n 'FINAL_STATUS='; jq -c '{status,ready,account,hasQr:((.qrDataUrl // "")|length>20),hasPairingCode:((.pairingCode // "")|length>=8),lastErrorPresent:((.lastError // "")|length>0),queue}' /tmp/status.json 2>/dev/null || cat /tmp/status.json; echo
          if [ "$verified" -eq 1 ]; then
            echo 'RECOVERY_RESULT=success'
          else
            echo 'RECOVERY_RESULT=failed'
            exit 1
          fi
          echo 'PRIORITY_GATEWAY_RECOVERY_END'

      - name: Persist recovery result
        if: always()
        shell: bash
        run: |
          set -Eeuo pipefail
          test -f docs/priority-gateway-recovery-result.txt || echo 'Recovery did not produce a result file.' > docs/priority-gateway-recovery-result.txt
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add docs/priority-gateway-recovery-result.txt
          git diff --cached --quiet || git commit -m 'Record bounded browser recovery result'
          git push origin HEAD:main
