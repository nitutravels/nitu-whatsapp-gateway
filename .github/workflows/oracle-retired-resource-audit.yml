name: Verify Oracle resources after NAMS retirement

# Recheck after gateway deployment commit f4eedc06 on 2026-07-18.
on:
  push:
    branches: [oracle-resource-audit]
    paths: ['.github/workflows/oracle-retired-resource-audit.yml']

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v7
        with:
          ref: oracle-resource-audit

      - name: Configure OCI credentials
        shell: bash
        env:
          OCI_PRIVATE_KEY_PEM: ${{ secrets.OCI_PRIVATE_KEY }}
          OCI_FINGERPRINT_VALUE: ${{ secrets.OCI_FINGERPRINT }}
        run: |
          set -Eeuo pipefail
          mkdir -p "$HOME/.oci"
          python - <<'PY'
          import os
          from pathlib import Path
          value = os.environ.get('OCI_PRIVATE_KEY_PEM', '').strip()
          if len(value) >= 2 and value[0] == value[-1] and value[0] in {'"', "'"}:
              value = value[1:-1]
          if '\\n' in value and '\n' not in value:
              value = value.replace('\\r', '').replace('\\n', '\n')
          Path.home().joinpath('.oci/key.pem').write_text(value.replace('\r', '').strip() + '\n', encoding='utf-8')
          PY
          chmod 600 "$HOME/.oci/key.pem"
          FINGERPRINT="$(printf '%s' "$OCI_FINGERPRINT_VALUE" | tr -d '[:space:]')"
          cat > "$HOME/.oci/config" <<EOF
          [DEFAULT]
          user=${{ secrets.OCI_USER_OCID }}
          fingerprint=$FINGERPRINT
          tenancy=${{ secrets.OCI_TENANCY_OCID }}
          region=${{ vars.OCI_REGION }}
          key_file=$HOME/.oci/key.pem
          EOF
          chmod 600 "$HOME/.oci/config"

      - name: Verify compute, volumes and reserved IPs
        shell: bash
        env:
          TENANCY_OCID: ${{ secrets.OCI_TENANCY_OCID }}
          GATEWAY_COMPARTMENT_OCID: ${{ vars.OCI_COMPARTMENT_OCID }}
          OLD_PUBLIC_IP: '161.118.187.93'
        run: |
          set -Eeuo pipefail
          exec > >(tee oracle-post-retirement-verification.txt) 2>&1
          pipx install --quiet oci-cli
          echo 'ORACLE_POST_RETIREMENT_VERIFICATION_BEGIN'

          old_instance_count=0
          old_boot_volume_count=0
          gateway_instance_count=0
          gateway_public_ip=''

          printf '%s\t%s\n%s\t%s\n' "$TENANCY_OCID" 'ROOT_TENANCY' "$GATEWAY_COMPARTMENT_OCID" 'NituWAGateway' > /tmp/compartments.tsv

          while IFS=$'\t' read -r compartment_id compartment_name; do
            instances_json="$(oci compute instance list --compartment-id "$compartment_id" --all --output json)"
            while IFS= read -r instance; do
              [ -n "$instance" ] || continue
              instance_id="$(jq -r '.id' <<<"$instance")"
              display_name="$(jq -r '."display-name"' <<<"$instance")"
              state="$(jq -r '."lifecycle-state"' <<<"$instance")"
              shape="$(jq -r '.shape' <<<"$instance")"
              ocpus="$(jq -r '."shape-config".ocpus // ""' <<<"$instance")"
              memory="$(jq -r '."shape-config"."memory-in-gbs" // ""' <<<"$instance")"
              public_ip=''
              vnic_json="$(oci compute vnic-attachment list --compartment-id "$compartment_id" --instance-id "$instance_id" --all --output json 2>/dev/null || printf '{"data":[]}')"
              while IFS= read -r vnic_id; do
                [ -n "$vnic_id" ] || continue
                candidate="$(oci network vnic get --vnic-id "$vnic_id" --query 'data."public-ip"' --raw-output 2>/dev/null || true)"
                if [ -n "$candidate" ] && [ "$candidate" != 'null' ]; then public_ip="$candidate"; break; fi
              done < <(jq -r '.data[]? | ."vnic-id"' <<<"$vnic_json")
              echo "INSTANCE compartment=$compartment_name name=$display_name state=$state shape=$shape ocpus=$ocpus memory_gb=$memory public_ip=${public_ip:-none}"
              if [ "$display_name" = 'nams-phase1' ] || [ "$public_ip" = "$OLD_PUBLIC_IP" ]; then
                old_instance_count=$((old_instance_count + 1))
              fi
              if [ "$display_name" = 'nitu-whatsapp-gateway' ] && [ "$state" != 'TERMINATED' ]; then
                gateway_instance_count=$((gateway_instance_count + 1))
                gateway_public_ip="$public_ip"
              fi
            done < <(jq -c '.data[]? | select(."lifecycle-state" != "TERMINATED")' <<<"$instances_json")
          done < /tmp/compartments.tsv

          ad="$(oci iam availability-domain list --compartment-id "$TENANCY_OCID" --query 'data[0].name' --raw-output)"
          while IFS=$'\t' read -r compartment_id compartment_name; do
            volumes_json="$(oci bv boot-volume list --availability-domain "$ad" --compartment-id "$compartment_id" --all --output json)"
            while IFS= read -r volume; do
              [ -n "$volume" ] || continue
              volume_name="$(jq -r '."display-name"' <<<"$volume")"
              volume_state="$(jq -r '."lifecycle-state"' <<<"$volume")"
              volume_size="$(jq -r '."size-in-gbs"' <<<"$volume")"
              echo "BOOT_VOLUME compartment=$compartment_name name=$volume_name state=$volume_state size_gb=$volume_size"
              if [ "$volume_name" = 'nams-phase1 (Boot Volume)' ] && [ "$volume_state" != 'TERMINATED' ]; then
                old_boot_volume_count=$((old_boot_volume_count + 1))
              fi
            done < <(jq -c '.data[]?' <<<"$volumes_json")
          done < /tmp/compartments.tsv

          reserved_json="$(oci network public-ip list --compartment-id "$GATEWAY_COMPARTMENT_OCID" --lifetime RESERVED --scope REGION --all --output json)"
          while IFS= read -r public_ip; do
            [ -n "$public_ip" ] || continue
            address="$(jq -r '."ip-address"' <<<"$public_ip")"
            name="$(jq -r '."display-name"' <<<"$public_ip")"
            state="$(jq -r '."lifecycle-state"' <<<"$public_ip")"
            echo "RESERVED_PUBLIC_IP name=$name address=$address state=$state"
            if [ "$name" = 'nitu-wa-gateway-reserved-ip' ]; then gateway_public_ip="$address"; fi
          done < <(jq -c '.data[]?' <<<"$reserved_json")

          echo "OLD_INSTANCE_COUNT=$old_instance_count"
          echo "OLD_BOOT_VOLUME_COUNT=$old_boot_volume_count"
          echo "GATEWAY_INSTANCE_COUNT=$gateway_instance_count"
          echo "GATEWAY_PUBLIC_IP=${gateway_public_ip:-none}"
          if [ "$old_instance_count" -eq 0 ] && [ "$old_boot_volume_count" -eq 0 ]; then
            echo 'NAMS_RETIREMENT_VERIFIED=yes'
          else
            echo 'NAMS_RETIREMENT_VERIFIED=no'
          fi
          echo 'ORACLE_POST_RETIREMENT_VERIFICATION_END'

      - name: Persist verification result
        if: always()
        shell: bash
        run: |
          set -Eeuo pipefail
          test -f oracle-post-retirement-verification.txt || echo 'Verification did not produce a result file.' > oracle-post-retirement-verification.txt
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add oracle-post-retirement-verification.txt
          git diff --cached --quiet || git commit -m 'Record post-retirement Oracle verification'
          git push origin HEAD:oracle-resource-audit