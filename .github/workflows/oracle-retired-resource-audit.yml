name: Priority Oracle gateway repair

on:
  push:
    branches: [oracle-resource-audit]
    paths: ['.github/workflows/oracle-retired-resource-audit.yml']

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest
    environment: production
    env:
      TF_IN_AUTOMATION: "true"
      TF_INPUT: "false"
      TF_VAR_tenancy_ocid: ${{ secrets.OCI_TENANCY_OCID }}
      TF_VAR_compartment_ocid: ${{ vars.OCI_COMPARTMENT_OCID }}
      TF_VAR_region: ${{ vars.OCI_REGION }}
      TF_VAR_gateway_api_key: ${{ secrets.GATEWAY_API_KEY }}
      TF_VAR_gateway_admin_token: ${{ secrets.GATEWAY_ADMIN_TOKEN }}
      TF_VAR_gateway_webhook_secret: ${{ secrets.GATEWAY_WEBHOOK_SECRET }}
      TF_VAR_gateway_domain: ${{ vars.GATEWAY_DOMAIN }}
      TF_VAR_webhook_url: ${{ vars.WEBHOOK_URL }}
      TF_VAR_default_country_code: ${{ vars.DEFAULT_COUNTRY_CODE || '91' }}
      TF_VAR_media_allowed_hosts: ${{ vars.MEDIA_ALLOWED_HOSTS || 'nitutravels.in,www.nitutravels.in' }}
      TF_VAR_availability_domain_index: ${{ vars.AVAILABILITY_DOMAIN_INDEX || '0' }}
      TF_VAR_gateway_image: ghcr.io/nitutravels/nitu-whatsapp-gateway:latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: oracle-resource-audit
          fetch-depth: 1

      - name: Prepare current main source
        shell: bash
        run: |
          set -Eeuo pipefail
          git fetch --depth=1 origin main
          rm -rf /tmp/gateway-main
          git worktree add --detach /tmp/gateway-main FETCH_HEAD

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.15.8

      - name: Configure OCI credentials
        shell: bash
        env:
          OCI_PRIVATE_KEY_PEM: ${{ secrets.OCI_PRIVATE_KEY }}
          OCI_FINGERPRINT_VALUE: ${{ secrets.OCI_FINGERPRINT }}
        run: |
          set -Eeuo pipefail
          mkdir -p "$HOME/.oci"
          python - <<'PY'
          import os
          from pathlib import Path
          value = os.environ.get('OCI_PRIVATE_KEY_PEM', '').strip()
          if len(value) >= 2 and value[0] == value[-1] and value[0] in {'"', "'"}:
              value = value[1:-1]
          if '\\n' in value and '\n' not in value:
              value = value.replace('\\r', '').replace('\\n', '\n')
          Path.home().joinpath('.oci/key.pem').write_text(value.replace('\r', '').strip() + '\n', encoding='utf-8')
          PY
          chmod 600 "$HOME/.oci/key.pem"
          FINGERPRINT="$(printf '%s' "$OCI_FINGERPRINT_VALUE" | tr -d '[:space:]')"
          cat > "$HOME/.oci/config" <<EOF
          [DEFAULT]
          user=${{ secrets.OCI_USER_OCID }}
          fingerprint=$FINGERPRINT
          tenancy=${{ secrets.OCI_TENANCY_OCID }}
          region=${{ vars.OCI_REGION }}
          key_file=$HOME/.oci/key.pem
          EOF
          chmod 600 "$HOME/.oci/config"

      - name: Apply current Terraform and capture exact result
        id: apply
        shell: bash
        env:
          OCI_NAMESPACE: ${{ vars.OCI_NAMESPACE }}
          STATE_BUCKET: ${{ vars.OCI_TF_STATE_BUCKET }}
        run: |
          set +e
          cd /tmp/gateway-main/infra/terraform
          terraform init -reconfigure -no-color \
            -backend-config="bucket=$STATE_BUCKET" \
            -backend-config="namespace=$OCI_NAMESPACE" \
            -backend-config="region=${{ vars.OCI_REGION }}" \
            -backend-config="key=nitu-whatsapp-gateway/terraform.tfstate" \
            -backend-config="auth=APIKey" \
            -backend-config="config_file_profile=DEFAULT" >/tmp/init.log 2>&1
          init_status=$?
          if [ "$init_status" -ne 0 ]; then
            {
              echo 'APPLY_STATUS=init_failed'
              tail -n 80 /tmp/init.log
            } > "$GITHUB_WORKSPACE/oracle-priority-repair-result.txt"
            exit 0
          fi

          terraform apply -auto-approve -no-color >/tmp/apply.log 2>&1
          apply_status=$?
          if [ "$apply_status" -eq 0 ]; then
            {
              echo 'APPLY_STATUS=success'
              echo "PUBLIC_IP=$(terraform output -raw public_ip 2>/dev/null || true)"
              echo "DASHBOARD_URL=$(terraform output -raw dashboard_url 2>/dev/null || true)"
              echo "HEALTH_URL=$(terraform output -raw health_url 2>/dev/null || true)"
            } > "$GITHUB_WORKSPACE/oracle-priority-repair-result.txt"
          else
            {
              echo 'APPLY_STATUS=failed'
              echo 'ERROR_BLOCK_BEGIN'
              awk 'BEGIN{p=0;c=0} /^Error:/{p=1;c=0} p{print;c++} p&&c>=45{p=0}' /tmp/apply.log | tail -n 180
              echo 'OCI_ERROR_SUMMARY_BEGIN'
              grep -Ei 'Out of host capacity|OutOfHostCapacity|InternalError|service limit|LimitExceeded|NotAuthorized|NotAuthenticated|status: [0-9]{3}|code:' /tmp/apply.log | tail -n 50
              echo 'OCI_ERROR_SUMMARY_END'
              echo 'ERROR_BLOCK_END'
            } > "$GITHUB_WORKSPACE/oracle-priority-repair-result.txt"
          fi
          exit 0

      - name: Persist repair result
        if: always()
        shell: bash
        run: |
          set -Eeuo pipefail
          test -f oracle-priority-repair-result.txt || echo 'APPLY_STATUS=no_result' > oracle-priority-repair-result.txt
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add oracle-priority-repair-result.txt
          git diff --cached --quiet || git commit -m 'Record exact Oracle priority repair result'
          git push origin HEAD:oracle-resource-audit

      - name: Mark unsuccessful apply
        shell: bash
        run: grep -q '^APPLY_STATUS=success$' oracle-priority-repair-result.txt