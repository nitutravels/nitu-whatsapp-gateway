name: Verify gateway DNS, HTTPS and health

on:
  push:
    branches: [oracle-resource-audit]
    paths: ['.github/workflows/oracle-retired-resource-audit.yml']

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: oracle-resource-audit

      - name: Verify DNS and gateway endpoints
        shell: bash
        env:
          DOMAIN: wa.nitutravels.in
          EXPECTED_IP: 137.23.58.166
        run: |
          set +e
          set -uo pipefail
          exec > >(tee gateway-dns-health-verification.txt) 2>&1
          echo 'GATEWAY_VERIFICATION_BEGIN'
          echo "EXPECTED_IP=$EXPECTED_IP"

          dns_ok=0
          resolved=''
          for attempt in $(seq 1 20); do
            resolved="$(python - "$DOMAIN" <<'PY'
          import socket, sys
          try:
              print('\n'.join(sorted(set(x[4][0] for x in socket.getaddrinfo(sys.argv[1], 443, socket.AF_INET, socket.SOCK_STREAM)))))
          except Exception:
              pass
          PY
            )"
            echo "DNS_ATTEMPT=$attempt DNS_A=${resolved:-none}"
            if grep -qx "$EXPECTED_IP" <<<"$resolved"; then
              dns_ok=1
              break
            fi
            sleep 30
          done
          echo "DNS_VERIFIED=$([ "$dns_ok" -eq 1 ] && echo yes || echo no)"

          service_ok=0
          health_code=000
          ready_code=000
          admin_code=000
          for attempt in $(seq 1 24); do
            health_code="$(curl -k -sS --connect-timeout 8 --max-time 20 --resolve "$DOMAIN:443:$EXPECTED_IP" -o /tmp/health-body -w '%{http_code}' "https://$DOMAIN/healthz" 2>/tmp/health-error || echo 000)"
            ready_code="$(curl -k -sS --connect-timeout 8 --max-time 20 --resolve "$DOMAIN:443:$EXPECTED_IP" -o /tmp/ready-body -w '%{http_code}' "https://$DOMAIN/readyz" 2>/tmp/ready-error || echo 000)"
            admin_code="$(curl -k -sS --connect-timeout 8 --max-time 20 --resolve "$DOMAIN:443:$EXPECTED_IP" -o /tmp/admin-body -w '%{http_code}' "https://$DOMAIN/admin" 2>/tmp/admin-error || echo 000)"
            echo "SERVICE_ATTEMPT=$attempt HEALTH=$health_code READY=$ready_code ADMIN=$admin_code"
            if [ "$health_code" = '200' ] && { [ "$admin_code" = '200' ] || [ "$admin_code" = '401' ] || [ "$admin_code" = '403' ]; }; then
              service_ok=1
              break
            fi
            sleep 30
          done

          echo "HEALTH_HTTP=$health_code"
          echo "READY_HTTP=$ready_code"
          echo "ADMIN_HTTP=$admin_code"
          echo "SERVICE_VERIFIED=$([ "$service_ok" -eq 1 ] && echo yes || echo no)"
          echo -n 'HEALTH_BODY='; tr '\n' ' ' </tmp/health-body 2>/dev/null | head -c 500; echo
          echo -n 'READY_BODY='; tr '\n' ' ' </tmp/ready-body 2>/dev/null | head -c 500; echo
          echo -n 'ADMIN_BODY_PREFIX='; tr '\n' ' ' </tmp/admin-body 2>/dev/null | head -c 300; echo
          echo -n 'HEALTH_ERROR='; tr '\n' ' ' </tmp/health-error 2>/dev/null | head -c 500; echo

          if [ "$dns_ok" -eq 1 ]; then
            public_health_code="$(curl -sS --connect-timeout 8 --max-time 20 -o /tmp/public-health-body -w '%{http_code}' "https://$DOMAIN/healthz" 2>/tmp/public-health-error || echo 000)"
            echo "PUBLIC_HTTPS_HEALTH=$public_health_code"
            echo | openssl s_client -connect "$DOMAIN:443" -servername "$DOMAIN" 2>/dev/null | openssl x509 -noout -subject -issuer -dates 2>/dev/null || true
          else
            echo 'PUBLIC_HTTPS_HEALTH=not_tested_dns_unresolved'
          fi

          echo 'GATEWAY_VERIFICATION_END'
          [ "$dns_ok" -eq 1 ] && [ "$service_ok" -eq 1 ]

      - name: Persist verification result
        if: always()
        shell: bash
        run: |
          set -Eeuo pipefail
          test -f gateway-dns-health-verification.txt || echo 'Verification did not produce a result.' > gateway-dns-health-verification.txt
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add gateway-dns-health-verification.txt
          git diff --cached --quiet || git commit -m 'Record gateway DNS and health verification'
          git push origin HEAD:oracle-resource-audit