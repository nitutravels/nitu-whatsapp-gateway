name: Build immutable Baileys gateway release

on:
  push:
    branches: [main]
    paths:
      - 'v2/**'
      - 'Dockerfile'
      - 'scripts/deploy-baileys-v2.sh'
      - '.github/workflows/build-gateway-v2-release.yml'
      - '.github/workflows/control-plane-recovery.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  validate-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v5
        with:
          node-version: '22.16.0'
      - name: Validate application
        working-directory: v2
        run: |
          npm install --no-audit --no-fund
          npm run check
          npm test
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and publish immutable image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.sha }}
            ghcr.io/${{ github.repository }}:baileys-v2
          provenance: mode=max
          sbom: true
      - name: Publish release identity
        run: |
          echo "Gateway release image: ghcr.io/${GITHUB_REPOSITORY}:${GITHUB_SHA}" >> "$GITHUB_STEP_SUMMARY"
          echo 'This workflow has no cancel-in-progress policy; unrelated repository commits cannot cancel the immutable release build.' >> "$GITHUB_STEP_SUMMARY"
