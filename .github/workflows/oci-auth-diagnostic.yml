name: OCI auth and bucket diagnostic

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/oci-auth-diagnostic.yml'

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Validate OCI credential pairing
        shell: bash
        env:
          OCI_PRIVATE_KEY_PEM: ${{ secrets.OCI_PRIVATE_KEY }}
          OCI_CONFIG_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
          OCI_USER: ${{ secrets.OCI_USER_OCID }}
          OCI_TENANCY: ${{ secrets.OCI_TENANCY_OCID }}
        run: |
          set -Eeuo pipefail
          mkdir -p "$HOME/.oci"
          printf '%s\n' "$OCI_PRIVATE_KEY_PEM" > "$HOME/.oci/oci_api_key.pem"
          chmod 600 "$HOME/.oci/oci_api_key.pem"

          DERIVED="$(openssl rsa -pubout -outform DER -in "$HOME/.oci/oci_api_key.pem" 2>/dev/null | openssl md5 -c | awk '{print tolower($2)}')"
          CONFIGURED="$(printf '%s' "$OCI_CONFIG_FINGERPRINT" | tr '[:upper:]' '[:lower:]' | tr -d '[:space:]')"
          if [ -n "$DERIVED" ] && [ "$DERIVED" = "$CONFIGURED" ]; then
            echo 'private_key_matches_fingerprint=yes'
          else
            echo 'private_key_matches_fingerprint=no'
          fi
          [[ "$OCI_USER" =~ ^ocid1\.user\. ]] && echo 'user_ocid_type=valid' || echo 'user_ocid_type=invalid'
          [[ "$OCI_TENANCY" =~ ^ocid1\.tenancy\. ]] && echo 'tenancy_ocid_type=valid' || echo 'tenancy_ocid_type=invalid'

          cat > "$HOME/.oci/config" <<EOF
          [DEFAULT]
          user=$OCI_USER
          fingerprint=$OCI_CONFIG_FINGERPRINT
          tenancy=$OCI_TENANCY
          region=${{ vars.OCI_REGION }}
          key_file=$HOME/.oci/oci_api_key.pem
          EOF
          chmod 600 "$HOME/.oci/config"
      - name: Install OCI CLI
        run: pipx install --quiet oci-cli
      - name: Test OCI authentication
        shell: bash
        env:
          OCI_CLI_SUPPRESS_FILE_PERMISSIONS_WARNING: 'True'
          SUPPRESS_LABEL_WARNING: 'True'
        run: |
          set +e
          oci iam region-subscription list >/dev/null 2>/tmp/auth.err
          RC=$?
          echo "authentication_exit=$RC"
          if [ "$RC" -ne 0 ]; then
            grep -E '"code"|"message"|"status"' /tmp/auth.err | head -n 6
          fi
          exit 1
