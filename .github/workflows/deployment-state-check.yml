name: Verify Oracle deployment state

on:
  push:
    branches: [deployment-state-check]
    paths: ['.github/workflows/deployment-state-check.yml']

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.15.8
          terraform_wrapper: false
      - name: Show canonical Terraform formatting
        shell: bash
        run: |
          set +e
          mkdir -p /tmp/src
          curl -fsSL 'https://github.com/nitutravels/nitu-whatsapp-gateway/archive/4ae0e3bc31dbccefadb43d93a0f24e9e66e1c289.tar.gz' | tar -xz -C /tmp/src --strip-components=1
          cd /tmp/src/infra/terraform
          terraform fmt -check -diff -recursive -no-color
          echo "fmt_exit=$?"
          exit 1
