name: Verify Oracle deployment state

on:
  push:
    branches: [deployment-state-check]
    paths: ['.github/workflows/deployment-state-check.yml']

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Configure OCI credentials
        shell: bash
        env:
          KEY: ${{ secrets.OCI_PRIVATE_KEY }}
          FP: ${{ secrets.OCI_FINGERPRINT }}
        run: |
          mkdir -p "$HOME/.oci"
          printf '%s\n' "$KEY" > "$HOME/.oci/key.pem"
          chmod 600 "$HOME/.oci/key.pem"
          FP="$(printf '%s' "$FP" | tr -d '[:space:]')"
          printf '[DEFAULT]\nuser=%s\nfingerprint=%s\ntenancy=%s\nregion=%s\nkey_file=%s/.oci/key.pem\n' '${{ secrets.OCI_USER_OCID }}' "$FP" '${{ secrets.OCI_TENANCY_OCID }}' '${{ vars.OCI_REGION }}' "$HOME" > "$HOME/.oci/config"
          chmod 600 "$HOME/.oci/config"
      - name: List subscribed regions and availability domains
        shell: bash
        run: |
          set +e
          pipx install --quiet oci-cli
          echo 'subscribed_regions_begin'
          oci iam region-subscription list --query 'data[].{region:"region-name",home:"is-home-region",status:status}' --output table
          echo 'subscribed_regions_end'
          for REGION in $(oci iam region-subscription list --query 'data[]."region-name"' --raw-output | tr -d '[]",'); do
            echo "region=$REGION"
            oci iam availability-domain list --compartment-id '${{ secrets.OCI_TENANCY_OCID }}' --region "$REGION" --query 'data[].name' --raw-output
          done
          exit 1
