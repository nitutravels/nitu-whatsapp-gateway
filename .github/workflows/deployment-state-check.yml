name: Verify Oracle deployment state

on:
  push:
    branches: [deployment-state-check]
    paths: ['.github/workflows/deployment-state-check.yml']

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    environment: production
    env:
      TF_IN_AUTOMATION: "true"
      TF_INPUT: "false"
      TF_VAR_tenancy_ocid: ${{ secrets.OCI_TENANCY_OCID }}
      TF_VAR_compartment_ocid: ${{ vars.OCI_COMPARTMENT_OCID }}
      TF_VAR_region: ${{ vars.OCI_REGION }}
      TF_VAR_gateway_image: ghcr.io/nitutravels/nitu-whatsapp-gateway:latest
      TF_VAR_gateway_api_key: ${{ secrets.GATEWAY_API_KEY }}
      TF_VAR_gateway_admin_token: ${{ secrets.GATEWAY_ADMIN_TOKEN }}
      TF_VAR_gateway_webhook_secret: ${{ secrets.GATEWAY_WEBHOOK_SECRET }}
      TF_VAR_gateway_domain: ${{ vars.GATEWAY_DOMAIN }}
      TF_VAR_webhook_url: ${{ vars.WEBHOOK_URL }}
      TF_VAR_default_country_code: ${{ vars.DEFAULT_COUNTRY_CODE || '91' }}
      TF_VAR_media_allowed_hosts: ${{ vars.MEDIA_ALLOWED_HOSTS || 'nitutravels.in,www.nitutravels.in' }}
      TF_VAR_availability_domain_index: ${{ vars.AVAILABILITY_DOMAIN_INDEX || '0' }}
    steps:
      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.15.8
          terraform_wrapper: false
      - name: Run read-only Oracle plan
        shell: bash
        env:
          KEY: ${{ secrets.OCI_PRIVATE_KEY }}
          FP: ${{ secrets.OCI_FINGERPRINT }}
          BUCKET: ${{ vars.OCI_TF_STATE_BUCKET }}
          NS: ${{ vars.OCI_NAMESPACE }}
        run: |
          set +e
          mkdir -p "$HOME/.oci" /tmp/src
          printf '%s\n' "$KEY" > "$HOME/.oci/key.pem"
          chmod 600 "$HOME/.oci/key.pem"
          FP="$(printf '%s' "$FP" | tr -d '[:space:]')"
          printf '[DEFAULT]\nuser=%s\nfingerprint=%s\ntenancy=%s\nregion=%s\nkey_file=%s/.oci/key.pem\n' '${{ secrets.OCI_USER_OCID }}' "$FP" '${{ secrets.OCI_TENANCY_OCID }}' '${{ vars.OCI_REGION }}' "$HOME" > "$HOME/.oci/config"
          chmod 600 "$HOME/.oci/config"
          curl -fsSL 'https://github.com/nitutravels/nitu-whatsapp-gateway/archive/5a772d257fb505f75a6f6f1eea55a1d12914d2ad.tar.gz' | tar -xz -C /tmp/src --strip-components=1
          cd /tmp/src/infra/terraform
          terraform init -reconfigure -no-color -backend-config="bucket=$BUCKET" -backend-config="namespace=$NS" -backend-config="region=${{ vars.OCI_REGION }}" -backend-config="key=nitu-whatsapp-gateway/terraform.tfstate" -backend-config="auth=APIKey" -backend-config="config_file_profile=DEFAULT" >/tmp/init.log 2>&1
          echo "init_exit=$?"
          terraform plan -no-color -out=/tmp/tfplan >/tmp/plan.log 2>&1
          RC=$?
          echo "plan_exit=$RC"
          tail -n 70 /tmp/plan.log
          exit 1
